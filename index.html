  const [form, setForm] = useState({...EMPTY_ENTRY});
  const [editingId, setEditingId] = useState(null);
  const [fixedList, setFixedList] = useState(FIXED_EXPENSES_DEFAULT);
  const [lastYear, setLastYear] = useState(LAST_YEAR_2025);
  const [saved, setSaved] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [fcTab, setFcTab] = useState("summary");
  const [weather, setWeather] = useState(null); // {temp, rain, wind, desc, icon, alert}
  const [weatherErr, setWeatherErr] = useState(false);
  const [orefAlert, setOrefAlert] = useState(null); // null | {cities:[], category:str, time:str}
  const [orefHistory, setOrefHistory] = useState([]); // [{date, count}] for today
  const [expandedSup, setExpandedSup] = useState(null);
  const [supMonth, setSupMonth] = useState(`${YEAR}-${MONTH_STR}`);
  // ── הרשאות: null = בעלים, { name, role:"manager", permissions:[] } = אחמש מחובר
  const [currentUser, setCurrentUser] = useState(null);
  const [masterTasks, setMasterTasks] = useState([]);
  const [pettyCash, setPettyCash] = useState([]);
  const [loggedInUser, setLoggedInUser] = useState(null);
  const [mustCompleteProfile, setMustCompleteProfile] = useState(false);
  const [appUsers, setAppUsers]     = useState([]);
  const [setupDone, setSetupDone] = useState(false);
  const [showSetup, setShowSetup] = useState(false);
  const [businesses, setBusinesses] = useState([]);
  const [currentBizId, setCurrentBizId_] = useState(null);
  const setCurrentBizId = id => {
    setCurrentBizId_(id);
    // NOTE: do NOT update tenantId here — tenantId is fixed per user account
    // tenantId is set once during login/init and never changes
    if (id) {
      const uid = window.storage.getUid ? window.storage.getUid() : null;
      if(uid) try { localStorage.setItem("marjin_biz_" + uid, id); } catch(_){}
    }
  };
  const [showBizSelect, setShowBizSelect] = useState(false);
  const [entryStep, setEntryStep] = useState('idle'); // 'idle' | 'revenue' | 'suppliers'
  const [pendingCredits, setPendingCredits] = useState([]); // [{id,supplierId,supplierName,date,amount,note}]
  const [businessConfig, setBusinessConfig] = useState({
    businessName: "",
    rentPct: 0, royaltyPct: 0, hasRoyalty: false,
    targets: { salesGrowthPct:5, foodCostPct:33, laborCostPct:27 }
  });
  const [suppliers, setSuppliers] = useState([]);

  const sg = async (key, shared=false) => { try { return await window.storage.get(key, shared); } catch(_){ return null; } };

  // useEffect 1: global data (users, businesses)
  useEffect(()=>{
    const init = async () => {
      // Step A: discover tenant -- 3 fallback layers
      const uid = window.storage.getUid ? window.storage.getUid() : null;
      if(uid) {
        let tid = null;

        // Layer 1: localStorage cache (survives page reloads instantly)
        try {
          const cached = localStorage.getItem("marjin_tid_" + uid);
          if(cached) tid = cached;
        } catch(_){}

        // Layer 2: RTDB user_tenants/{uid}
        if(!tid) {
          try {
            const rtdbTid = await window._rtdbGet("user_tenants/" + uid);
            if(rtdbTid && typeof rtdbTid === "string") tid = rtdbTid;
          } catch(_){}
        }

        // Layer 3: Firebase Auth session → uid known → user_tenants readable by owner
        if(!tid) {
          try {
            const fbUser = window._auth ? window._auth.currentUser : null;
            if(fbUser) {
              // user_tenants/{uid} is always readable by the authenticated user
              const rtdbTid2 = await window._rtdbGet("user_tenants/" + fbUser.uid);
              if(rtdbTid2 && typeof rtdbTid2 === "string") tid = rtdbTid2;
            }
          } catch(_){}
        }

        // Layer 4: username_index (public) via displayName
        if(!tid) {
          try {
            const fbUser = window._auth ? window._auth.currentUser : null;
            if(fbUser && fbUser.displayName) {
              const indexed = await window._rtdbGet("username_index/" + fbUser.displayName.toLowerCase());
              if(indexed && indexed.tenantId) tid = indexed.tenantId;
            }
          } catch(_){}
        }

        if(tid) {
          // Cache locally for next reload
          try { localStorage.setItem("marjin_tid_" + uid, tid); } catch(_){}
          // Repair user_tenants if missing
          try { await window._rtdbSet("user_tenants/" + uid, tid); } catch(_){}

          if(window.setTenantId) window.setTenantId(tid);
          window._currentTenantId = tid;

          // bizId will be resolved below after loading businesses list
        }
      }

      // Step B: load data (requires tenantId set above)
      const rau = await sg("app-users", true);
      if(rau) {
        try {
          const users = JSON.parse(rau.value);
          setAppUsers(users);
          // Auto-login if Firebase Auth session is active
          if(uid) {
            const match = users.find(u => u.firebaseUid === uid);
            if(match) {
              setLoggedInUser({...match, _tenantId: window._currentTenantId});
              // Ensure username_index is populated for future cross-browser logins
              if(match.username) {
                try { await window._rtdbSet("username_index/" + match.username.toLowerCase(), { tenantId: window._currentTenantId, email: match.email }); } catch(_){}
              }
            }
          }
        } catch(_){}
      }
      const rb = await sg("app-businesses", true);
      if(rb) {
        try {
          const bizList = JSON.parse(rb.value);
          console.log("[init] bizList:", bizList.map(b=>({id:b.id,name:b.name})), "uid:", uid, "cached:", localStorage.getItem("marjin_biz_"+uid));
          setBusinesses(bizList);
          if(bizList.length >= 1) {
            // Try to restore last active biz, fallback to first in list
            let targetBizId = bizList[0].id;
            try {
              const cached = localStorage.getItem("marjin_biz_" + uid);
              if(cached && bizList.find(b => b.id === cached)) targetBizId = cached;
              else {
                const activeBiz = await window._rtdbGet(`user_active_biz/${uid}`);
                if(activeBiz && typeof activeBiz === "string" && bizList.find(b => b.id === activeBiz)) {
                  targetBizId = activeBiz;
                }
              }
            } catch(_){}
            setCurrentBizId(targetBizId);
          }
        } catch(_){}
      }

      setLoaded(true);
    };
    if(window._firebaseReady) { init(); }
    else { window.addEventListener("firebase-ready", init, {once:true}); }
  },[]);

  // useEffect 2: business-specific data -- live listeners
  useEffect(()=>{
    if(!currentBizId) return;

    // ── Clear stale data immediately on business switch ──
    setEntries([]);
    setFixedList(FIXED_EXPENSES_DEFAULT);
    setSuppliers([]);
    setBusinessConfig({businessName:"",rentPct:0,royaltyPct:0,hasRoyalty:false,targets:{salesGrowthPct:5,foodCostPct:33,laborCostPct:27}});
    setPendingCredits([]);
    setMasterTasks([]);
    setPettyCash([]);

    const unsubs = [];
    const sub = (key, setter, shared=false) => {
      if(!window.storage.subscribe) return;
      unsubs.push(window.storage.subscribe(key, r => {
        try { setter(JSON.parse(r.value)); } catch(_){}
      }, shared));
    };
    // Initial load -- only for data without live listeners
    (async()=>{
      const rly = await sg(`biz:${currentBizId}:lastyear`);
      if(rly) setLastYear(JSON.parse(rly.value));
      setSetupDone(true);
    })();
    // Live listeners -- fire immediately with current value AND on every change
    sub(`biz:${currentBizId}:entries`, (val) => {
      if(!Array.isArray(val)) return;
      // Merge duplicates by date — combine all fields, prefer non-zero values
      const mergeEntries = (a, b) => {
        const merged = {...a};
        Object.keys(b).forEach(k => {
          if(k === 'date') return;
          if(k === 'supplier_payments') {
            // Merge supplier payments — sum amounts for same supplier
            const ap = a.supplier_payments || {};
            const bp = b.supplier_payments || {};
            const sp = {...ap};
            Object.keys(bp).forEach(sid => {
              sp[sid] = (Number(sp[sid])||0) + (Number(bp[sid])||0);
            });
            merged.supplier_payments = sp;
          } else if(typeof b[k] === 'number') {
            // For numeric fields: take whichever is non-zero, or sum if both non-zero
            if(!merged[k] || merged[k] === 0) merged[k] = b[k];
          } else if(b[k] && !merged[k]) {
            merged[k] = b[k];
          }
        });
        return merged;
      };
      const seen = new Map();
      val.forEach(e => {
        if(!e?.date) return;
        if(seen.has(e.date)) {
          seen.set(e.date, mergeEntries(seen.get(e.date), e));
        } else {
          seen.set(e.date, e);
        }
      });
      const deduped = [...seen.values()].sort((a,b)=>a.date.localeCompare(b.date));
      setEntries(deduped);
      // If duplicates were found — write merged version back to Firebase
      if(deduped.length < val.length) {
        console.log(`[dedup] merged ${val.length - deduped.length} duplicate entries, saving back`);
        window.storage.set(`biz:${currentBizId}:entries`, JSON.stringify(deduped), true).catch(()=>{});
      }
    });
    sub(`biz:${currentBizId}:fixed`,     setFixedList);
    sub(`biz:${currentBizId}:suppliers`, setSuppliers);
    sub(`biz:${currentBizId}:config`,    setBusinessConfig);
    sub(`biz:${currentBizId}:credits`,   setPendingCredits);
    sub(`biz:${currentBizId}:tasks`,    setMasterTasks);
    sub(`biz:${currentBizId}:pettycash`, setPettyCash);
    sub("app-users", u => { setAppUsers(u); }, true);

    // Fetch weather -- Open-Meteo, no API key needed
    const lat = businessConfig?.lat || 32.4342;
    const lon = businessConfig?.lon || 34.9194;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,windspeed_10m,weathercode&timezone=Asia/Jerusalem`)
      .then(r=>r.json())
      .then(d=>{
        const c = d.current;
        const wc = c.weathercode;
        const isRain = wc>=51 && wc<=99;
        const isHeat = c.temperature_2m >= 35;
        const isCold = c.temperature_2m <= 10;
        const icons = {};
        const icon = "";
        const desc = isRain?"גשם":isHeat?"חום קיצוני":isCold?"קור":wc<=1?"בהיר":wc<=3?"מעונן חלקית":"מעונן";
        const alert = isRain||isHeat||isCold;
        setWeather({temp:Math.round(c.temperature_2m), rain:c.precipitation, wind:Math.round(c.windspeed_10m), desc, icon, alert, isRain, isHeat, isCold});
      })
      .catch(()=>setWeatherErr(true));

    // ─── Pikud Ha-Oref -- current alerts ───
    const HADERA_AREAS = ["חדרה","קרית ים","קרית ביאליק","בנימינה","זכרון יעקב","עמיקם","עין עירון","קציר"];
    const fetchOref = () => {
      fetch("/api/oref")
      .then(r=>r.text())
      .then(txt=>{
        if(!txt || txt.trim()==="") { setOrefAlert(null); return; }
        const d = JSON.parse(txt);
        const cities = d.data||[];
        const inArea = cities.some(c=>HADERA_AREAS.some(a=>c.includes(a)));
        if(inArea || cities.length>0) {
          setOrefAlert({cities, category:d.cat||"1", time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})});
        } else {
          setOrefAlert(null);
        }
      })
      .catch(()=>{}); // silent -- CORS may block
    };
    fetchOref();
    const orefInterval = setInterval(fetchOref, 30000); // poll every 30s

    return () => { unsubs.forEach(u => typeof u==="function" && u()); clearInterval(orefInterval); };
  },[currentBizId]);

  const persist = async (e, f) => {
    if(!currentBizId) { console.warn("[persist] no bizId"); return; }
    try { await window.storage.set(`biz:${currentBizId}:entries`, JSON.stringify(e), true); }
    catch(err) { console.error("[persist] entries save failed:", err.message); }
    if(f) {
      try { await window.storage.set(`biz:${currentBizId}:fixed`, JSON.stringify(f), true); }
      catch(err) { console.error("[persist] fixed save failed:", err.message); }
    }
  };
  const saveLastYear = async (ly) => {
    setLastYear(ly);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:lastyear`, JSON.stringify(ly), true); } catch(_){}
  };
  const saveBusinessConfig = async (cfg) => {
    setBusinessConfig(cfg);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:config`, JSON.stringify(cfg), true); } catch(_){}
  };
  const saveSuppliers = async (sups) => {
    setSuppliers(sups);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:suppliers`, JSON.stringify(sups), true); } catch(_){}
  };
  const completeSetup = async (cfg, sups, fixed, firstOwner) => {
    // tenantId = the account/owner namespace (stays the same across all businesses)
    // bizId    = unique id for this specific business (sub-namespace within tenant)
    // Priority: loggedInUser._tenantId > window._currentTenantId > new bizId (first setup only)
    const existingTenantId = loggedInUser?._tenantId || window._currentTenantId || null;
    const bizId    = `biz_${Date.now()}`;
    const tenantId = existingTenantId || bizId;
    // Always sync _currentTenantId immediately
    if(window.setTenantId) window.setTenantId(tenantId);
    window._currentTenantId = tenantId;

    // ── STEP 1: Firebase Auth (must happen FIRST -- RTDB rules require auth) ──
    let firebaseUid = null;
    let ownerRecord = null;
    if(firstOwner) {
      try {
        try {
          firebaseUid = await window.firebaseCreateUser(firstOwner.email, firstOwner.password);
        } catch(createErr) {
          if(createErr.code !== "auth/email-already-in-use") throw createErr;
          // user already exists -- uid will come from signIn below
        }
        const signedInUser = await window.firebaseSignIn(firstOwner.email, firstOwner.password);
        firebaseUid = firebaseUid || signedInUser.uid;
        ownerRecord = {id:Date.now(), name:firstOwner.name, username:firstOwner.username,
          email:firstOwner.email, role:"super_owner", firebaseUid};
      } catch(e) {
        console.error("[completeSetup] auth failed:", e.message);
        ownerRecord = {id:Date.now(), name:firstOwner.name, username:firstOwner.username,
          email:firstOwner.email||"", role:"super_owner"};
      }
    }

    // ── STEP 2: get firebaseUid from Auth session if not set by firstOwner ──
    if(!firebaseUid && window._auth && window._auth.currentUser) {
      firebaseUid = window._auth.currentUser.uid;
    }
    if(!firebaseUid && window.storage.getUid) {
      firebaseUid = window.storage.getUid();
    }

    // ── STEP 3: members/roles FIRST -- rules check role before allowing writes ──
    if(firebaseUid) {
      try {
        await window._rtdbSet(`tenants/${tenantId}/members/${firebaseUid}`, true);
        await window._rtdbSet(`tenants/${tenantId}/roles/${firebaseUid}`, "super_owner");
        await window._rtdbSet(`user_tenants/${firebaseUid}`, tenantId);
        if(firstOwner) {
          const unameLower = firstOwner.username.toLowerCase();
          await window._rtdbSet(`tenants/${tenantId}/lookup/${unameLower}`, { email: firstOwner.email, firebaseUid });
          await window._rtdbSet(`username_index/${unameLower}`, { tenantId, email: firstOwner.email });
        }
        try { localStorage.setItem("marjin_tid_" + firebaseUid, tenantId); } catch(_){}
      } catch(e){ console.error("[setup] members/roles write failed:", e.message); }
    }

    // Small delay so Firebase propagates the role write before data writes
    await new Promise(r => setTimeout(r, 800));

    // ── STEP 4: Write business data (role exists now → allowed) ──────────────
    const bizName = cfg.businessName || "מסעדה חדשה";
    const updatedBizList = [...businesses.filter(b=>b.id!==bizId), {id:bizId, name:bizName}];
    setBusinesses(updatedBizList);
    try { await window.storage.set("app-businesses", JSON.stringify(updatedBizList), true); } catch(e){ console.error("[setup] businesses save failed:", e.message); }
    try { await window.storage.set(`biz:${bizId}:config`, JSON.stringify(cfg), true); } catch(e){ console.error("[setup] config save failed:", e.message); }
    setBusinessConfig(cfg);
    try { await window.storage.set(`biz:${bizId}:suppliers`, JSON.stringify(sups), true); } catch(e){ console.error("[setup] suppliers save failed:", e.message); }
    setSuppliers(sups);
    if(fixed) {
      setFixedList(fixed);
      try { await window.storage.set(`biz:${bizId}:fixed`, JSON.stringify(fixed), true); } catch(e){ console.error("[setup] fixed save failed:", e.message); }
    }
    try { await window._rtdbSet(`user_active_biz/${window.storage.getUid ? window.storage.getUid() : firebaseUid}`, bizId); } catch(_){}
    try { localStorage.setItem("marjin_biz_" + (firebaseUid||""), bizId); } catch(_){}

    // ── STEP 5: user record ────────────────────────────────────────────────────
    if(ownerRecord) {
      const users = [ownerRecord];
      setAppUsers(users);
      try { await window.storage.set("app-users", JSON.stringify(users), true); } catch(e){ console.error("[setup] users save failed:", e.message); }
      setLoggedInUser(ownerRecord);
    }

    setCurrentBizId(bizId); // switch to new business
    setSetupDone(true);
    setShowSetup(false);
    // Use updatedBizList (not businesses state — it's stale at this point)
    if(updatedBizList.length > 1) setShowBizSelect(true);
    else setShowBizSelect(false);
  };
  const saveAppUsers = async (users) => {
    setAppUsers(users);
    try { await window.storage.set("app-users", JSON.stringify(users), true); } catch(_){}
  };


  const savePettyCash = async (items) => {
    setPettyCash(items);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:pettycash`, JSON.stringify(items), true); } catch(_){}
  };

  const saveMasterTasks = async (t) => {
    setMasterTasks(t);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:tasks`, JSON.stringify(t), true); } catch(_){}
  };

  const setSupPay = (sid, val) => setForm(f=>({...f, supplier_payments:{...f.supplier_payments,[sid]:val}}));

  const saveRevenueStep = () => {
    // Save with current supplier data (empty if new entry)
    let updated = editingId!==null
      ? entries.map((e,i)=>i===editingId?{...form}:e)
      : [...entries,{...form}];
    updated.sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(updated); persist(updated,null);
    if(editingId!==null) {
      // editing: go straight to done
      setForm({...EMPTY_ENTRY}); setEditingId(null); setSaved(true);
      setTimeout(()=>{setSaved(false); setEntryStep('idle'); setScreen("dashboard");},1000);
    } else {
      setEntryStep('suppliers');
    }
  };

  const saveEntry = async (skipSuppliers=false) => {
    const formFinal = {...form};  // payroll stores manual entry only; global employees added in calcMetrics
    const netForm = formFinal.includeVat ? {
      ...formFinal,
      sales:        Math.round((Number(formFinal.sales)||0)        / VAT_RATE),
      deliveries:   Math.round((Number(formFinal.deliveries)||0)   / VAT_RATE),
      other_income: Math.round((Number(formFinal.other_income)||0) / VAT_RATE),
      includeVat: false,
    } : formFinal;
    let updated = editingId!==null
      ? entries.map((e,i)=>i===editingId?{...netForm}:e)
      : [...entries,{...netForm}];
    updated.sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(updated);
    try {
      await persist(updated, null);
    } catch(err) {
      console.warn("[save] persist error:", err.message);
    }
    setForm({...EMPTY_ENTRY}); setEditingId(null); setSaved(true);
    setTimeout(()=>{setSaved(false); setEntryStep('idle'); setScreen("dashboard");},2000);
    // Check anomalies and send WhatsApp alert if needed
    if(currentBizId && typeof sendWhatsAppNotification === "function") {
      const tgt = businessConfig?.targets || {};
      const foodTarget  = tgt.foodCostPct  || 33;
      const laborTarget = tgt.laborCostPct || 27;
      const s = Number(netForm.sales)||0;
      const food  = s > 0 ? ((Number(netForm.food_cost)||0) / s) * 100  : 0;
      const labor = s > 0 ? ((Number(netForm.payroll)||0)   / s) * 100  : 0;
      const bizName = businessConfig?.businessName || "המסעדה";
      const alerts = [];
      if(food  > foodTarget  + 2) alerts.push(`🍽️ *עלות מזון:* ${food.toFixed(1)}% (יעד ${foodTarget}%)`);
      if(labor > laborTarget + 2) alerts.push(`👥 *עלות עבודה:* ${labor.toFixed(1)}% (יעד ${laborTarget}%)`);
      if(s > 0 && s < 5000) alerts.push(`📉 *מחזור נמוך:* ₪${Math.round(s).toLocaleString("he-IL")}`);
      if(alerts.length > 0) {
        const sep = "---";
      const msg = ["🚨 *התראת חריגה -- "+bizName+"*", "📅 "+netForm.date, sep, ...alerts, sep, "_Marjin_"].join("\n");
        sendWhatsAppNotification(currentBizId, msg, getWhatsAppTarget(businessConfig));
      }
    }
  };

  const deleteEntry = i => { const u=entries.filter((_,idx)=>idx!==i); setEntries(u); persist(u,null); };

  // Filter entries to current month only -- dashboard always shows current month
  // Derive which businesses this user can see
  const isSuperOwner = loggedInUser?.role === "super_owner" || loggedInUser?.role === "owner";
  const allowedBusinesses = isSuperOwner
    ? businesses
    : businesses.filter(b => (loggedInUser?.allowedBizIds || []).includes(b.id));

  const monthPrefix = `${YEAR}-${MONTH_STR}-`;
  const monthEntries = entries.filter(e => e.date && e.date.startsWith(monthPrefix));
  const metrics = calcMetrics(monthEntries, fixedList, {...businessConfig, suppliers});
  const animatedSales = useCountUp(metrics.totalSales, 900);
  const chart = buildChart(monthEntries);
  const todayEntry = entries.find(e=>e.date===TODAY_STR);

  // Calculate missing supplier data per supplier this month
  const supplierMissingDays = {};
  if(suppliers.length > 0) {
    for(let d=1; d<DAY_OF_MONTH; d++){
      const ds=`${YEAR}-${MONTH_STR}-${String(d).padStart(2,"0")}`;
      const dow=getDateDOW(ds);
      if(dow===6) continue;
      const entry=entries.find(e=>e.date===ds);
      const expected=suppliersOnDay(dow, suppliers);
      expected.forEach(sup=>{
        if(!entry || entry.supplier_payments?.[sup.id] === undefined) {
          supplierMissingDays[sup.id] = (supplierMissingDays[sup.id]||0) + 1;
        }
      });
    }
  }
  const monthLabel = _NOW.toLocaleDateString("he-IL",{month:"long",year:"numeric"});

  // Supplier alerts
  const supplierAlerts = [];
  for(let d=1; d<=DAY_OF_MONTH; d++){
    const ds=`${YEAR}-${MONTH_STR}-${String(d).padStart(2,"0")}`;
    const entry=entries.find(e=>e.date===ds);
    const dow=getDateDOW(ds);
    if(dow===6) continue; // שבת -- לא עובדים
    suppliersOnDay(dow, suppliers).forEach(sup=>{
      const paid=Number(entry?.supplier_payments?.[sup.id]||0);
      if(!paid) supplierAlerts.push({date:ds,day:d,dow,supplier:sup});
    });
  }
  const todayExpected = suppliersOnDay(TODAY_DOW, suppliers);
  const todayMissing = todayExpected.filter(s=>!Number(todayEntry?.supplier_payments?.[s.id]||0));

  if(!loaded) return <div style={{minHeight:"100vh",background:"#F9FAFB",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10}}><div style={{width:32,height:32,background:"#111827",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>M</span></div><div style={{fontSize:13,color:"#9CA3AF",fontWeight:400}}>מתחבר...</div></div>;

  // Login screen -- always shown first, even in new browser
  if(loaded && !loggedInUser) {
    return (
      <LoginScreen
        tenantId={currentBizId || businesses[0]?.id}
        onLogin={(user)=>{
          setLoggedInUser(user);
          // First-login flow: user hasn't set real email/password yet
          if(user.mustCompleteProfile) {
            setMustCompleteProfile(true);
          }
          if(user._tenantId) {
            window._currentTenantId = user._tenantId;
          }
          // Filter businesses to only those this user can access
          const isSuperOwner = user.role === "super_owner" || user.role === "owner";
          const allowed = isSuperOwner ? null : (user.allowedBizIds || []);
          // allowed===null means all; [] means none yet; [ids] means specific
          if(allowed !== null && allowed.length > 0) {
            // Will be applied after businesses are loaded -- store on user
            setLoggedInUser({...user, _allowedBizIds: allowed});
          }
          if(user._tenantId) {
            // Load businesses and pick the right bizId (NOT tenantId)
            const resolveAndSet = (bizList) => {
              if(!bizList || bizList.length === 0) return;
              const uid2 = window.storage.getUid?.();
              let target = bizList[0].id;
              try {
                const cached2 = uid2 ? localStorage.getItem("marjin_biz_" + uid2) : null;
                if(cached2 && bizList.find(b => b.id === cached2)) target = cached2;
              } catch(_){}
              setCurrentBizId(target);
            };
            if(businesses.length > 0) {
              resolveAndSet(businesses);
            } else {
              window.storage.get("app-businesses", true).then(rb => {
                if(rb) {
                  try {
                    const bizList = JSON.parse(rb.value);
                    setBusinesses(bizList);
                    resolveAndSet(bizList);
                  } catch(_){}
                }
              }).catch(()=>{});
            }
          } else if(businesses.length === 1) {
            setCurrentBizId(businesses[0].id);
          }
          if(user.role==="staff") setScreen("shifts");
        }}
      />
    );
  }

  // First login — complete profile (email + new password)
  if(loaded && loggedInUser && mustCompleteProfile) {
    return (
      <ProfileCompletionScreen
        user={loggedInUser}
        onComplete={async ({ email }) => {
          // Update user record in Firebase
          const updatedUser = { ...loggedInUser, email, mustCompleteProfile: false };
          const updatedUsers = appUsers.map(u =>
            u.id === loggedInUser.id ? updatedUser : u
          );
          setAppUsers(updatedUsers);
          setLoggedInUser(updatedUser);
          // Now the user is authenticated — repair any RTDB writes that failed during creation
          const safeWrite = async (path, val) => {
            try { await window._rtdbSet(path, val); } catch(_) {}
          };
          if(loggedInUser.username && window._currentTenantId) {
            const uname = loggedInUser.username.toLowerCase();
            const tid   = window._currentTenantId;
            const uid   = loggedInUser.firebaseUid;
            await safeWrite(`username_index/${uname}`, { tenantId: tid, email });
            await safeWrite(`tenants/${tid}/lookup/${uname}`, { email, firebaseUid: uid });
            await safeWrite(`tenants/${tid}/members/${uid}`, true);
            await safeWrite(`tenants/${tid}/roles/${uid}`, loggedInUser.role);
            await safeWrite(`user_tenants/${uid}`, tid);
          }
          try { await window.storage.set("app-users", JSON.stringify(updatedUsers), true); } catch(_) {}
          setMustCompleteProfile(false);
        }}
      />
    );
  }

  // First time setup -- only if truly no business (not just slow load on mobile)
  if(loaded && loggedInUser && businesses.length === 0 && !currentBizId) {
    return (
      <SetupWizard
        initial={businessConfig} initialSuppliers={[]} initialFixed={FIXED_EXPENSES_DEFAULT}
        onComplete={(cfg, sups, fixed, firstOwner) => { completeSetup(cfg, sups, fixed, firstOwner); }}
        onCancel={null} isFirstSetup={true}
      />
    );
  }

  // Business selector -- multiple businesses
  // Full-page selector only when no business selected yet
  if(loaded && loggedInUser && !currentBizId && businesses.length > 0) {
    return (
      <BusinessSelector
        businesses={allowedBusinesses}
        userName={loggedInUser.name}
        isSuperOwner={isSuperOwner}
        onSelect={(id) => {
          setSetupDone(true);
          setCurrentBizId(id);
          setShowBizSelect(false);
          const uid = window.storage.getUid?.();
          if(uid) window._rtdbSet(`user_active_biz/${uid}`, id).catch(()=>{});
        }}
        onDelete={async (id) => {
          const updated = businesses.filter(b => b.id !== id);
          setBusinesses(updated);
          try { await window.storage.set("app-businesses", JSON.stringify(updated), true); } catch(_){}
        }}
        onAdd={() => { setCurrentBizId(null); setShowSetup(true); setShowBizSelect(false); }}
      />
    );
  }

  // Setup for this business
  // When switching business — skip all guards and show dashboard with modal
  if(showBizSelect && currentBizId) { /* fall through to main return with modal */ }
  else if(loaded && loggedInUser && currentBizId && (!setupDone || showSetup) && !showBizSelect) return (
    <SetupWizard
      initial={businessConfig}
      initialSuppliers={suppliers}
      initialFixed={fixedList}
      onComplete={async (cfg, sups, fixed) => {
        // EDIT existing business — do NOT create new bizId
        const bizId = currentBizId;
        setBusinessConfig(cfg);
        setSuppliers(sups);
        if(fixed) setFixedList(fixed);
        // Update business name in list
        const updatedBizList = businesses.map(b => b.id===bizId ? {...b, name:cfg.businessName||b.name} : b);
        setBusinesses(updatedBizList);
        try { await window.storage.set("app-businesses", JSON.stringify(updatedBizList), true); } catch(e){ console.error(e); }
        try { await window.storage.set(`biz:${bizId}:config`, JSON.stringify(cfg), true); } catch(e){ console.error(e); }
        try { await window.storage.set(`biz:${bizId}:suppliers`, JSON.stringify(sups), true); } catch(e){ console.error(e); }
        if(fixed) { try { await window.storage.set(`biz:${bizId}:fixed`, JSON.stringify(fixed), true); } catch(e){ console.error(e); } }
        setShowSetup(false);
        setSetupDone(true);
      }}
      onCancel={setupDone ? ()=>setShowSetup(false) : null}
      isFirstSetup={false}
    />
  );

  // Add new business (no currentBizId but user is logged in)
  // Add new business -- show setup whenever showSetup=true and logged in
  if(loaded && loggedInUser && showSetup && !showBizSelect) return (
    <SetupWizard
      initial={{businessName:"",rentPct:0,royaltyPct:0,hasRoyalty:false,targets:{salesGrowthPct:5,foodCostPct:33,laborCostPct:27}}}
      initialSuppliers={[]} initialFixed={FIXED_EXPENSES_DEFAULT}
      onComplete={(cfg, sups, fixed) => { completeSetup(cfg, sups, fixed, null); }}
      onCancel={() => { setShowSetup(false); setShowBizSelect(true); }}
      isFirstSetup={false}
    />
  );

  // אם אחמש מחובר ונמצא במסך שאין לו גישה -- הפנה למשמרות
  if(!showBizSelect && currentUser && screen !== "shifts" && !(currentUser.permissions||[]).includes(screen)) {
    // use effect-like redirect without hooks violation: just render shifts
    return (
        <div className="app">
        <header className="app-header" style={{minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:24,height:24,background:"#111827",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{color:"#fff",fontSize:11,fontWeight:700}}>M</span>
            </div>
            <h1 className="app-title">{businessConfig.businessName||"Marjin"}</h1>
          </div>
          <div style={{fontSize:12,color:"#6B7280",padding:"5px 10px",borderRadius:5,border:"1px solid #E5E7EB",background:"#F9FAFB"}}>
            {currentUser.name}
          </div>
        </header>
        <nav className="app-nav">
          <div className="app-nav-inner">
            <button className="nav-tab is-red" onClick={()=>setScreen("shifts")}>משמרות</button>
            {(currentUser.permissions||[]).map(s=>{
              const lbl={"dashboard":"סקירה","forecast":"תחזית","foodcost":"פוד קוסט","history":"היסטוריה","fixed":"קבועות"}[s];
              return lbl ? <button key={s} className={`nav-tab ${screen===s?"is-active":""}`} onClick={()=>setScreen(s)}>{lbl}</button> : null;
            })}
          </div>
        </nav>
        <ShiftManagerEmbed currentUser={currentUser} setCurrentUser={setCurrentUser} onNavigate={s=>setScreen(s)} appUsers={appUsers} saveAppUsers={saveAppUsers} bizId={currentBizId||""}/>
      </div>
    );
  }

  return (
    <div dir="rtl" className="app">
      <div /><div />

      {/* Business Switch Modal */}
      {showBizSelect && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowBizSelect(false)}>
          <div style={{background:"#fff",borderRadius:8,padding:"24px",width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,0.12)",fontFamily:"'Heebo',sans-serif",direction:"rtl",border:"1px solid #E5E7EB"}} onClick={e=>e.stopPropagation()}>
            <div style={{marginBottom:20}}>
              <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"#111827"}}>בחירת סניף</h2>
            </div>
            {allowedBusinesses.map(biz => (
              <div key={biz.id} style={{marginBottom:6}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <button onClick={()=>{ setShowBizSelect(false); setCurrentBizId(biz.id); const uid=window.storage.getUid?.(); if(uid) window._rtdbSet("user_active_biz/"+uid, biz.id).catch(()=>{}); }}
                    style={{flex:1,padding:"12px 14px",background:biz.id===currentBizId?"#F9FAFB":"#FFFFFF",border:biz.id===currentBizId?"1px solid #111827":"1px solid #E5E7EB",borderRadius:8,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between",fontWeight:600,fontSize:14,color:"#111827"}}>
                    {biz.name}
                    {biz.id===currentBizId && <span style={{fontSize:11,color:"#6B7280",fontWeight:400}}>פעיל</span>}
                  </button>
                  {isSuperOwner && (
                    <button onClick={async()=>{ if(!window.confirm("למחוק את "+biz.name+"?")) return; const updated=businesses.filter(b=>b.id!==biz.id); setBusinesses(updated); try{await window.storage.set("app-businesses",JSON.stringify(updated),true);}catch(_){} if(biz.id===currentBizId) setShowBizSelect(false); }}
                      style={{padding:"8px 10px",background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:8,color:"#9CA3AF",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}><IcoTrash/></button>
                  )}
                </div>
              </div>
            ))}
            <button onClick={()=>{ setShowBizSelect(false); setCurrentBizId(null); setShowSetup(true); }}
              style={{width:"100%",marginTop:8,padding:"11px",background:"#FFFFFF",border:"1px dashed #D1D5DB",borderRadius:8,color:"#6B7280",fontWeight:500,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
              + הוסף סניף חדש
            </button>
          </div>
        </div>
      )}

      {/* Header */}
      <header className="app-header">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:28,height:28,background:"#111827",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#fff",fontSize:13,fontWeight:700,letterSpacing:-0.5}}>M</span>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <h1 className="app-title">{businessConfig.businessName||"Marjin"}</h1>
              {businesses.length > 1 && <button onClick={(e)=>{ e.stopPropagation(); setShowBizSelect(true); }} style={{fontSize:11,padding:"2px 8px",background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:4,cursor:"pointer",fontFamily:"inherit",color:"#6B7280",fontWeight:500}}>החלף</button>}
            </div>
            <p className="app-sub">{monthLabel} · {DOW_NAMES[TODAY_DOW]}, {DAY_OF_MONTH}/{DAYS_IN_MONTH}</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!currentUser && (
            <>
              <button style={{...S.shiftBtn}} onClick={()=>setShowSetup(true)} title="הגדרות">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
              </button>
              <button className="btn btn-primary" onClick={()=>{setForm({...EMPTY_ENTRY,date:YESTERDAY_STR,security_event:false});setEditingId(null);setEntryStep('revenue');setScreen("entry");}}>
                + הזנת יום
              </button>
            </>
          )}
          {loggedInUser && !currentUser && (
            <div style={{display:"flex",alignItems:"center",gap:8,paddingRight:8,borderRight:"1px solid #E5E7EB"}}>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:12,color:"#111827",fontWeight:600}}>{loggedInUser.name}</div>
                <div style={{fontSize:11,color:"#9CA3AF"}}>{ROLES[loggedInUser.role]?.label||loggedInUser.role}</div>
              </div>
              <button style={{padding:"6px 10px",background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:6,color:"#6B7280",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:500}}
                onClick={()=>{setLoggedInUser(null);try{localStorage.removeItem("marjin-session");}catch(_){}}}>יציאה</button>
            </div>
          )}
        </div>
      </header>

      {/* Nav */}
      {loggedInUser?.role==="staff" && screen!=="shifts" && (() => { setTimeout(()=>setScreen("shifts"),0); return null; })()}
      <nav style={{borderBottom:"1px solid #E5E7EB",background:"#FFFFFF",position:"sticky",top:52,zIndex:40}}>
        <div className="app-nav-inner">
          {[
            {key:"shifts",   label:"משמרות"},
            {key:"dashboard",label:"סקירה"},
            {key:"forecast", label:"תחזית"},
            {key:"foodcost", label:"פוד קוסט"},
            {key:"history",  label:"היסטוריה"},
            {key:"fixed",    label:"קבועות"},
            {key:"users",    label:"משתמשים"},
            {key:"tasks",    label:"משימות"},
            {key:"pettycash",label:"קופה"},
            {key:"employees",label:"כ״א"},
          ].map(({key,label})=>{
            if(key==="dashboard"||key==="forecast"||key==="foodcost") {
              if(loggedInUser?.role==="staff") return null;
              const allowed = !currentUser || (currentUser.permissions||[]).includes(key);
              if(!allowed) return null;
            }
            if(["history","fixed","users","tasks","pettycash","employees"].includes(key)) {
              if(currentUser || loggedInUser?.role==="staff") return null;
              if(key==="users"||key==="tasks"||key==="pettycash"||key==="employees") {
                if(loggedInUser?.role!=="super_owner"&&loggedInUser?.role!=="owner") return null;
              }
            }
            const isActive = screen===key;
            const isShift = key==="shifts";
            return (
              <button key={key} style={{
                ...S.navBtn,
                ...(isActive ? (isShift ? S.navShift : S.navActive) : {}),
              }} onClick={()=>setScreen(key)}>{label}</button>
            );
          })}
        </div>
      </nav>

      {/* ═══ DASHBOARD ═══ */}
      {screen==="dashboard" && (
        <div className="dash">
          {(()=>{
            const tSales   = Math.round((lastYear[MONTH]?.sales||650000)*(1+(cfgTarget(businessConfig,"salesGrowthPct",TARGETS.salesGrowthPct)/100)));
            const tFood    = cfgTarget(businessConfig,"foodCostPct",TARGETS.foodCostPct);
            const tLabor   = cfgTarget(businessConfig,"laborCostPct",TARGETS.laborCostPct);
            const laborPct = metrics.totalSales>0 ? (metrics.totalPayroll/metrics.totalSales)*100 : 0;
            const salesPct = tSales>0 ? Math.min(Math.round((metrics.totalSales/tSales)*100),100) : 0;
            const dayPct   = DAYS_IN_MONTH>0 ? Math.round((DAY_OF_MONTH/DAYS_IN_MONTH)*100) : 0;
            const daysLeft = DAYS_IN_MONTH - DAY_OF_MONTH;
            const fSales   = metrics.totalSales + (DAY_OF_MONTH>0 ? (metrics.totalSales/DAY_OF_MONTH)*daysLeft : 0);
            const fProfit  = fSales*(1-tFood/100-tLabor/100-((businessConfig.rentPct||0)+(businessConfig.hasRoyalty?businessConfig.royaltyPct||0:0))/100)-metrics.TOTAL_FIXED;
            const gap      = Math.round(fSales - tSales);

            const foodBad  = metrics.foodCostPct > tFood + 3;
            const foodWarn = !foodBad && metrics.foodCostPct > tFood;
            const lbrBad   = laborPct > tLabor + 3;
            const lbrWarn  = !lbrBad && laborPct > tLabor;
            const salesWarn= salesPct < 80 && salesPct >= 60;
            const salesBad = salesPct < 60 && salesPct > 0;
            const badgeCls = salesPct < 60 ? "warn" : "ok";
            const hasAlerts = todayMissing.length>0 || orefAlert || weather?.alert;
            const revChart  = chart.map(p=>({...p}));

            return (
              <div className="dash-wrap">

                {/* Status strip */}
                <div className="dash-status">
                  <div className="dash-dot" style={{background:todayEntry?"#D1D5DB":"#F59E0B"}}/>
                  <span style={{color:todayEntry?"#9CA3AF":"#F59E0B"}}>
                    {todayEntry
                      ? `הוזן — ${fmt((Number(todayEntry.sales)||0)+(Number(todayEntry.deliveries)||0))}`
                      : `נתוני ${DOW_NAMES[TODAY_DOW]} טרם הוזנו`}
                  </span>
                  {weather&&!weather.alert&&(
                    <span style={{marginRight:"auto",color:"#D1D5DB"}}>{weather.temp}° · {weather.desc}</span>
                  )}
                  {orefAlert&&(
                    <span style={{color:"#EF4444",fontWeight:600,display:"flex",alignItems:"center",gap:5,marginRight:"auto"}}>
                      <div className="dash-dot" style={{background:"#EF4444",animation:"pulse 1s infinite"}}/>
                      אזעקה פעילה
                    </span>
                  )}
                </div>

                {/* ── 1. KPI row ── */}
                <div className="dash-section kpi-row">
                  {[
                    {label:"הכנסות",    val:fmt(metrics.totalSales),  ctx:salesPct>0?`${salesPct}% מהיעד`:null,      cls:salesBad?"s-bad":salesWarn?"s-warn":""},
                    {label:"יתרת קופה", val:fmt(metrics.lc),           ctx:DAY_OF_MONTH>0?`${fmt(Math.round(metrics.dailyAvg))}/יום`:null, cls:metrics.lc<0?"s-bad":""},
                    {label:"פוד קוסט",  val:metrics.foodCostPct>0?fmtPct(metrics.foodCostPct):"—", ctx:`יעד ${tFood}%`, cls:foodBad?"s-bad":foodWarn?"s-warn":""},
                    {label:"לייבור",    val:laborPct>0?fmtPct(laborPct):"—", ctx:`יעד ${tLabor}%`, cls:lbrBad?"s-bad":lbrWarn?"s-warn":""},
                  ].map(({label,val,ctx,cls},i)=>(
                    <div key={i} className="kpi-card">
                      <div className="kpi-label">{label}</div>
                      <div className={`kpi-val ${cls}`}>{val}</div>
                      {ctx&&<div className="kpi-ctx">{ctx}</div>}
                    </div>
                  ))}
                </div>

                {/* ── 2. HERO card ── */}
                <div className="dash-section">
                  <div className="hero-card">

                    {/* Top: label + big number + badge */}
                    <div className="hero-header">
                      <div className="hero-eyebrow">הכנסות · {MONTH_NAMES[MONTH]}</div>
                      <div className="hero-main">
                        <div className="hero-left">
                          <div className="hero-amount">{fmt(animatedSales)}</div>
                          <div className="hero-target">מתוך יעד {fmt(tSales)} · {daysLeft} ימים נותרו</div>
                        </div>
                        <span className={`hero-badge ${badgeCls}`}>{salesPct}%</span>
                      </div>
                    </div>

                    {/* Progress bar — full width */}
                    <div className="prog-wrap">
                      <div className="prog-track">
                        <div className="prog-fill" style={{width:`${salesPct}%`}}/>
                        <div className="prog-marker" style={{left:`${Math.min(dayPct,99)}%`}}/>
                      </div>
                      <div className="prog-labels">
                        <span>₪0</span>
                        <span>יום {DAY_OF_MONTH} / {DAYS_IN_MONTH}</span>
                        <span>{fmt(tSales)}</span>
                      </div>
                    </div>

                    {/* 3-metric forecast row */}
                    <div className="hm-row">
                      {[
                        {label:"מחזור חזוי", val:fmt(Math.round(fSales)),
                          sub:gap>=0?`+${fmt(gap)} מעל יעד`:`${fmt(Math.abs(gap))} מתחת ליעד`},
                        {label:"תחזית קופה", val:fmt(Math.round(metrics.forecast)),
                          sub:`${fmt(Math.round(metrics.dailyAvg))} / יום ממוצע`},
                        {label:"רווח חזוי",  val:fmt(Math.round(fProfit)),
                          sub:fSales>0?fmtPct((fProfit/fSales)*100)+" מהמחזור":"—",
                          neg:fProfit<0},
                      ].map(({label,val,sub,neg},i)=>(
                        <div key={i} className="hm-cell">
                          <div className="hm-label">{label}</div>
                          <div className={`hm-val${neg?" neg":""}`}>{val}</div>
                          {sub&&<div className="hm-sub">{sub}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* ── 3. Alerts (conditional) ── */}
                {hasAlerts&&(
                  <div className="dash-section">
                    <div className="alert-card">
                      {[
                        orefAlert&&{dot:"#EF4444",pulse:true,
                          ttl:"אזעקה פעילה — פיקוד העורף",
                          body:orefAlert.cities.slice(0,4).join(" · ")+(orefAlert.cities.length>4?` +${orefAlert.cities.length-4}`:"")},
                        weather?.alert&&{dot:"#F59E0B",pulse:false,

                        {/* ═══ FOOD COST ═══ */}

            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1.5}}>{editingId!==null?"עריכת יום":"הזנת יום חדש"}</div>
                <h2 className="page-head" style={{margin:0}}>הזנת יום</h2>
              </div>
              
            </div>

            <label className="label">תאריך</label>
            <input className="input" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>

            <div className="form-sec">מכירות</div>

            {/* VAT Toggle */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 14px",background:form.includeVat?"#FFF7ED":"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#111827"}}>סכומים {form.includeVat?"כוללים":"אינם כוללים"} מעמ</div>
                <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{form.includeVat?"המערכת תחשב נטו אוטומטית (÷1.18)":"הכנס סכומים נטו ללא מע״מ"}</div>
              </div>
              <button onClick={()=>setForm(f=>({...f,includeVat:!f.includeVat}))}
                style={{padding:"6px 12px",borderRadius:5,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:12,background:"#111827",color:"#fff"}}>
                {form.includeVat?"עם מעמ":"ללא מעמ"}
              </button>
            </div>

            <label className="label">קופה (₪){form.includeVat?" -- ברוטו עם מע״מ":""}</label>
            <input className="input" style={{fontSize:20,fontWeight:700}} type="number" inputMode="numeric" placeholder="0" value={form.sales} onChange={e=>setForm(f=>({...f,sales:e.target.value}))} autoFocus/>
            <label className="label">משלוחים / Wolt / Ten Bis (₪)</label>
            <input className="input" type="number" inputMode="numeric" placeholder="0" value={form.deliveries} onChange={e=>setForm(f=>({...f,deliveries:e.target.value}))}/>
            {(()=>{
              const rawSales=(Number(form.sales)||0)+(Number(form.deliveries)||0)+(Number(form.other_income)||0);
              const del=Number(form.deliveries)||0;
              const pct = rawSales>0 ? ((del/rawSales)*100).toFixed(1) : null;
              const fee = Math.round(del*0.25);
              return del>0 && pct ? (
                <div style={{display:"flex",gap:8,marginBottom:10,marginTop:-6}}>
                  <div style={{flex:1,background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:5,padding:"7px 11px",fontSize:12}}>
                    <span style={{color:"#9CA3AF"}}>% ממחזור: </span>
                    <span style={{fontWeight:600,color:"#D97706"}}>{pct}%</span>
                  </div>
                  <div style={{flex:1,background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"8px 12px",fontSize:12}}>
                    <span style={{color:"#9CA3AF"}}>עמלת פלטפורמה 25%: </span>
                    <span style={{fontWeight:600,color:"#DC2626"}}>{fmt(fee)}</span>
                  </div>
                </div>
              ) : null;
            })()}
            <label className="label">הכנסה אחרת (₪)</label>
            <input className="input" type="number" inputMode="numeric" placeholder="0" value={form.other_income} onChange={e=>setForm(f=>({...f,other_income:e.target.value}))}/>

            <div className="form-sec">הוצאות כ״א</div>
            {(()=>{
              const globalEmps = (businessConfig.employees||[]).filter(e=>Number(e.monthlySalary)>0);
              const globalDaily = globalEmps.reduce((a,e)=>a+Math.round(Number(e.monthlySalary)/DAYS_IN_MONTH),0);
              return (<>
                {globalEmps.length>0 && (
                  <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:"12px 14px",marginBottom:10}}>
                    <div style={{fontSize:10,color:"#6B7280",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>עובדים גלובלי -- אוטומטי</div>
                    {globalEmps.map(emp=>(
                      <div key={emp.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                        <span style={{color:"#6B7280"}}>{emp.name} <span style={{color:"#9CA3AF"}}>{emp.role}</span></span>
                        <span style={{fontWeight:700,color:"#6B7280"}}>{Math.round(Number(emp.monthlySalary)/DAYS_IN_MONTH).toLocaleString()} ₪</span>
                      </div>
                    ))}
                    <div style={{borderTop:"1px solid #E5E7EB",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,color:"#6B7280"}}>
                      <span>סה״כ גלובלי</span><span>{globalDaily.toLocaleString()} ₪</span>
                    </div>
                  </div>
                )}
                {/* עובדים שעתיים — הזנה יומית לפי שם */}
                {(()=>{
                  const hourlyEmps = (businessConfig.employees||[]).filter(e=>e.type==="hourly");
                  if(!hourlyEmps.length) return null;
                  return (
                    <div style={{background:"#F9FAFB",border:"1px solid #BFDBFE",borderRadius:8,padding:"12px 14px",marginBottom:10}}>
                      <div style={{fontSize:11,color:"#6B7280",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>עובדים שעתיים — הזן עלות יומית</div>
                      {hourlyEmps.map(emp=>{
                        const val = (form.hourly_payroll||{})[emp.id]||"";
                        return (
                          <div key={emp.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{flex:1,fontSize:13,color:"#6B7280"}}>{emp.name} <span style={{color:"#9CA3AF",fontSize:11}}>{emp.role}</span></span>
                            <input type="number" inputMode="numeric" placeholder="₪"
                              value={val}
                              onChange={e=>setForm(f=>({...f,hourly_payroll:{...(f.hourly_payroll||{}),[emp.id]:e.target.value}}))}
                              style={{width:90,border:"1px solid #D1D5DB",borderRadius:6,padding:"7px 10px",fontSize:13,fontFamily:"inherit",color:"#111827",background:"#FFFFFF",textAlign:"left",outline:"none"}}/>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
                <label className="label">עלות שעתיים / נוכחות יומית נוספת (₪)</label>
                <input className="input" type="number" inputMode="numeric" placeholder="0" value={form.payroll} onChange={e=>setForm(f=>({...f,payroll:e.target.value}))}/>
                {(globalDaily+(Number(form.payroll)||0))>0 && (
                  <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:6,padding:"9px 13px",display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600,marginBottom:7}}>
                    <span style={{color:"#6B7280"}}>סה״כ שכר היום</span>
                    <span style={{color:"#111827"}}>{(globalDaily+(Number(form.payroll)||0)).toLocaleString()} ₪</span>
                  </div>
                )}
              </>);
            })()}
            <label className="label">הוצאה אחרת (₪)</label>
            <input className="input" type="number" inputMode="numeric" placeholder="0" value={form.other_expense} onChange={e=>setForm(f=>({...f,other_expense:e.target.value}))}/>
            {/* Weather impact + security */}
            {(weather?.alert||form.weather_impact||form.security_event) && (
              <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:8}}>
                  גורמי השפעה חיצוניים
                  {orefAlert&&<span style={{marginRight:8,fontSize:11,background:"#DC2626",color:"#fff",borderRadius:6,padding:"1px 8px"}}>אזעקה פעילה עכשיו</span>}
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                  {["גשם","חום קיצוני","אזעקות","מבצע צבאי","פיגוע","אחר"].map((tag)=>(
                    <button key={tag} onClick={()=>setForm(f=>({...f,weather_impact:f.weather_impact===tag?"":tag}))}
                      style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${form.weather_impact===tag?"#DC2626":"#FECACA"}`,background:form.weather_impact===tag?"#DC2626":"#FEF2F2",color:form.weather_impact===tag?"#fff":"#DC2626",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      {tag}
                    </button>
                  ))}
                </div>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#6B7280",cursor:"pointer"}}>
                  <input type="checkbox" checked={!!form.security_event} onChange={e=>setForm(f=>({...f,security_event:e.target.checked}))} style={{width:16,height:16}}/>
                  <span>יום שכלל אירוע ביטחוני / מלחמה</span>
                </label>
              </div>
            )}
            {!(weather?.alert||form.weather_impact||form.security_event) && (
              <button onClick={()=>setForm(f=>({...f,weather_impact:"אחר"}))}
                style={{width:"100%",background:"none",border:"1px dashed #D1D5DB",borderRadius:10,color:"#9CA3AF",padding:"8px",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>
                + סמן השפעת מזג אוויר / ביטחון
              </button>
            )}
            <label className="label">הערות</label>
            <textarea className="input" style={{minHeight:52,resize:"vertical"}} placeholder="חריגות, אירועים..." value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>

            {(()=>{
              const rawInc=(Number(form.sales)||0)+(Number(form.deliveries)||0)+(Number(form.other_income)||0);
              const netInc = form.includeVat ? Math.round(rawInc/VAT_RATE) : rawInc;
              if(!rawInc) return null;
              return (
                <div style={{...S.preview,background:"#F9FAFB",border:"1px solid #E5E7EB",marginBottom:4}}>
                  <div className="flex jbet mb2"><span style={{fontWeight:600}}>סה״כ הכנסות{form.includeVat?" (נטו)":""}</span><span style={{color:"#16A34A",fontWeight:700,fontSize:14}}>{fmt(netInc)}</span></div>
                </div>
              );
            })()}

            {saved && <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:6,padding:"10px 14px",textAlign:"center",fontWeight:600,color:"#16A34A",fontSize:13,marginBottom:8}}>נשמר בהצלחה</div>}
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <button className="btn btn-primary" style={{ opacity: saved ? 0.6 : 1}} onClick={()=>!saved && saveEntry()}>{saved ? "נשמר..." : "שמור"}</button>
              <button className="btn btn-secondary" onClick={()=>{setForm({...EMPTY_ENTRY});setEditingId(null);setEntryStep('idle');setScreen("dashboard");}}>ביטול</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══ HISTORY ═══ */}
      {screen==="history" && (
        <div className="screen" style={{padding:"16px 20px 80px",background:"#F8FAFC",minHeight:"100vh"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#0F172A",letterSpacing:"-.3px"}}>היסטוריה יומית</div>
              <div style={{fontSize:12,color:"#94A3B8",marginTop:3}}>{entries.length} ימים מוזנים · {MONTH_NAMES[MONTH]}</div>
            </div>
            {entries.length>0&&(
              <button onClick={()=>{if(window.confirm("למחוק את כל הרשומות?")){ const u=[];setEntries(u);persist(u,null);}}}
                style={{background:"none",border:"none",color:"#CBD5E1",padding:"4px 8px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                מחק הכל
              </button>
            )}
          </div>

          {entries.length===0
            ? <div className="empty">
                <div style={{width:40,height:40,border:"1px solid #E5E7EB",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",color:"#9CA3AF",fontSize:18}}>≡</div>
                <p style={{margin:"0 0 16px",fontSize:13,color:"#94A3B8"}}>אין רשומות עדיין</p>
                <button className="btn btn-primary" style={{flex:"none",padding:"9px 20px"}} onClick={()=>{setForm({...EMPTY_ENTRY,date:YESTERDAY_STR,security_event:false});setEditingId(null);setEntryStep('revenue');setScreen("entry");}}>הזן יום ראשון</button>
              </div>
            : (()=>{
                const sorted = [...entries].map((e,i)=>({...e,_idx:i})).reverse();
                const today = TODAY_STR;
                const sevenDaysAgo = (() => { const d=new Date(_NOW); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();

                // Determine status for each entry
                const getStatus = (e) => {
                  const inc = (Number(e.sales)||0)+(Number(e.deliveries)||0);
                  const suppTotal = e.supplier_payments ? Object.values(e.supplier_payments).reduce((a,b)=>a+(Number(b)||0),0) : 0;
                  const hasSales = inc > 0;
                  const hasExpenses = suppTotal > 0 || (Number(e.payroll)||0) > 0 || (Number(e.food_cost)||0) > 0;
                  if (hasSales && hasExpenses) return "complete";
                  if (hasSales || hasExpenses) return "partial";
                  return "empty";
                };

                const StatusBadge = ({status}) => {
                  const cfg = {
                    complete: {bg:"#F0FDF4",color:"#15803D",border:"#BBF7D0",label:"הוזן מלא"},
                    partial:  {bg:"#FFFBEB",color:"#B45309",border:"#FDE68A",label:"חסר נתונים"},
                    empty:    {bg:"#FEF2F2",color:"#B91C1C",border:"#FECACA",label:"לא הוזן"},
                  }[status];
                  return (
                    <span style={{
                      fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:999,
                      background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`,
                      letterSpacing:.3,whiteSpace:"nowrap",
                    }}>{cfg.label}</span>
                  );
                };

                const DayCard = ({e}) => {
                  const i = e._idx;
                  const inc = (Number(e.sales)||0)+(Number(e.deliveries)||0)+(Number(e.other_income)||0);
                  const supp = e.supplier_payments ? Object.values(e.supplier_payments).reduce((a,b)=>a+(Number(b)||0),0) : 0;
                  const hourlyPay = e.hourly_payroll ? Object.values(e.hourly_payroll).reduce((a,b)=>a+(Number(b)||0),0) : 0;
                  const exp = supp+(Number(e.payroll)||0)+hourlyPay+(Number(e.other_expense)||0);
                  const net = inc-exp;
                  const status = getStatus(e);
                  const isToday = e.date === today;
                  const dow = DOW_NAMES[getDateDOW(e.date)];

                  return (
                    <div style={{
                      background:"#FFFFFF",borderRadius:14,
                      border:"1px solid rgba(0,0,0,.05)",
                      padding:"16px 18px",marginBottom:8,
                      boxShadow:"0 1px 3px rgba(0,0,0,.04)",
                      transition:"box-shadow .2s ease",
                    }}>
                      {/* Row 1: date + status badge + actions */}
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        {/* Date block */}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:13,fontWeight:700,color:"#0F172A"}}>{e.date}</span>
                            <span style={{fontSize:11,color:"#94A3B8"}}>{dow}</span>
                            {isToday&&<span style={{fontSize:10,fontWeight:600,color:"#6366F1",background:"#EEF2FF",padding:"2px 7px",borderRadius:999,border:"1px solid #C7D2FE"}}>היום</span>}
                          </div>
                          {/* Tags */}
                          {(e.weather_impact||e.security_event||e.notes)&&(
                            <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}>
                              {e.weather_impact&&<span style={{fontSize:10,background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:4,padding:"1px 6px",color:"#C2410C"}}>{e.weather_impact}</span>}
                              {e.security_event&&<span style={{fontSize:10,background:"#F5F3FF",border:"1px solid #DDD6FE",borderRadius:4,padding:"1px 6px",color:"#7C3AED"}}>ביטחון</span>}
                              {e.notes&&<span style={{fontSize:10,color:"#94A3B8",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140}}>{e.notes}</span>}
                            </div>
                          )}
                        </div>
                        <StatusBadge status={status}/>
                      </div>

                      {/* Row 2: metrics */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0,background:"#F8FAFC",borderRadius:8,overflow:"hidden",border:"1px solid #F1F5F9",marginBottom:12}}>
                        {[
                          {label:"הכנסות",  val:fmt(inc),   color:"#1E293B", weight:700},
                          {label:"הוצאות",  val:fmt(exp),   color:"#64748B", weight:500},
                          {label:"יתרה",    val:fmt(net),   color:net>=0?"#15803D":"#B91C1C", weight:700},
                        ].map(({label,val,color,weight},mi)=>(
                          <div key={mi} style={{
                            padding:"10px 14px",
                            borderLeft:mi>0?"1px solid #E2E8F0":"none",
                          }}>
                            <div style={{fontSize:10,color:"#94A3B8",marginBottom:4,letterSpacing:.3,textTransform:"uppercase"}}>{label}</div>
                            <div style={{fontSize:14,fontWeight:weight,color,letterSpacing:"-.4px"}}>{val}</div>
                          </div>
                        ))}
                      </div>

                      {/* Row 3: actions */}
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <button
                          onClick={()=>{setForm({...e});setEditingId(i);setEntryStep('revenue');setScreen("entry");}}
                          style={{
                            padding:"6px 14px",background:"#F8FAFC",border:"1px solid #E2E8F0",
                            borderRadius:8,fontSize:12,fontWeight:500,color:"#475569",
                            cursor:"pointer",fontFamily:"inherit",transition:"all .15s",
                          }}>
                          ערוך
                        </button>
                        {status==="partial"&&(
                          <button
                            onClick={()=>{setForm({...e});setEditingId(i);setEntryStep('revenue');setScreen("entry");}}
                            style={{
                              padding:"6px 14px",background:"#FFFBEB",border:"1px solid #FDE68A",
                              borderRadius:8,fontSize:12,fontWeight:600,color:"#B45309",
                              cursor:"pointer",fontFamily:"inherit",
                            }}>
                            השלם נתונים
                          </button>
                        )}
                        {status==="empty"&&(
                          <button
                            onClick={()=>{setForm({...EMPTY_ENTRY,date:e.date});setEditingId(i);setEntryStep('revenue');setScreen("entry");}}
                            style={{
                              padding:"6px 14px",background:"#FEF2F2",border:"1px solid #FECACA",
                              borderRadius:8,fontSize:12,fontWeight:600,color:"#B91C1C",
                              cursor:"pointer",fontFamily:"inherit",
                            }}>
                            הזן נתונים
                          </button>
                        )}
                        <button
                          onClick={()=>deleteEntry(i)}
                          style={{marginRight:"auto",background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",padding:"4px 6px",fontFamily:"inherit",fontSize:12}}>
                          מחק
                        </button>
                      </div>
                    </div>
                  );
                };

                // Split into recent (7 days) and older
                const recent = sorted.filter(e=>e.date>=sevenDaysAgo);
                const older  = sorted.filter(e=>e.date<sevenDaysAgo);

                return (
                  <>
                    {/* Stats summary strip */}
                    {(()=>{
                      const incomplete = sorted.filter(e=>getStatus(e)!=="complete").length;
                      const complete   = sorted.filter(e=>getStatus(e)==="complete").length;
                      return (
                        <div style={{display:"flex",gap:10,marginBottom:20}}>
                          {[
                            {label:"ימים שהוזנו",  val:complete,   color:"#15803D",bg:"#F0FDF4",border:"#BBF7D0"},
                            {label:"דורשים השלמה", val:incomplete, color:"#B45309",bg:"#FFFBEB",border:"#FDE68A"},
                          ].map(({label,val,color,bg,border},i)=>(
                            <div key={i} style={{flex:1,background:bg,border:`1px solid ${border}`,borderRadius:12,padding:"12px 16px"}}>
                              <div style={{fontSize:11,color,fontWeight:500,marginBottom:4}}>{label}</div>
                              <div style={{fontSize:22,fontWeight:800,color,letterSpacing:"-1px"}}>{val}</div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}

                    {/* Recent days */}
                    {recent.length>0&&(
                      <>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                          <span style={{fontSize:11,fontWeight:600,color:"#64748B",textTransform:"uppercase",letterSpacing:".5px"}}>7 ימים אחרונים</span>
                          <div style={{flex:1,height:1,background:"#E2E8F0"}}/>
                        </div>
                        {recent.map(e=><DayCard key={e.date} e={e}/>)}
                      </>
                    )}

                    {/* Older days */}
                    {older.length>0&&(
                      <>
                        <div style={{display:"flex",alignItems:"center",gap:10,margin:"20px 0 12px"}}>
                          <span style={{fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".5px"}}>ימים ישנים יותר</span>
                          <div style={{flex:1,height:1,background:"#E2E8F0"}}/>
                        </div>
                        {older.map(e=><DayCard key={e.date} e={e}/>)}
                      </>
                    )}
                  </>
                );
              })()
          }
        </div>
      )}

      {/* ═══ FORECAST ═══ */}
      {screen==="forecast" && (
        <div className="screen">
          <ForecastScreen entries={entries} businessConfig={businessConfig} metrics={metrics} lastYear={lastYear} saveLastYear={saveLastYear} currentMonth={MONTH} />
        </div>
      )}

      {/* ═══ SHIFTS ═══ */}
      {screen==="shifts" && (
        <ShiftManagerEmbed
          currentUser={currentUser}
          setCurrentUser={setCurrentUser}
          onNavigate={s=>setScreen(s)}
          appUsers={appUsers}
          saveAppUsers={saveAppUsers}
          bizId={currentBizId||""}
        />
      )}

      {/* ═══ TASKS (בעלים בלבד) ═══ */}
      {screen==="pettycash" && !currentUser && (
        <div className="screen">
          <PettyCashScreen items={pettyCash} saveItems={savePettyCash}/>
        </div>
      )}

      {screen==="employees" && !currentUser && (
        <div className="screen">
          <EmployeesScreen businessConfig={businessConfig} saveBusinessConfig={saveBusinessConfig} entries={entries} persist={persist} fixedList={fixedList}/>
        </div>
      )}

      {screen==="tasks" && !currentUser && (
        <div className="screen">

              <div>
                <h2 style={{margin:0,fontSize:14,fontWeight:700,color:"#111827"}}>משתמשים</h2>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#9CA3AF"}}>{appUsers.length} משתמשים רשומים</p>
