          <div className="card card-p">
            <div className="flex jbet icenter" style={{marginBottom:14}}>
              <div>
                <h2 style={{margin:0,fontSize:14,fontWeight:700,color:"#111827"}}>הוצאות קבועות</h2>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#9CA3AF"}}>שכ״ד: {businessConfig.rentType==="fixed" ? `${(businessConfig.rentFixed||0).toLocaleString()} ₪` : `${businessConfig.rentPct||0}% ממחזור`}</p>
              </div>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:18,fontWeight:700,color:"#111827",letterSpacing:-0.5}}>{fmt(metrics.TOTAL_FIXED)}</div>
                <div style={{fontSize:10,color:"#9CA3AF",marginTop:1}}>סה״כ חודשי</div>
              </div>
            </div>
            {fixedList.map((f,i)=>(
              <div key={f.id} style={{marginBottom:6,padding:"10px 12px",background:f.disabled?"#F9FAFB":"#FFFFFF",borderRadius:6,border:"1px solid #E5E7EB",opacity:f.disabled?0.5:1}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  {f.rentPct&&<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 6px",borderRadius:3,flexShrink:0}}>שכ״ד {businessConfig.rentType==="fixed"?`${(businessConfig.rentFixed||0).toLocaleString()}₪`:`${businessConfig.rentPct||0}%`}</span>}
                  {f.royaltyPct&&businessConfig.hasRoyalty&&<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",padding:"1px 6px",borderRadius:3,flexShrink:0}}>תמלוגים {businessConfig.royaltyPct||0}%</span>}
                  <input className="input" style={{marginBottom:0,flex:1,padding:"5px 9px",fontSize:12,textDecoration:f.disabled?"line-through":"none",color:f.disabled?"#9CA3AF":"#111827"}} value={f.name}
                    onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,name:e.target.value}:x);setFixedList(u);persist(entries,u);}}/>
                  <button title={f.disabled?"הפעל":"בטל"}
                    onClick={()=>{const u=fixedList.map((x,j)=>j===i?{...x,disabled:!x.disabled}:x);setFixedList(u);persist(entries,u);}}
                    style={{background:"none",border:`1px solid ${"#E5E7EB"}`,borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:11,flexShrink:0,color:"#6B7280",fontFamily:"inherit"}}>
                    {f.disabled?"הפעל":"בטל"}
                  </button>
                  {!f.rentPct&&!f.royaltyPct&&(
                    <button title="מחק"
                      onClick={()=>{if(window.confirm(`למחוק "${f.name}"?`)){const u=fixedList.filter((_,j)=>j!==i);setFixedList(u);persist(entries,u);}}}
                      style={{background:"none",border:"none",padding:"3px 5px",cursor:"pointer",fontSize:11,flexShrink:0,color:"#9CA3AF",fontFamily:"inherit"}}><IcoTrash/></button>
                  )}
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {f.rentPct
                    ? <div className="input" style={{padding:"5px 9px",flex:1,marginBottom:0,color:"#16A34A",fontSize:12}}>≈ {businessConfig.rentType==="fixed"?fmt(businessConfig.rentFixed||0):fmt(Math.round(metrics.totalSales*(businessConfig.rentPct||0)/100))}</div>
                    : f.royaltyPct
                    ? <div className="input" style={{padding:"5px 9px",flex:1,marginBottom:0,color:"#6B7280",fontSize:12}}>≈ {fmt(Math.round(metrics.totalSales*(businessConfig.royaltyPct||0)/100))}</div>
                    : <input className="input" style={{padding:"5px 9px",flex:1,marginBottom:0}} type="number" inputMode="decimal" placeholder="₪" value={f.amount||""}
                        onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,amount:Number(e.target.value)}:x);setFixedList(u);persist(entries,u);}}/>
                  }
                  <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                    <span style={{color:"#9CA3AF",fontSize:11}}>יום</span>
                    <input className="input" style={{padding:"5px 7px",width:44,marginBottom:0,textAlign:"center",fontSize:12}} type="number" min={1} max={31} value={f.dueDay}
                      onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,dueDay:Number(e.target.value)}:x);setFixedList(u);persist(entries,u);}}/>
                  </div>
                </div>
              </div>
            ))}
            <button style={{...S.cancelBtn,width:"100%",marginTop:4,textAlign:"center"}}
              onClick={()=>{const u=[...fixedList,{id:Date.now(),name:"הוצאה חדשה",amount:0,dueDay:1,rentPct:false}];setFixedList(u);persist(entries,u);}}>
              + הוסף הוצאה
            </button>
          </div>
        </div>
      )}

    </div>
  );
}


// ─── Employees Screen ─────────────────────────────────────────────────────────
function EmployeesScreen({ businessConfig, saveBusinessConfig, entries, persist, fixedList }) {
  const employees = businessConfig.employees || [];
  const ROLES_EMP = ["מנהל משמרת","טבח","עוזר טבח","מלצר","ברמן","קופאי","כלים","ניקיון","אחר"];
  const globalEmps = employees.filter(e=>e.type==="global"&&Number(e.monthlySalary)>0);

  // לוח חודשי
  const [empMonth, setEmpMonth] = useState(`${YEAR}-${MONTH_STR}`);
  const [emY, emM] = empMonth.split("-").map(Number);
  const emDays = new Date(emY, emM, 0).getDate();
  const emLabel = new Date(emY, emM-1, 1).toLocaleDateString("he-IL",{month:"long",year:"numeric"});
  const prevMonth = () => { const d=new Date(emY,emM-2,1); setEmpMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); };
  const nextMonth = () => { const d=new Date(emY,emM,1); setEmpMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); };
  const canNext = emY < YEAR || (emY===YEAR && emM <= MONTH);

  const getDailyLabor = (date) => {
    const e = entries.find(x=>x.date===date);
    return e?.payroll||"";
  };
  const setDailyLabor = async (date, val) => {
    const existing = entries.find(e=>e.date===date);
    let newEntries;
    if(existing) {
      newEntries = entries.map(e=>e.date===date?{...e,payroll:val}:e);
    } else {
      newEntries = [...entries, {...EMPTY_ENTRY, date, payroll:val}];
    }
    if(typeof persist==="function") await persist(newEntries, fixedList);
  };

  const globalDailyTotal = globalEmps.reduce((a,e)=>a+Math.round(Number(e.monthlySalary)/emDays),0);

  // ניהול עובדים גלובליים
  const [showGlobal, setShowGlobal] = useState(false);
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({name:"",role:"מלצר",type:"global",monthlySalary:""});
  const inp = {width:"100%",border:"1px solid #D1D5DB",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#111827",background:"#FFFFFF",marginBottom:10,boxSizing:"border-box"};

  const saveEmp = () => {
    if(!form.name.trim()) return;
    const updated = editId!==null
      ? employees.map(e=>e.id===editId?{...e,...form}:e)
      : [...employees, {...form, id:Date.now(), type:"global"}];
    saveBusinessConfig({...businessConfig, employees:updated});
    setAdding(false); setEditId(null); setForm({name:"",role:"מלצר",type:"global",monthlySalary:""});
  };
  const removeEmp = id => saveBusinessConfig({...businessConfig, employees:employees.filter(e=>e.id!==id)});
  const startEdit = emp => { setForm({name:emp.name,role:emp.role,type:"global",monthlySalary:emp.monthlySalary||""}); setEditId(emp.id); setAdding(true); setShowGlobal(true); };

  // חישוב סה״כ חודשי
  const monthTotal = Array.from({length:emDays},(_,i)=>{
    const date=`${emY}-${String(emM).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    const daily = Number(getDailyLabor(date))||0;
    return daily + globalDailyTotal;
  }).reduce((a,b)=>a+b,0);

  return (
    <div>
      {/* כותרת + ניווט חודש */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,background:"#FFFFFF",borderRadius:8,padding:"10px 16px",border:"1px solid #E5E7EB"}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#6B7280",padding:"0 8px"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:700,color:"#111827",fontSize:15}}>{emLabel}</div>
          <div style={{fontSize:12,color:"#9CA3AF",marginTop:1}}>סה״כ: {monthTotal.toLocaleString()} ₪</div>
        </div>
        <button onClick={nextMonth} disabled={!canNext} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:canNext?"#6B7280":"#D1D5DB",padding:"0 8px"}}>›</button>
      </div>

      {/* עובדים גלובליים — אוטומטי */}
      {globalEmps.length>0 && (
        <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#16A34A",fontWeight:700,marginBottom:6,letterSpacing:1}}>עובדים גלובליים — {globalDailyTotal.toLocaleString()} ₪/יום אוטומטי</div>
          {globalEmps.map(emp=>(
            <div key={emp.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:2}}>
              <span style={{color:"#6B7280"}}>{emp.name} <span style={{color:"#9CA3AF",fontSize:11}}>{emp.role}</span></span>
              <span style={{fontWeight:700,color:"#6B7280"}}>{Math.round(Number(emp.monthlySalary)/emDays).toLocaleString()} ₪</span>
            </div>
          ))}
        </div>
      )}

      {/* לוח הזנה יומית */}
      <div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:8,overflow:"hidden",marginBottom:12}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #F1F5F9",fontSize:13,fontWeight:700,color:"#6B7280"}}>
          עלות כ״א יומית (מתוכנת נוכחות)
        </div>
        {Array.from({length:emDays},(_,i)=>{
          const day=i+1;
          const date=`${emY}-${String(emM).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const dow=new Date(emY,emM-1,day).getDay();
          const val=getDailyLabor(date);
          const hasVal=val!==""&&val!==null&&val!==undefined;
          const total=(Number(val)||0)+globalDailyTotal;
          return (
            <div key={date} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",borderBottom:"1px solid #F9FAFB",background:dow===6?"#FAFAFA":"#FFFFFF"}}>
              <div style={{minWidth:80}}>
                <div style={{fontSize:13,fontWeight:600,color:dow===6?"#9CA3AF":"#111827"}}>{DOW_NAMES[dow]} {day}/{emM}</div>
              </div>
              <input type="number" inputMode="numeric" placeholder="₪ נוכחות"
                value={hasVal?val:""}
                onChange={e=>setDailyLabor(date,e.target.value)}
                style={{flex:1,border:"1px solid #D1D5DB",borderRadius:6,padding:"7px 10px",fontSize:13,fontFamily:"inherit",color:"#111827",background:"#FFFFFF",outline:"none"}}/>
              {(hasVal||globalDailyTotal>0) && (
                <div style={{minWidth:70,textAlign:"left",fontSize:12,fontWeight:700,color:"#6B7280"}}>{total.toLocaleString()} ₪</div>
              )}
            </div>
          );
        })}
      </div>

      {/* ניהול עובדים גלובליים */}
      <div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:8,overflow:"hidden"}}>
        <div onClick={()=>setShowGlobal(p=>!p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",cursor:"pointer"}}>
          <span style={{fontWeight:700,fontSize:14,color:"#111827"}}>עובדים בשכר גלובלי</span>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:"#9CA3AF"}}>{globalEmps.length} עובדים</span>
            <span style={{fontSize:16,color:"#9CA3AF",transition:"transform 0.2s",display:"inline-block",transform:showGlobal?"rotate(180deg)":"none"}}>▾</span>
          </div>
        </div>
        {showGlobal && (
          <div style={{borderTop:"1px solid #F1F5F9",padding:"14px 16px"}}>
            {globalEmps.map(emp=>(
              <div key={emp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:"#F8FAFC",borderRadius:10,marginBottom:8,border:"1px solid #E5E7EB"}}>
                <div>
                  <div style={{fontWeight:700,color:"#111827",fontSize:14}}>{emp.name}</div>
                  <div style={{fontSize:12,color:"#6B7280",marginTop:1}}>{emp.role} · {Number(emp.monthlySalary).toLocaleString()} ₪/חודש</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>startEdit(emp)} style={{background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12,color:"#6B7280"}}><IcoEdit/></button>
                  <button onClick={()=>removeEmp(emp.id)} style={{background:"none",border:"none",padding:"4px 6px",cursor:"pointer",fontFamily:"inherit",fontSize:12,color:"#9CA3AF"}}><IcoTrash/></button>
                </div>
              </div>
            ))}
            {!adding && (
              <button onClick={()=>{setAdding(true);setEditId(null);setForm({name:"",role:"מלצר",type:"global",monthlySalary:""});}}
                style={{width:"100%",background:"#FFFFFF",border:"1px dashed #D1D5DB",borderRadius:6,color:"#6B7280",padding:"9px",fontWeight:500,cursor:"pointer",fontFamily:"inherit",fontSize:12,marginTop:4}}>הוסף עובד גלובלי</button>
            )}
            {adding && (
              <div style={{background:"#F9FAFB",borderRadius:8,padding:"14px",border:"1px solid #BFDBFE",marginTop:8}}>
                <div style={{fontWeight:700,color:"#6B7280",fontSize:13,marginBottom:10}}>{editId!==null?"עריכת עובד":"עובד חדש"}</div>
                <input style={inp} placeholder="שם עובד" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>
                <select style={{...inp,marginBottom:10}} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                  {ROLES_EMP.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
                <div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>משכורת חודשית ברוטו (₪)</div>
                <input style={inp} type="number" inputMode="numeric" placeholder="0" value={form.monthlySalary} onChange={e=>setForm(f=>({...f,monthlySalary:e.target.value}))}/>
                {form.monthlySalary && <div style={{background:"#F9FAFB",borderRadius:8,padding:"7px 12px",fontSize:12,color:"#6B7280",fontWeight:600,marginBottom:10}}>עלות יומית: ≈ {Math.round(Number(form.monthlySalary)/DAYS_IN_MONTH).toLocaleString()} ₪/יום</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveEmp} style={{flex:1,background:"#111827",border:"none",borderRadius:6,color:"#fff",padding:"9px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>שמור</button>
                  <button onClick={()=>{setAdding(false);setEditId(null);}} style={{flex:1,background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:10,color:"#6B7280",padding:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>ביטול</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


// ─── WhatsApp Recipients Screen ───────────────────────────────────────────────
function WhatsAppRecipientsScreen({ businessConfig, saveBusinessConfig }) {
  const groupId = businessConfig.whatsappGroupId || "";
  const [input, setInput] = useState(groupId);
  const [saved, setSaved] = useState(false);
  const [err,   setErr]   = useState("");

  const save = () => {
    const val = input.trim();
    if(val && !/^[0-9]+$/.test(val)) { setErr("ID לא תקין -- מספרים בלבד"); return; }
    saveBusinessConfig({...businessConfig, whatsappGroupId: val});
    setErr(""); setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const WA = {
    lbl:  {fontSize:12,color:"#6B7280",marginBottom:4,display:"block",fontWeight:500},
    inp:  {width:"100%",border:"1px solid #D1D5DB",borderRadius:9,padding:"13px",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",background:"#fff",direction:"ltr"},
    btn:  {marginTop:12,padding:"13px 24px",background:"#25D366",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",width:"100%"},
    err:  {color:"#DC2626",fontSize:12,marginTop:6},
    ok:   {color:"#16A34A",fontSize:12,marginTop:6},
  };

  return (
    <div>
      <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:"14px 16px",marginBottom:20,fontSize:13,color:"#6B7280",lineHeight:1.6}}>
        כל ההודעות יישלחו לקבוצת WhatsApp שתגדיר כאן.
      </div>

      {groupId && (
        <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"#F9FAFB",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3 6-6" stroke="#16A34A" strokeWidth="2" strokeLinecap="round"/></svg></div>
          <div>
            <div style={{fontWeight:700,color:"#6B7280",fontSize:14}}>קבוצה מחוברת</div>
            <div style={{fontSize:12,color:"#6B7280",direction:"ltr"}}>{groupId}@g.us</div>
          </div>
        </div>
      )}

      <label className="label">Group ID של הקבוצה</label>
      <input className="input" style={{direction:"ltr"}} placeholder="120363420449632272"
        value={input} onChange={e=>{setInput(e.target.value);setErr("");setSaved(false);}}
        onKeyDown={e=>e.key==="Enter"&&save()}/>
      <div style={{fontSize:11,color:"#9CA3AF",marginTop:5}}>
        מצא את ה-ID ב: Green API Console → Chats → הקבוצה שלך
      </div>
      {err   && <div style={{fontSize:12,color:"#DC2626",marginTop:5}}>{err}</div>}
      {saved && <div style={{fontSize:12,color:"#16A34A",marginTop:5,display:"flex",alignItems:"center",gap:5}}><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l2.5 2.5 5.5-5.5" stroke="#16A34A" strokeWidth="1.8" strokeLinecap="round"/></svg>נשמר</div>}
      <button className="btn btn-primary btn-full" onClick={save}>שמור</button>

      {/* Test button */}
      {groupId && (
        <button style={{marginTop:10,padding:"13px 24px",background:"#F9FAFB",border:"2px solid #25D366",borderRadius:10,color:"#6B7280",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",width:"100%"}}
          onClick={async (e) => {
            const btn = e.target;
            btn.disabled = true; btn.textContent = "שולח...";
            try {
              const tid = window._currentTenantId || (typeof currentBizId !== "undefined" ? currentBizId : null);
              if(!tid) { alert("לא נמצא tenantId"); return; }
              const testMsg = "🧪 *הודעת בדיקה -- Marjin*" + "\n" + "✅ החיבור לוואטסאפ עובד!" + "\n" + "_" + new Date().toLocaleTimeString("he-IL") + "_";
              await sendWhatsAppNotification(tid, testMsg, groupId);
              btn.textContent = "נשלח";
            } catch(e) {
              btn.textContent = "שגיאה: " + e.message;
            }
            setTimeout(()=>{ btn.disabled=false; btn.textContent="שלח הודעת בדיקה"; }, 3000);
          }}>
          שלח הודעת בדיקה
        </button>
      )}
    </div>
  );
}

// ─── Petty Cash Screen ────────────────────────────────────────────────────────
const PETTY_CATEGORIES = ["מזון ושתיה","ציוד וכלים","ניקיון","תחזוקה","תחבורה","משרד","שונות"];

function PettyCashScreen({ items, saveItems }) {
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ date: TODAY_STR, amount: "", category: "שונות", note: "" });
  const [filterCat, setFilterCat] = useState("הכל");

  const openAdd = () => { setForm({ date:TODAY_STR, amount:"", category:"שונות", note:"" }); setEditId(null); setAdding(true); };
  const openEdit = (item) => { setForm({...item}); setEditId(item.id); setAdding(true); };
  const cancel = () => { setAdding(false); setEditId(null); };

  const save = () => {
    if(!form.amount || !form.date) return;
    const list = items||[];
    if(editId) {
      saveItems(list.map(i => i.id===editId ? {...form, id:editId} : i));
    } else {
      saveItems([...list, {...form, id:Date.now(), amount:Number(form.amount)}]);
    }
    setAdding(false); setEditId(null);
  };

  const remove = (id) => { if(window.confirm("למחוק רשומה זו?")) saveItems((items||[]).filter(i=>i.id!==id)); };

  const filtered = (items||[]).filter(i => filterCat==="הכל" || i.category===filterCat);
  const total = filtered.reduce((s,i)=>s+(Number(i.amount)||0), 0);
  const monthTotal = (items||[]).filter(i=>i.date&&i.date.startsWith(`${YEAR}-${MONTH_STR}`)).reduce((s,i)=>s+(Number(i.amount)||0),0);

  const exportToExcel = () => {
    const rows = [["תאריך","קטגוריה","סכום","הערה"]];
    (items||[]).sort((a,b)=>a.date<b.date?1:-1).forEach(i=>rows.push([i.date, i.category, i.amount, i.note||""]));
    const csv = rows.map(r=>r.join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="קופה_קטנה.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <h2 style={{margin:0,fontSize:14,fontWeight:700,color:"#111827"}}>קופה קטנה</h2>
          <p style={{margin:"2px 0 0",fontSize:12,color:"#9CA3AF"}}>{(items||[]).length} רשומות · חודש נוכחי: {fmt(monthTotal)}</p>
        </div>
        <button onClick={exportToExcel} style={{padding:"8px 14px",background:"#F9FAFB",border:"1px solid #86EFAC",borderRadius:10,color:"#6B7280",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ייצוא CSV</button>
        <button onClick={openAdd} style={{...S.addBtn}}>הוסף</button>
      </div>

      {/* Filter */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {["הכל",...PETTY_CATEGORIES].map(cat=>(
          <button key={cat} className="btn btn-ghost btn-sm" style={{...(filterCat===cat?S.subBtnActive:{})}} onClick={()=>setFilterCat(cat)}>{cat}</button>
        ))}
      </div>

      {/* Add/Edit form */}
      {adding && (
        <div className="card card-p" style={{border:"1px solid #FCD34D44",marginBottom:14}}>
          <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:"#111827"}}>{editId?"עריכת רשומה":"רשומה חדשה"}</h3>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <label className="label">תאריך</label>
              <input type="date" className="input" style={{marginBottom:0}} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <div style={{flex:1}}>
              <label className="label">סכום (₪)</label>
              <input type="number" inputMode="numeric" placeholder="0" className="input" style={{marginBottom:0}} value={form.amount}
                onChange={e=>setForm(f=>({...f,amount:e.target.value}))} autoFocus/>
            </div>
          </div>
          <label className="label">קטגוריה</label>
          <select className="input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
            {PETTY_CATEGORIES.map(cat=><option key={cat}>{cat}</option>)}
          </select>
          <label className="label">הערה</label>
          <input className="input" placeholder="תיאור ההוצאה..." value={form.note||""}
            onChange={e=>setForm(f=>({...f,note:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&save()}/>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn btn-primary btn-full" onClick={save} className="btn btn-primary" style={{flex:"none",padding:"9px 16px"}}>{editId?"עדכן":"הוסף"}</button>
            <button className="btn btn-secondary" onClick={cancel}>ביטול</button>
          </div>
        </div>
      )}

      {/* Total bar */}
      {filtered.length > 0 && (
        <div style={{background:"#F9FAFB",border:`1px solid ${"#E5E7EB"}`,borderRadius:5,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,color:"#6B7280"}}>סה״כ {filterCat==="הכל"?"כל הרשומות":filterCat}</span>
          <span style={{fontWeight:700,fontSize:14,color:"#111827"}}>{fmt(total)}</span>
        </div>
      )}

      {/* Items list */}
      {filtered.length === 0 && !adding ? (
        <div className="empty"><div style={{width:36,height:36,border:"1px solid #E5E7EB",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",color:"#9CA3AF",fontSize:14}}>₪</div><p style={{fontSize:13,margin:0}}>אין רשומות</p></div>
      ) : (
        <div>
          {filtered.sort((a,b)=>a.date<b.date?1:-1).map(item=>(
            <div key={item.id} style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:8,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#111827"}}>{fmt(Number(item.amount))}</span>
                  <span style={{fontSize:11,padding:"2px 7px",background:"#F3F4F6",borderRadius:3,color:"#6B7280"}}>{item.category}</span>
                </div>
                <div style={{fontSize:12,color:"#9CA3AF"}}>{item.date} {item.note && <span style={{color:"#6B7280"}}>· {item.note}</span>}</div>
              </div>

              <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:12,padding:"4px 6px",fontFamily:"inherit"}}><IcoTrash/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MasterTasksScreen({ tasks, saveTasks }) {
  const SHIFT_LABEL = t => t.shift==="שבועי" ? `${t.weekday||"שבועי"}` : t.shift||"";
  const [adding, setAdding]   = useState(false);
  const [editing, setEditing] = useState(null); // task id being edited
  const [form, setForm]       = useState({ title:"", category:"פתיחה", shift:"כל המשמרות", note:"" });
  const [filterShift, setFilterShift] = useState("הכל");
  const [filterCat,   setFilterCat]   = useState("הכל");

  const openAdd = () => { setForm({ title:"", category:"פתיחה", shift:"כל המשמרות", note:"", proof:"check" }); setEditing(null); setAdding(true); };
  const openEdit = (t) => { setForm({ title:t.title, category:t.category, shift:t.shift, weekday:t.weekday||"ראשון", note:t.note||"", proof:t.proof||"check" }); setEditing(t.id); setAdding(true); };
  const cancel = () => { setAdding(false); setEditing(null); };

  const save = () => {
    if (!form.title.trim()) return;
    if (editing !== null) {
      saveTasks((tasks||[]).map(t => t.id===editing ? {...t,...form} : t));
    } else {
      saveTasks([...(tasks||[]), {...form, id:Date.now()}]);
    }
    setAdding(false); setEditing(null);
  };

  const remove = (id) => saveTasks((tasks||[]).filter(t => t.id !== id));

  const moveUp   = (i, arr) => { if(i===0) return arr; const a=[...arr]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a; };
  const moveDown = (i, arr) => { if(i===arr.length-1) return arr; const a=[...arr]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a; };

  const filtered = (tasks||[]).filter(t =>
    (filterShift==="הכל" || t.shift===filterShift) &&
    (filterCat==="הכל"   || t.category===filterCat)

            {(tasks||[]).length} משימות · בוקר: {(tasks||[]).filter(t=>t.shift==="בוקר"||t.shift==="כל המשמרות").length} · ערב: {(tasks||[]).filter(t=>t.shift==="ערב"||t.shift==="כל המשמרות").length}
          </p>

      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>

          <button key={s} className="btn btn-ghost btn-sm" style={{...(filterShift===s?S.subBtnActive:{})}} onClick={()=>setFilterShift(s)}>{s}</button>
        ))}
        <div style={{width:1,background:"#6B7280",margin:"0 2px"}}/>
        {["הכל","פתיחה","שוטף","סגירה"].map(c=>(
          <button key={c} className="btn btn-ghost btn-sm" style={{...(filterCat===c?{...S.subBtnActive,color:c==="הכל"?"#F5F5F5":CAT_COLOR[c]}:{})}} onClick={()=>setFilterCat(c)}>{c}</button>
        ))}
      </div>

      {/* Add / Edit form */}
      {adding && (
        <div className="card card-p" style={{ border:"1px solid #15803D44", marginBottom:14}}>
          <h3 style={{margin:"0 0 12px", fontSize:14, fontWeight:700, color:"#111827"}}>
            {editing ? "עריכת משימה" : "משימה חדשה"}
          </h3>
          <label className="label">שם המשימה</label>
          <input className="input" autoFocus placeholder="למשל: ניקוי מכונת קפה" value={form.title}

            onKeyDown={e=>e.key==="Enter"&&save()}/>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>

            </div>
            <div style={{flex:1}}>
              <label className="label">משמרת</label>
              <select className="input" style={{marginBottom:0}} value={form.shift} onChange={e=>setForm(f=>({...f,shift:e.target.value}))}>

                <div style={{fontSize:20,marginBottom:3}}>{opt.icon}</div>
                {opt.label}
              </button>

          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn btn-primary btn-full" onClick={save}>{editing?"עדכן":"הוסף"}</button>
            <button className="btn btn-secondary" onClick={cancel}>ביטול</button>
          </div>
        </div>
      )}

      {/* Tasks list grouped by category */}
      {filtered.length === 0 && !adding && (
        <div className="empty">

          <p style={{color:"#9CA3AF"}}>אין משימות -- לחץ + הוסף משימה</p>
        </div>
      )}

      {["פתיחה","שוטף","סגירה"].map(cat => {
        const catTasks = filtered.filter(t => t.category===cat);
        if (!catTasks.length) return null;
        return (
          <div key={cat} style={{marginBottom:16}}>
            {/* Category header */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:700,padding:"3px 12px",borderRadius:8,color:CAT_COLOR[cat],background:CAT_BG[cat]}}>

              <span style={{fontSize:11,color:"#9CA3AF"}}>{catTasks.length} משימות</span>

                  <div style={{display:"flex",flexDirection:"column",gap:2,paddingTop:2}}>

                    <button style={{...S.iconBtn,padding:"2px 6px",fontSize:10,color:"#9CA3AF"}}
                      onClick={()=>saveTasks(moveDown(globalIdx,tasks))}>▼</button>

                  <div style={{flex:1,minWidth:0}}>

                  </button>
                    <button style={{...S.iconBtn,fontSize:12}} onClick={()=>remove(t.id)}>
                    <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                  </button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Shift preview */}
      {tasks.length > 0 && (
        <div className="card card-p" style={{ marginTop:8, borderTop:"1px solid #D1D5DB"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
            תצוגה מקדימה
          </div>
          <div style={{display:"flex",gap:8}}>
            {["בוקר","ערב"].map(shift=>(
              <div key={shift} style={{flex:1,background:"#F8FAFC",borderRadius:10,padding:"10px 12px"}}>

  );

// ─── Shift Manager (Inline Tab) ───────────────────────────────────────────────
const SM_SHIFTS    = ["בוקר","ערב"];
const SM_CATS      = ["פתיחה","שוטף","סגירה"];
const SM_CAT_COLOR = {"פתיחה":"#6B7280","שוטף":"#6B7280","סגירה":"#6B7280"};
const SM_CAT_BG    = {"פתיחה":"#F3F4F6","שוטף":"#F9FAFB","סגירה":"#F3F4F6"};

// PERMISSIONS -- מה כל תפקיד יכול לגשת
// בעתיד: להוסיף { id, name, permissions:["dashboard","forecast",...] } לכל מנהל
// כרגע: מנהלים רואים רק ⚡ משמרות. בעלים רואה הכל.

function ShiftManagerEmbed({ currentUser, setCurrentUser, onNavigate, appUsers=[], saveAppUsers, bizId="" }) {
  const [subScreen,  setSubScreen]  = useState("home");
  const [tasks,      setTasks]      = useState([]);
  const [logs,       setLogs]       = useState([]);
  const [activeLog,  setActiveLog]  = useState(null);
  const [ownerPin,   setOwnerPin]   = useState("0000");
  const [ownerTab,   setOwnerTab]   = useState("tasks");
  const [ownerPinIn, setOwnerPinIn] = useState("");
  const [ownerErr,   setOwnerErr]   = useState(false);
  const [incText,    setIncText]    = useState("");
  const [smLoaded,   setSmLoaded]   = useState(false);

  const appUsersRef = appUsers;
  const saveAppUsersRef = saveAppUsers || (()=>{});

  useEffect(()=>{
    const initSM = async () => {
      try {
        const sg2 = async k => { try{return await window.storage.get(k);}catch(_){return null;} };
        const r1=await sg2(`biz:${bizId}:tasks`);      if(r1) setTasks(JSON.parse(r1.value));
        const r2=await sg2(`biz:${bizId}:logs`);       if(r2) setLogs(JSON.parse(r2.value));
        const r4=await sg2(`biz:${bizId}:pin`);        if(r4) setOwnerPin(r4.value);
        const r5=await sg2(`biz:${bizId}:active-log`); if(r5) setActiveLog(JSON.parse(r5.value));
      } catch(_){}
      setSmLoaded(true);
    };
    if(window._firebaseReady) { initSM(); }
    else { window.addEventListener("firebase-ready", initSM, {once:true}); }
  },[]);

  const saveTasks  = async t => { setTasks(t);    try{await window.storage.set(`biz:${bizId}:tasks`,JSON.stringify(t), true);}catch(_){} };
  const saveLogs   = async l => { setLogs(l);     try{await window.storage.set(`biz:${bizId}:logs`,JSON.stringify(l), true);}catch(_){} };
  const saveActive = async l => { setActiveLog(l);try{await window.storage.set(`biz:${bizId}:active-log`,JSON.stringify(l), true);}catch(_){} };

  const openShift = async (shiftType) => {
    const log = { id:Date.now(), date:TODAY_STR, shiftType, managerName:"", completedTasks:[], incidents:[], proofs:{},
      openedAt:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}), closedAt:null };
    await saveActive(log);
    setSubScreen("shift");
  };

  const closeShift = async () => {
    if(!activeLog) return;
    const closed = {...activeLog, closedAt:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    await saveLogs([closed,...logs]);
    await saveActive(null);
    setSubScreen("home");
    // Send WhatsApp notification to owner
    if(bizId && typeof sendWhatsAppNotification === "function") {
      const allTasks = tasks || [];
      const myTasks  = allTasks.filter(t => !activeLog.shiftType || t.shifts?.includes(activeLog.shiftType));
      const done     = myTasks.filter(t => closed.completedTasks?.includes(t.id)).length;
      const DOW      = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
      const dow      = DOW[new Date().getDay()];
      const msg = [
        closed.completedTasks?.length === myTasks.length ? "✅" : "🟡",
        ` *סיום משמרת*`,
        `📅 ${closed.date || TODAY_STR} | יום ${dow}`,
        `🕐 ${closed.shiftType || "משמרת"}  |  סגירה: ${closed.closedAt}`,
        `👤 ${closed.managerName || "מנהל"}`,
        `📝 משימות: ${done}/${myTasks.length} (${myTasks.length>0?Math.round(done/myTasks.length*100):100}%)`,
        closed.incidents?.length > 0 ? `📋 אירועים: ${closed.incidents.join(", ")}` : "",
        "---",
        `_Marjin_`
      ].filter(Boolean).join("\n");
      sendWhatsAppNotification(bizId, msg, getWhatsAppTarget(businessConfig));
    }
  };

  const tryOwnerLogin = () => {
    if(ownerPinIn===ownerPin){ setOwnerErr(false); setOwnerPinIn(""); setSubScreen("owner"); }
    else { setOwnerErr(true); setOwnerPinIn(""); }
  };

  const toggleTask = async (task) => {
    if(!activeLog) return;
    if(task.proof==="photo" && !activeLog.completedTasks.includes(task.id)) return;
    const proofs = {...(activeLog.proofs||{})};
    const done = activeLog.completedTasks.includes(task.id)
      ? (delete proofs[task.id], activeLog.completedTasks.filter(x=>x!==task.id))

    await saveActive({...activeLog, completedTasks:done, proofs});

          {logs.map((log,i)=>{

            return (

                        return (

                              onClick={()=>window.open(src,"_blank")}/>
                            <div style={{fontSize:9,color:"#9CA3AF",textAlign:"center",marginTop:2,maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t?.title||tid}</div>

          })}

    </div>
  );

  return null;
}

// ─── Forecast Screen ──────────────────────────────────────────────────────────
// ─── Month name → index map ───────────────────────────────────────────────────
const MONTH_IDX = {
  "ינואר":0,"פברואר":1,"מרץ":2,"אפריל":3,"מאי":4,"יוני":5,
  "יולי":6,"אוגוסט":7,"ספטמבר":8,"אוקטובר":9,"נובמבר":10,"דצמבר":11,
  "jan":0,"feb":1,"mar":2,"apr":3,"may":4,"jun":5,
  "jul":6,"aug":7,"sep":8,"oct":9,"nov":10,"dec":11,
  "1":0,"2":1,"3":2,"4":3,"5":4,"6":5,"7":6,"8":7,"9":8,"10":9,"11":10,"12":11,
};

function ForecastScreen({ metrics, lastYear, saveLastYear, currentMonth, entries=[], businessConfig={}, TARGETS={salesGrowthPct:5,foodCostPct:33,laborCostPct:27} }) {
  const fileRef = useRef();
  const [mode, setMode] = useState("view"); // view | manual | mapCols
  const [lyDraft, setLyDraft] = useState(() => lastYear.map(m=>({...m})));
  const [headers, setHeaders] = useState([]);
  const [rawRows, setRawRows] = useState([]);
  const [colMap, setColMap] = useState({ month:"", sales:"", food:"", labor:"", gross:"", fixed:"" });
  const [uploadError, setUploadError] = useState("");

  const ly = lastYear[currentMonth];

  // ── Forecast math -- ממוצע 6 מופעים אחרונים לכל יום שבוע ──
  const rem  = DAYS_IN_MONTH - DAY_OF_MONTH;

  // For each remaining day of month, find last 6 entries with same DOW
  const getDowAvg = (entries, targetDow, field) => {
    const matches = [...entries]
      .filter(e => getDateDOW(e.date) === targetDow)
      .sort((a,b) => b.date.localeCompare(a.date))
      .slice(0, 6);
    if (!matches.length) return null;
    const sum = matches.reduce((a,e) => {
      if (field === 'sales')  return a + (Number(e.sales)||0)+(Number(e.deliveries)||0)+(Number(e.other_income)||0);
      if (field === 'food')   return a + (e.supplier_payments?Object.values(e.supplier_payments).filter(v=>v!=='skip').reduce((x,y)=>x+(Number(y)||0),0):0);
      if (field === 'labor')  return a + (Number(e.payroll)||0) + (e.hourly_payroll?Object.values(e.hourly_payroll).reduce((s,v)=>s+(Number(v)||0),0):0);
      return 0;
    }, 0);
    return sum / matches.length;
  };

  // Sum forecasted remaining days
  const { fSalesExtra, fFoodExtra, fLaborExtra, dowDetails } = (() => {
    let fSalesExtra = 0, fFoodExtra = 0, fLaborExtra = 0;
    const dowDetails = {}; // dow → { avg, count, days }
    const fallbackDailySales  = metrics.totalSales   / Math.max(DAY_OF_MONTH,1);
    const fallbackDailyFood   = metrics.totalFood    / Math.max(DAY_OF_MONTH,1);
    const fallbackDailyLabor  = metrics.totalPayroll / Math.max(DAY_OF_MONTH,1);
    for(let d = DAY_OF_MONTH+1; d <= DAYS_IN_MONTH; d++) {
      const ds = `${YEAR}-${MONTH_STR}-${String(d).padStart(2,"0")}`;
      const dow = getDateDOW(ds);
      if(dow === 6) continue; // שבת
      const avgS = getDowAvg(entries, dow, 'sales')  ?? fallbackDailySales;
      const avgF = getDowAvg(entries, dow, 'food')   ?? fallbackDailyFood;
      const avgL = getDowAvg(entries, dow, 'labor')  ?? fallbackDailyLabor;
      fSalesExtra += avgS;
      fFoodExtra  += avgF;
      fLaborExtra += avgL;
      if(!dowDetails[dow]) {
        const cnt = [...entries].filter(e=>getDateDOW(e.date)===dow).length;
        dowDetails[dow] = { avg: Math.round(avgS), count: Math.min(cnt,6), days: [] };
      }
      dowDetails[dow].days.push(d);
    }
    return { fSalesExtra, fFoodExtra, fLaborExtra, dowDetails };
  })();

  const fSales = metrics.totalSales   + fSalesExtra;
  const fFood  = metrics.totalFood    + fFoodExtra;
  const fLabor = metrics.totalPayroll + fLaborExtra;

  const fFoodPct  = fSales > 0 ? (fFood  / fSales) * 100 : 0;
  const fLaborPct = fSales > 0 ? (fLabor / fSales) * 100 : 0;
  const fGross    = 100 - fFoodPct - fLaborPct - (businessConfig.rentPct||0) - (businessConfig.hasRoyalty?(businessConfig.royaltyPct||0):0);

  // fcColor now defined at module scope
  const dlt  = (cur,prv,inv) => { const d=cur-prv; const good=inv?d<0:d>0; return { str:`${d>=0?"+":""}${d.toFixed(1)}%`, good }; };
  const dltA = (cur,prv,inv) => { const d=cur-prv; const good=inv?d<0:d>0; return { str:`${d>=0?"+":""}${fmt(Math.round(d))}`, good }; };

  // ── Excel parse ──
  const handleFile = (file) => {
    setUploadError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb   = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
        if (rows.length < 2) { setUploadError("הקובץ ריק"); return; }
        const hdrs = rows[0].map(h => String(h).trim());
        setHeaders(hdrs);
        setRawRows(rows.slice(1).filter(r => r.some(c => c !== "")));
        // auto-detect columns
        const cm = { month:"", sales:"", food:"", labor:"", gross:"", fixed:"" };
        hdrs.forEach(h => {
          const l = h.toLowerCase();
          if (!cm.month  && (l.includes("חוד")  || l.includes("month")))            cm.month  = h;
          if (!cm.sales  && (l.includes("מכיר") || l.includes("הכנסות") || l.includes("sales"))) cm.sales = h;
          if (!cm.food   && (l.includes("פוד")  || l.includes("food")   || l.includes("סחורה"))) cm.food  = h;
          if (!cm.labor  && (l.includes("שכר")  || l.includes("labor")  || l.includes("עובד")))  cm.labor = h;
          if (!cm.gross  && (l.includes("רווח") || l.includes("gross")))             cm.gross  = h;
          if (!cm.fixed  && (l.includes("קבוע") || l.includes("fixed")))             cm.fixed  = h;
        });
        setColMap(cm);
        setMode("mapCols");
      } catch(e) { setUploadError("שגיאה בקריאת הקובץ"); }
    };
    reader.readAsArrayBuffer(file);
  };

  const confirmImport = () => {
    const hIdx = h => headers.indexOf(h);
    const num  = (row, col) => col ? Number(String(row[hIdx(col)]||"0").replace(/[%,₪\s]/g,"")) || 0 : 0;
    const updated = lastYear.map(m=>({...m}));
    rawRows.forEach(row => {
      if (!colMap.month) return;
      const raw = String(row[hIdx(colMap.month)]||"").trim().toLowerCase().replace(/['\s]/g,"");
      const mi  = MONTH_IDX[raw] ?? MONTH_IDX[raw.slice(0,3)];
      if (mi === undefined) return;
      updated[mi] = { month:mi, sales:num(row,colMap.sales), foodCostPct:num(row,colMap.food), laborCostPct:num(row,colMap.labor), grossProfitPct:num(row,colMap.gross), fixedExpenses:num(row,colMap.fixed) };
    });
    saveLastYear(updated);
    setLyDraft(updated);
    setMode("view");
  };

  return (
    <div>

      {/* ── Forecast card ── */}
      {(()=>{
        const tSales  = Math.round((lastYear[currentMonth]?.sales||650000)*(1+(cfgTarget(businessConfig,"salesGrowthPct",TARGETS.salesGrowthPct)/100)));
        const tNet    = fSales > 0 ? (fSales*(1-cfgTarget(businessConfig,"foodCostPct",TARGETS.foodCostPct)/100-cfgTarget(businessConfig,"laborCostPct",TARGETS.laborCostPct)/100-((businessConfig.rentPct||0)+(businessConfig.hasRoyalty?businessConfig.royaltyPct||0:0))/100)-metrics.TOTAL_FIXED) : 0;
        const tNetPct = fSales > 0 ? (tNet/fSales)*100 : 0;
        return (
          <div className="card card-p" style={{ marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:1}}>
                תחזית סוף חודש — ממוצע 6 ימים לפי יום שבוע
              </div>
              <div style={{fontSize:11,color:"#9CA3AF"}}>יום {DAY_OF_MONTH}/{DAYS_IN_MONTH}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              <MetricBox label="הכנסות חזויות"
                value={fmt(Math.round(fSales))}
                color={fSales>=tSales?"#16A34A":"#D97706"}
                sub={`יעד: ${fmt(tSales)}`} />
              <MetricBox label="פוד קוסט"
                value={fmtPct(fFoodPct)}
                color={fcColor(fFoodPct, cfgTarget(businessConfig,"foodCostPct",TARGETS.foodCostPct))}
                sub={`יעד ${cfgTarget(businessConfig,"foodCostPct",TARGETS.foodCostPct)}%`} />
              <MetricBox label="לייבור קוסט"
                value={fmtPct(fLaborPct)}
                color={fcColor(fLaborPct, cfgTarget(businessConfig,"laborCostPct",TARGETS.laborCostPct))}
                sub={`יעד ${cfgTarget(businessConfig,"laborCostPct",TARGETS.laborCostPct)}%`} />
              <MetricBox label="רווח נקי חזוי"
                value={fmt(Math.round(tNet))}
                color={tNet>0?"#16A34A":"#DC2626"}
                sub={`${fmtPct(tNetPct)} מהמחזור`} />
            </div>
            {Object.keys(dowDetails).length > 0 && (
              <div style={{marginTop:14,borderTop:"1px solid #E5E7EB",paddingTop:12}}>
                <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1.2,marginBottom:10}}>
                  ממוצע לפי יום שבוע ({rem} ימים נותרו)
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
                  {Object.entries(dowDetails).sort((a,b)=>a[0]-b[0]).map(([dow,info])=>(
                    <div key={dow} style={{background:"#F8FAFC",borderRadius:10,padding:"8px 12px"}}>
                      <div style={{fontSize:11,color:"#6B7280",fontWeight:600,marginBottom:3}}>
                        {["ראשון","שני","שלישי","רביעי","חמישי","שישי"][dow]} ({info.count} נתונים)
                      </div>
                      <div style={{fontWeight:700,color:"#111827",fontSize:13}}>{fmt(info.avg)}</div>
                      <div style={{fontSize:10,color:"#9CA3AF",marginTop:2}}>ימים: {info.days.join(", ")}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── Progress bars ── */}
      <div className="card card-p">
        <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>
          ⏱ התקדמות מול תחזית
        </div>
        <ProgressBar label="הכנסות"   current={metrics.totalSales}   target={fSales} color="#16A34A" />
        <ProgressBar label="פוד קוסט" current={metrics.totalFood}    target={fFood}  color="#A3A3A3" />
        <ProgressBar label="שכר"      current={metrics.totalPayroll} target={fLabor} color="#A3A3A3" />
      </div>

      {/* ── Last year comparison ── */}
      <div className="card card-p">
        <div className="flex jbet icenter" style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:1}}>
            {MONTH_NAMES[currentMonth]} {YEAR-1} — השוואה
          </div>
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.iconBtn,color:"#6B7280",borderColor:"#40404033",padding:"4px 10px",fontSize:12}}
              onClick={()=>setMode(m=>m==="manual"?"view":"manual")}>ידני</button>
            <button style={{...S.iconBtn,padding:"4px 10px",fontSize:12}}
              onClick={()=>fileRef.current?.click()}>
              ⬆ Excel
            </button>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}
              onChange={e=>{ if(e.target.files[0]){ handleFile(e.target.files[0]); e.target.value=""; }}}/>
          </div>
        </div>

        {/* Manual input */}
        {mode==="manual" && (
          <div>
            <p style={{color:"#9CA3AF",fontSize:12,margin:"0 0 10px"}}>הזן נתוני {MONTH_NAMES[currentMonth]} {YEAR-1}:</p>
            {[["sales","הכנסות (₪)"],["foodCostPct","פוד קוסט (%)"],["laborCostPct","לייבור קוסט (%)"],["grossProfitPct","רווח גולמי (%)"],["fixedExpenses","הוצ׳ קבועות (₪)"]].map(([f,lbl])=>(
              <div key={f} style={{marginBottom:7}}>
                <label style={{...S.lbl,fontSize:12}}>{lbl}</label>
                <input className="input" style={{marginBottom:0}} type="number" inputMode="decimal" placeholder="0"
                  value={lyDraft[currentMonth][f]||""}
                  onChange={e=>setLyDraft(d=>d.map((m,i)=>i===currentMonth?{...m,[f]:Number(e.target.value)}:m))}/>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button className="btn btn-primary btn-full" onClick={()=>{saveLastYear(lyDraft);setMode("view");}}>שמור</button>
              <button style={{...S.iconBtn,padding:"10px 16px"}} onClick={()=>setMode("view")}>ביטול</button>
            </div>
          </div>
        )}

        {/* Column mapping */}
        {mode==="mapCols" && (
          <div>
            <p style={{color:"#6B7280",fontSize:13,margin:"0 0 10px"}}>נמצאו {rawRows.length} שורות -- התאם עמודות:</p>
            {uploadError && <p style={{color:"#DC2626",fontSize:11,margin:"0 0 8px"}}>{uploadError}</p>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
              {[["month","חודש"],["sales","הכנסות (₪)"],["food","פוד קוסט (%)"],["labor","לייבור (%)"],["gross","רווח גולמי (%)"],["fixed","הוצ׳ קבועות (₪)"]].map(([k,l])=>(
                <div key={k}>
                  <label style={{...S.lbl,fontSize:11}}>{l}</label>
                  <select className="input" style={{padding:"6px 8px",fontSize:12,marginBottom:0}}
                    value={colMap[k]} onChange={e=>setColMap(c=>({...c,[k]:e.target.value}))}>
                    <option value="">-- לא רלוונטי --</option>
                    {headers.map(h=><option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}
            </div>
            {/* Preview */}
            <div style={{overflowX:"auto",marginBottom:10,borderRadius:8,border:"1px solid #E5E7EB"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr>{[colMap.month,colMap.sales,colMap.food,colMap.labor].filter(Boolean).map(h=>(
                    <th key={h} style={{padding:"6px 8px",color:"#6B7280",textAlign:"right",background:"#F8FAFC",borderBottom:"1px solid #E5E7EB"}}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {rawRows.slice(0,5).map((row,i)=>(
                    <tr key={i}>{[colMap.month,colMap.sales,colMap.food,colMap.labor].filter(Boolean).map(h=>(
                      <td key={h} style={{padding:"5px 8px",color:"#6B7280",borderBottom:"1px solid #E5E7EB"}}>{row[headers.indexOf(h)]}</td>
                    ))}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary btn-full" onClick={confirmImport}>ייבא נתונים</button>
              <button style={{...S.iconBtn,padding:"10px 16px"}} onClick={()=>setMode("view")}>ביטול</button>
            </div>
          </div>
        )}

        {/* Comparison table */}
        {(mode==="view") && (
          ly.sales===0
            ? <div style={{textAlign:"center",padding:"16px 0",color:"#9CA3AF",fontSize:13}}>
                העלה קובץ Excel ⬆ או הזן ידנית נתוני {MONTH_NAMES[currentMonth]} {YEAR-1}
              </div>
            : <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2,padding:"5px 0",borderBottom:"1px solid #D1D5DB",marginBottom:4}}>
                  <span style={{fontSize:10,color:"#9CA3AF"}}>מדד</span>
                  <span style={{fontSize:10,color:"#9CA3AF",textAlign:"center"}}>{YEAR-1}</span>
                  <span style={{fontSize:10,color:"#9CA3AF",textAlign:"center"}}>תחזית {YEAR}</span>
                </div>
                <CompRow label="הכנסות"        lyVal={fmt(ly.sales)}              fVal={fmt(Math.round(fSales))}   d={dltA(fSales,ly.sales,false)} />
                <CompRow label="פוד קוסט %"    lyVal={`${ly.foodCostPct}%`}       fVal={fmtPct(fFoodPct)}          d={dlt(fFoodPct,ly.foodCostPct,true)} />
                <CompRow label="לייבור %"      lyVal={`${ly.laborCostPct}%`}      fVal={fmtPct(fLaborPct)}         d={dlt(fLaborPct,ly.laborCostPct,true)} />
                {ly.networkPct && (() => {
                  const netPct = (businessConfig.rentPct||0)+(businessConfig.hasRoyalty?(businessConfig.royaltyPct||0):0);
                  return <CompRow label="רשת %"  lyVal={`${ly.networkPct}%`}  fVal={fmtPct(netPct)} d={dlt(netPct,ly.networkPct,true)} />;
                })()}
                <CompRow label="הוצ׳ קבועות"  lyVal={fmt(ly.fixedExpenses)}       fVal={fmt(metrics.TOTAL_FIXED)}  d={dltA(metrics.TOTAL_FIXED,ly.fixedExpenses,true)} />
                <CompRow label="רווח נקי %"   lyVal={`${ly.grossProfitPct}%`}    fVal={fmtPct(fGross)}            d={dlt(fGross,ly.grossProfitPct,false)} />
              </>
        )}
      </div>

      {/* 12-month bar chart */}
      <div className="card card-p">
        <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
          הכנסות {YEAR-1} -- כל החודשים
        </div>
        {lastYear.some(m=>m.sales>0) ? (
          <ResponsiveContainer width="100%" height={130}>
            <BarChart data={lastYear.map((m,i)=>({ n:MONTH_NAMES[i].slice(0,3), v:m.sales, cur:i===currentMonth }))}>
              <CartesianGrid strokeDasharray="3 3" stroke="#6B7280"/>
              <XAxis dataKey="n" stroke="#6B7280" tick={{fill:"#6B7280",fontSize:10}}/>
              <YAxis stroke="#6B7280" tick={{fill:"#6B7280",fontSize:10}} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
              <Tooltip contentStyle={TT} formatter={v=>[fmt(v),""]}/>
              <Bar dataKey="v" radius={[3,3,0,0]}
                fill="#A3A3A3"
                shape={(props)=>{
                  const {x,y,width,height,cur} = props;
                  return <rect x={x} y={y} width={width} height={height} rx={2} fill={props.cur?"#111827":"#E5E7EB"}/>;
                }}
              />
            </BarChart>
          </ResponsiveContainer>
        ) : (
          <div style={{textAlign:"center",padding:"16px 0",color:"#374151",fontSize:13}}>
            נתונים יופיעו כאן לאחר ייבוא קובץ שנה שעברה
          </div>
        )}
        {/* mini grid */}
        <div style={{display:"flex",gap:3,marginTop:8,flexWrap:"wrap"}}>
          {lastYear.map((m,i)=>{
            const profitColor = m.grossProfitPct > 5 ? "#16A34A" : m.grossProfitPct > 0 ? "#D97706" : "#DC2626";
            return (
              <div key={i} style={{flex:"0 0 calc(8.33% - 3px)",textAlign:"center",padding:"5px 2px",background:i===currentMonth?"#F3F4F6":"#F9FAFB",borderRadius:5,border:`1px solid ${"#E5E7EB"}`}}>
                <div style={{fontSize:9,color:"#9CA3AF"}}>{MONTH_NAMES[i].slice(0,3)}</div>
                <div style={{fontSize:10,fontWeight:700,color:m.sales>0?"#111827":"#E5E7EB",marginTop:2}}>
                  {m.sales>0?`${Math.round(m.sales/1000)}k`:"--"}
                </div>
                {m.sales>0 && <div style={{fontSize:9,color:profitColor,marginTop:1}}>{m.grossProfitPct > 0 ? "+" : ""}{m.grossProfitPct}%</div>}
              </div>
            );
          })}
        </div>
      </div>

    </div>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(<PilotDashboard />);
  
  </script>
</body>
</html>
