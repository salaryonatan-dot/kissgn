  <script type="module">
    import { initializeApp, initializeApp as initializeApp2 } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, set, remove, onValue, forceWebSockets } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             sendPasswordResetEmail, onAuthStateChanged, signOut, updateProfile }
             from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";

    // ── Config loaded from server (keeps keys out of static HTML) ──────────────
    let firebaseConfig;
    try {
      const res = await fetch("/api/config");
      if (!res.ok) throw new Error("config fetch failed");
      firebaseConfig = await res.json();
      if (firebaseConfig.error) throw new Error(firebaseConfig.error);
    } catch(e) {
      console.error("[firebase-init] could not load config:", e.message);
      document.getElementById("root").innerHTML =
        "<div style='padding:40px;text-align:center;color:#EF4444;font-family:sans-serif'>" +
        "⚠️ שגיאה בטעינת הגדרות האפליקציה. רענן את הדף.</div>";
      throw e; // stop execution
    }

    const app  = initializeApp(firebaseConfig);
    forceWebSockets(); // Use WebSocket only -- prevents CSP violations from long-polling <script> injection
    const db   = getDatabase(app);
    const auth = getAuth(app);

    // ── App Check (reCAPTCHA v3) -- enforced on RTDB ────────────────────────────
    // Set RECAPTCHA_SITE_KEY in Vercel env. In dev, set self.FIREBASE_APPCHECK_DEBUG_TOKEN=true in console.
    const recaptchaKey = firebaseConfig.recaptchaSiteKey;
    if (recaptchaKey) {
      try {
        initializeAppCheck(app, {
          provider: new ReCaptchaV3Provider(recaptchaKey),
          isTokenAutoRefreshEnabled: true,
        });
      } catch(e) { console.warn("[app-check] init failed:", e.message); }
    } else {
      console.warn("[app-check] RECAPTCHA_SITE_KEY missing -- App Check disabled");
    }

    // ── Auth: Email/Password ──────────────────────────────────────────────────
    let _uid  = null;
    let _user = null;

    // Returns a fresh ID token for API Authorization headers
    window.getIdToken = async (forceRefresh=false) => {
      if (!_user) throw new Error("not authenticated");
      return _user.getIdToken(forceRefresh);
    };

    // Sign in with email + password
    window.firebaseSignIn = async (email, password) => {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      _uid  = cred.user.uid;
      _user = cred.user;
      return cred.user;
    };

    // Create a new Firebase Auth user (uses secondary app to avoid signing out current user)
    window.firebaseCreateUser = async (email, password) => {
      const cfg = window._firebaseConfig || firebaseConfig;
      const secondaryApp  = window._initializeApp(cfg, `secondary_${Date.now()}`);
      const secondaryAuth = getAuth(secondaryApp);
      const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
      const uid  = cred.user.uid;
      await signOut(secondaryAuth);
      return uid;
    };

    // Send password reset email
    window.firebaseSendReset = async (email) => {
      await sendPasswordResetEmail(auth, email);
    };

    // Update user display name (used for tenant discovery)
    window.firebaseUpdateDisplayName = async (user, name) => {
      try { await updateProfile(user, { displayName: name }); } catch(_){}
    };

    // Sign out
    window.firebaseSignOut = async () => {
      const prevUid = _uid;
      await signOut(auth);
      _uid  = null;
      _user = null;
      // Clear tenant cache on logout
      if(prevUid) {
        try {
          localStorage.removeItem("marjin_tid_" + prevUid);
          localStorage.removeItem("marjin_biz_" + prevUid);
        } catch(_){}
      }
    };

    // Wait for auth state to settle (user may already be signed in from previous session)
    const authReady = new Promise(resolve => {
      onAuthStateChanged(auth, user => {
        if (user) { _uid = user.uid; _user = user; }
        resolve(user); // resolve with user or null -- app decides what to do
      });
    });
    await authReady;

    // Firebase converts arrays to objects -- so we store as {v: jsonString}
    // All operational data lives under /tenants/{bizId}/ scoped by RTDB RBAC
    // _currentTenantId is set by the app when a business is selected
    let _currentTenantId = null;
    window.setTenantId = id => { _currentTenantId = id; };

    const fkey = k => {
      if (!_currentTenantId) throw new Error("tenant not set");
      return "tenants/" + _currentTenantId + "/" + k.replace(/[.#$\[\]]/g, "_");
    };
    // System data now lives under tenants/{tenantId}/app/
    // Requires tenantId to be set first via window.setTenantId
    const fkeyShared = k => {
      const safe = k.replace(/[.#$\[\]]/g, "_");
      if (safe === "app-users")      return _currentTenantId ? `tenants/${_currentTenantId}/app/users`    : null;
      if (safe === "app-businesses") return _currentTenantId ? `tenants/${_currentTenantId}/app/business` : null;
      if (!_currentTenantId) return null;
      return `tenants/${_currentTenantId}/${safe}`;
    };
    window.storage = {
      get: async (key, shared=false) => {
        const path = shared ? fkeyShared(key) : fkey(key);
        if (!path) throw new Error("tenant not set for shared key: " + key);
        const snap = await get(ref(db, path));
        if (!snap.exists()) throw new Error("not found");
        const raw = snap.val();
        const value = (raw && typeof raw === "object" && "_v" in raw) ? raw._v : JSON.stringify(raw);
        return { key, value, shared };
      },
      set: async (key, value, shared=false) => {
        const str = typeof value === "string" ? value : JSON.stringify(value);
        const path = shared ? fkeyShared(key) : fkey(key);
        if (!path) throw new Error("tenant not set for shared key: " + key);
        await set(ref(db, path), { _v: str });
        return { key, value: str, shared };
      },
      delete: async (key, shared=false) => {
        const path = shared ? fkeyShared(key) : fkey(key);
        await remove(ref(db, path));
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const snap = await get(ref(db, "marjin"));
        if (!snap.exists()) return { keys: [] };
        const pfx = (prefix || "").replace(/[.#$\[\]]/g, "_");
        const keys = Object.keys(snap.val()).filter(k => k.startsWith(pfx));
        return { keys };
      },
    };

    // Live listener -- calls callback whenever any key changes
    window.storage.subscribe = (key, callback, shared=false) => {
      const path = shared ? fkeyShared(key) : fkey(key);
      if (!path) return () => {}; // no-op unsubscribe if tenant not set
      const r = ref(db, path);
      return onValue(r, (snap) => {
        if (snap.exists()) {
          const raw = snap.val();
          const value = (raw && typeof raw === "object" && "_v" in raw) ? raw._v : JSON.stringify(raw);
          callback({ key, value });
        }
      });
    };
    // Expose uid for app use
    window.storage.getUid = () => _uid;

    // ── Authenticated fetch for Edge Functions ────────────────────────────────
    window.apiFetch = async (path, options={}) => {
      const token = await window.getIdToken();
      const headers = {
        "Authorization": `Bearer ${token}`,
        "Content-Type":  "application/json",
        ...(options.headers || {}),
      };
      return fetch(path, { ...options, headers });
    };

    // Raw RTDB get (without storage wrapper) -- used for pre-auth lookups
    window._rtdbGet = async (path) => {
      const snap = await get(ref(db, path));
      return snap.exists() ? snap.val() : null;
    };
    // Raw RTDB set -- used for lookup table writes
    window._rtdbSet = async (path, val) => {
      await set(ref(db, path), val);
    };

    window._auth            = auth;             // expose for tenant discovery fallback
    window._initializeApp   = initializeApp2;  // expose for creating secondary apps
    window._firebaseConfig  = firebaseConfig;  // expose config for secondary app creation
    window._firebaseReady = true;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

function calcMetrics(entries, fixedList, cfg={}) {
  const rentPct    = cfg.rentPct    ?? RENT_PCT;
  const royaltyPct = cfg.royaltyPct ?? ROYALTY_PCT;
  const totalSales = entries.reduce((a,e)=>a+(Number(e.sales)||0)+(Number(e.deliveries)||0)+(Number(e.other_income)||0),0);
  const totalPayroll = entries.reduce((a,e)=>{
    const globalPay = Number(e.payroll)||0;
    const hourlyPay = e.hourly_payroll ? Object.values(e.hourly_payroll).reduce((s,v)=>s+(Number(v)||0),0) : 0;
    return a + globalPay + hourlyPay;
  },0);
  const totalOtherExpense = entries.reduce((a,e)=>a+(Number(e.other_expense)||0),0);
  const supplierTotals = {};
  (cfg.suppliers||[]).forEach(s => { supplierTotals[s.id]=0; });
  entries.forEach(e => {
    if (e.supplier_payments) Object.entries(e.supplier_payments).forEach(([sid,amt])=>{
      supplierTotals[sid]=(supplierTotals[sid]||0)+Math.round(Number(amt)||0);
    });
  });
  const totalFood = Object.values(supplierTotals).reduce((a,b)=>a+b,0);
  const resolvedFixed = fixedList.map(f => {
    if (f.rentPct) {
      if(cfg.rentType==="fixed") return {...f, amount: cfg.rentFixed||0};
      return {...f, amount: Math.round(totalSales * rentPct / 100)};
    }
    if (f.royaltyPct) return {...f, amount: Math.round(totalSales * royaltyPct / 100)};
    return f;
  });
  const TOTAL_FIXED = resolvedFixed.reduce((a,b)=>a+b.amount,0);
  const fixedSoFar = resolvedFixed.filter(f=>f.dueDay<=DAY_OF_MONTH).reduce((a,b)=>a+b.amount,0);
  const totalExpenses = totalFood+totalPayroll+totalOtherExpense+fixedSoFar;
  const lc = totalSales-totalExpenses;
  const fc = totalSales-totalFood-totalPayroll-totalOtherExpense-TOTAL_FIXED;
  const foodCostPct = totalSales>0?(totalFood/totalSales)*100:0;
  // Financing = credit card commission (cash sales) + delivery platform fee (25% of deliveries)
  const totalDeliveries = entries.reduce((a,e)=>a+(Number(e.deliveries)||0),0);
  const cashSales = totalSales - totalDeliveries;
  const creditCardFinancing = 0;
  const deliveryPlatformFee = 0;
  const totalFinancing = 0;
  const deliveryPct = totalSales > 0 ? (totalDeliveries / totalSales) * 100 : 0;
  const lcAfterFinancing = lc;
  const fcAfterFinancing = fc;
  const dailyAvg = DAY_OF_MONTH>0?lcAfterFinancing/DAY_OF_MONTH:0;
  const forecast = lcAfterFinancing+(dailyAvg*(DAYS_IN_MONTH-DAY_OF_MONTH))-(TOTAL_FIXED-fixedSoFar);
  return { totalSales, totalPayroll, totalOtherExpense, totalFood, fixedSoFar, totalExpenses, lc:lcAfterFinancing, fc:fcAfterFinancing, foodCostPct, forecast, dailyAvg, resolvedFixed, TOTAL_FIXED, supplierTotals, totalFinancing, creditCardFinancing, deliveryPlatformFee, deliveryPct, totalDeliveries, lcBeforeFinancing:lc };
}

function buildChart(entries) {
  const byDay={};
  entries.forEach(e=>{
    const d=parseInt(e.date.split("-")[2]);
    if(!byDay[d]) byDay[d]={income:0,expense:0};
    byDay[d].income+=(Number(e.sales)||0)+(Number(e.deliveries)||0)+(Number(e.other_income)||0);
    const s=e.supplier_payments?Object.values(e.supplier_payments).reduce((a,b)=>a+Math.round(Number(b)||0),0):0;
    byDay[d].expense+=s+(Number(e.payroll)||0)+(Number(e.other_expense)||0);
  });
  let running=0;
  return Array.from({length:DAY_OF_MONTH},(_,i)=>{
    const d=i+1;
    running+=(byDay[d]?.income||0)-(byDay[d]?.expense||0);
    return {day:d, הכנסות:byDay[d]?.income||0, הוצאות:byDay[d]?.expense||0, יתרה:running};
  });
}


// ─── Login Screen ─────────────────────────────────────────────────────────────
const ROLES = {
  super_owner: { label:"בעלים ראשי",  color:"#7C3AED", bg:"#F5F3FF" },
  owner:       { label:"בעלים",        color:"#2563EB", bg:"#EFF6FF" },
  manager:     { label:"מנהל מסעדה",  color:"#0891B2", bg:"#ECFEFF" },
  staff:       { label:"אחמש",         color:"#6B7280", bg:"#F9FAFB" },
};



function LoginScreen({ onLogin, tenantId }) {
  const [username,    setUsername]    = useState("");
  const [password,    setPassword]    = useState("");
  const [err,         setErr]         = useState("");
  const [loading,     setLoading]     = useState(false);
  const [showPass,    setShowPass]    = useState(false);
  const [resetMode,   setResetMode]   = useState(false);
  const [resetEmail,  setResetEmail]  = useState("");
  const [resetSent,   setResetSent]   = useState(false);

  // ── Hardcoded master user fallback ─────────────────────────────────────────
  const MASTER_USERS = {
    "yonatan": { email: "salaryonatan@gmail.com", tenantId: "biz_1772560427387", name: "יונתן סלרי" }
  };

  const tryLogin = async () => {
    if(!username.trim() || !password.trim()) { setErr("יש למלא שם משתמש וסיסמה"); return; }
    setLoading(true); setErr("");
    const dbg = []; // debug log
    try {
      const input = username.trim();
      const isEmail = input.includes("@");
      const uname = isEmail ? null : input.toLowerCase();
      let email = isEmail ? input.toLowerCase() : null;
      let foundTenantId = null;
      dbg.push("input=" + input + " isEmail=" + isEmail + " tenantId=" + tenantId);

      // ── Path A: username given -- lookup email ────────────────────────────────
      if(!email) {
        // Fast: tenantId already known
        if(tenantId) {
          try {
            const snap = await window._rtdbGet(`tenants/${tenantId}/lookup/${uname}`);
            dbg.push("fast-lookup=" + JSON.stringify(snap));
            if(snap && snap.email) { email = snap.email; foundTenantId = tenantId; }
          } catch(e){ dbg.push("fast-err=" + e.message); }
        }
        // Medium: username_index
        if(!email) {
          try {
            const indexed = await window._rtdbGet("username_index/" + uname);
            dbg.push("index=" + JSON.stringify(indexed));
            if(indexed && indexed.email) { email = indexed.email; foundTenantId = indexed.tenantId; }
            else if(indexed && indexed.tenantId) {
              foundTenantId = indexed.tenantId;
              const snap2 = await window._rtdbGet(`tenants/${indexed.tenantId}/lookup/${uname}`);
              dbg.push("lookup2=" + JSON.stringify(snap2));
              if(snap2 && snap2.email) email = snap2.email;
            }
          } catch(e){ dbg.push("index-err=" + e.message); }
        }
        // Hardcoded master fallback
        if(!email && MASTER_USERS[uname]) {
          email = MASTER_USERS[uname].email;
          foundTenantId = MASTER_USERS[uname].tenantId;
          dbg.push("master-fallback=true");
        }
        if(!email) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }
      }

      // ── Sign in with Firebase Auth ─────────────────────────────────────────
      dbg.push("before-signIn email=" + email);
      const fbUser = await window.firebaseSignIn(email, password);
      dbg.push("signIn-ok uid=" + fbUser.uid);

      // ── Find tenantId ─────────────────────────────────────────────────────────
      if(!foundTenantId) {
        try {
          const t = await window._rtdbGet("user_tenants/" + fbUser.uid);
          dbg.push("user_tenants=" + t);
          if(t && typeof t === "string") foundTenantId = t;
        } catch(e){ dbg.push("user_tenants-err=" + e.message); }
      }
      if(!foundTenantId) {
        try {
          const cached = localStorage.getItem("marjin_tid_" + fbUser.uid);
          dbg.push("ls-cache=" + cached);
          if(cached) foundTenantId = cached;
        } catch(_){}
      }
      dbg.push("foundTenantId=" + foundTenantId);
      if(!foundTenantId) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }

      // ── Load user profile ────────────────────────────────────────────────────
      let users = [];
      try {
        const userSnap = await window._rtdbGet(`tenants/${foundTenantId}/app/users`);
        users = userSnap?._v ? JSON.parse(userSnap._v) : [];
      } catch(_) { users = []; }
      // Find by username or by email (support both inputs)
      let u = uname
        ? users.find(u => u.username?.toLowerCase() === uname)
        : users.find(u => u.email?.toLowerCase() === email.toLowerCase());
      dbg.push("users=" + users.length + " searching-" + (uname||email));
      // Fallback: build user from master data if not found in app/users
      if(!u && uname && MASTER_USERS[uname]) {
        u = { id: 1, username: uname, name: MASTER_USERS[uname].name,
               email: MASTER_USERS[uname].email, role: "super_owner", firebaseUid: fbUser.uid };
        dbg.push("user-from-master=true");
        // Write to app/users so future logins find it
        try {
          await window._rtdbSet("username_index/" + uname, { tenantId: foundTenantId, email: u.email });
          await window._rtdbSet("user_tenants/" + fbUser.uid, foundTenantId);
        } catch(_){}
      }
      dbg.push("u=" + (u ? u.username : "null"));
      if(!u) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }

      // Cache tenant + biz to localStorage + RTDB on every login
      try {
        localStorage.setItem("marjin_tid_" + fbUser.uid, foundTenantId);
        localStorage.setItem("marjin_biz_" + fbUser.uid, foundTenantId);
        await window._rtdbSet("user_tenants/" + fbUser.uid, foundTenantId);
        // Always update username_index so new browsers can find this user
        if(u.username) await window._rtdbSet("username_index/" + u.username.toLowerCase(), { tenantId: foundTenantId, email: u.email });
      } catch(_){}
      setErr("");
      // Store username in Firebase Auth displayName for tenant discovery fallback
      try { await window.firebaseUpdateDisplayName(fbUser, uname); } catch(_){}
      onLogin({...u, _tenantId: foundTenantId, firebaseUid: fbUser.uid});
    } catch(e) {
      const msg = e.code === "auth/wrong-password" || e.code === "auth/invalid-credential"
        ? "סיסמה שגויה" : e.code === "auth/too-many-requests"
        ? "יותר מדי ניסיונות -- נסה שוב מאוחר יותר" : (e.message||"err") + " | " + dbg.join(" | ");
      setErr(msg);
    }
    setLoading(false);
  };

  const trySendReset = async () => {
    if(!resetEmail.trim()) { setErr("יש להזין כתובת מייל"); return; }
    setLoading(true); setErr("");
    try {
      await window.firebaseSendReset(resetEmail.trim());
      setResetSent(true);
    } catch(e) {
      setErr(e.code === "auth/user-not-found" ? "מייל לא נמצא במערכת" : "שגיאה בשליחת המייל");
    }
    setLoading(false);
  };

  const L = {
    root:{minHeight:"100vh",background:"#F1F5F9",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"inherit",direction:"rtl"},
    box:{background:"#FFFFFF",borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:380,boxShadow:"0 4px 24px #0000001A",border:"1px solid #E5E7EB"},
    logo:{textAlign:"center",marginBottom:28},
    logoIcon:{fontSize:48,marginBottom:8},
    logoTitle:{fontSize:22,fontWeight:900,color:"#111827",margin:0},
    logoSub:{fontSize:13,color:"#9CA3AF",marginTop:4},
    lbl:{fontSize:13,color:"#6B7280",marginBottom:6,display:"block",fontWeight:600},
    inp:{width:"100%",border:"1px solid #D1D5DB",borderRadius:10,padding:"13px 14px",color:"#111827",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:14,background:"#FFFFFF"},
    inpFocus:{borderColor:"#2563EB"},
    passWrap:{position:"relative",marginBottom:14},
    passInp:{width:"100%",border:"1px solid #D1D5DB",borderRadius:10,padding:"13px 40px 13px 14px",color:"#111827",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",background:"#FFFFFF"},
    eyeBtn:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:18,padding:4},
    btn:{width:"100%",padding:"15px",background:"#2563EB",border:"none",borderRadius:12,color:"#FFFFFF",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"inherit",letterSpacing:0.2},
    err:{color:"#EF4444",fontSize:13,textAlign:"center",marginBottom:12,fontWeight:600},
    foot:{textAlign:"center",marginTop:20,fontSize:12,color:"#9CA3AF"},
  };

  return (
    <div style={L.root}>
      <div style={L.box}>
        <div style={L.logo}>
          <div style={L.logoIcon}>📊</div>
          <h1 style={L.logoTitle}>לוח בקרה</h1>
          <p style={L.logoSub}>מערכת ניהול מסעדות</p>
        </div>
        <label style={L.lbl}>שם משתמש</label>
        <input style={L.inp} placeholder="username" value={username}
          onChange={e=>{setUsername(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          autoCapitalize="none" autoCorrect="off"/>
        <label style={L.lbl}>סיסמה</label>
        <div style={L.passWrap}>
          <input style={L.passInp} type={showPass?"text":"password"} placeholder="••••••"
            value={password} onChange={e=>{setPassword(e.target.value);setErr(false);}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
          <button style={L.eyeBtn} onClick={()=>setShowPass(p=>!p)}>{showPass?"🙈":"👁"}</button>
        </div>
        {err && <div style={L.err}>{err}</div>}
        <button style={{...L.btn, opacity:loading?0.6:1}} onClick={loading?null:tryLogin} disabled={loading}>
          {loading ? "מתחבר..." : "כניסה"}
        </button>
        <div style={{textAlign:"center",marginTop:14}}>
          <button onClick={()=>{setResetMode(true);setErr("");}}
            style={{background:"none",border:"none",color:"#2563EB",fontSize:13,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>
            שכחתי סיסמה
          </button>
        </div>
      </div>
      {/* ── Forgot password modal ─────────────────────────────────────── */}
      {resetMode && (
        <div style={{position:"fixed",inset:0,background:"#0006",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,boxShadow:"0 8px 32px #0003",direction:"rtl"}}>
            {resetSent ? (
              <>
                <div style={{fontSize:36,textAlign:"center",marginBottom:12}}>✉️</div>
                <h3 style={{margin:"0 0 8px",textAlign:"center",fontWeight:800}}>נשלח!</h3>
                <p style={{color:"#6B7280",textAlign:"center",fontSize:14}}>בדוק את תיבת הדואר שלך ולחץ על הקישור לאיפוס הסיסמה.</p>
                <button onClick={()=>{setResetMode(false);setResetSent(false);setResetEmail("");}}
                  style={{width:"100%",padding:"13px",background:"#2563EB",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginTop:16,fontFamily:"inherit"}}>
                  סגור
                </button>
              </>
            ) : (
              <>
                <h3 style={{margin:"0 0 6px",fontWeight:800}}>איפוס סיסמה</h3>
                <p style={{color:"#6B7280",fontSize:13,margin:"0 0 16px"}}>הזן את כתובת המייל שלך ונשלח לך קישור לאיפוס.</p>
                <input style={{width:"100%",border:"1px solid #D1D5DB",borderRadius:9,padding:"11px 13px",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:12,direction:"ltr"}}
                  type="email" placeholder="your@email.com"
                  value={resetEmail} onChange={e=>setResetEmail(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&trySendReset()}/>
                {err && <div style={{color:"#EF4444",fontSize:13,marginBottom:10,fontWeight:600}}>{err}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={trySendReset} disabled={loading}
                    style={{flex:1,padding:"12px",background:"#2563EB",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",opacity:loading?0.6:1}}>
                    {loading ? "שולח..." : "שלח קישור"}
                  </button>
                  <button onClick={()=>{setResetMode(false);setErr("");}}
                    style={{padding:"12px 16px",background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:10,color:"#6B7280",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                    ביטול
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── User Management Panel ────────────────────────────────────────────────────
function UserManagement({ users, saveUsers, tenantId, businesses }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId,  setEditId]  = useState(null);
  const [form, setForm] = useState({name:"",username:"",email:"",password:"",role:"manager",allowedBizIds:[]});
  const [err,  setErr]  = useState("");
  const [saving, setSaving] = useState(false);

  const resetForm = () => { setForm({name:"",username:"",email:"",password:"",role:"manager",allowedBizIds:[]}); setErr(""); setShowAdd(false); setEditId(null); };

  const toggleBiz = (bizId) => {
    setForm(f => ({
      ...f,
      allowedBizIds: f.allowedBizIds.includes(bizId)
        ? f.allowedBizIds.filter(id => id !== bizId)
        : [...f.allowedBizIds, bizId]
    }));
  };

  // super_owner/owner always have access to all -- no allowedBizIds needed
  const needsBizAccess = form.role !== "super_owner" && form.role !== "owner";

  const save = async () => {
    if(!form.name.trim()||!form.username.trim()) return setErr("יש למלא שם ושם משתמש");
    if(!editId && (!form.email.trim()||!form.password)) return setErr("יש למלא מייל וסיסמה");
    if(users.find(u=>u.username===form.username.trim()&&u.id!==editId)) return setErr("שם משתמש כבר קיים");
    if(!editId && users.find(u=>u.email===form.email.trim())) return setErr("מייל כבר קיים");
    if(needsBizAccess && form.allowedBizIds.length===0 && businesses.length>1) return setErr("יש לבחור לפחות עסק אחד");
    setSaving(true); setErr("");
    try {
      const allowedBizIds = needsBizAccess
        ? (businesses.length === 1 ? [businesses[0].id] : form.allowedBizIds)
        : null; // null = all businesses
      if(editId) {
        saveUsers(users.map(u=>u.id===editId
          ? {...u, name:form.name, username:form.username.trim(), role:form.role, allowedBizIds}
          : u));
      } else {
        let firebaseUid;
        try {
          firebaseUid = await window.firebaseCreateUser(form.email.trim(), form.password);
        } catch(createErr) {
          if(createErr.code === "auth/email-already-in-use") {
            // User exists in Firebase Auth but not in app/users -- recover by signing in to get uid
            try {
              const tmpUser = await window.firebaseSignIn(form.email.trim(), form.password);
              firebaseUid = tmpUser.uid;
            } catch(signInErr) {
              // Can't sign in -- wrong password or other issue
              setErr("המשתמש קיים ב-Firebase אך הסיסמה שגויה -- הזן את הסיסמה המקורית שלו");
              setSaving(false); return;
            }
          } else {
            throw createErr;
          }
        }
        const uLower2 = form.username.trim().toLowerCase();
        await window._rtdbSet(`tenants/${tenantId}/lookup/${uLower2}`, { email: form.email.trim(), firebaseUid });
        await window._rtdbSet(`username_index/${uLower2}`, { tenantId, email: form.email.trim() });
        await window._rtdbSet(`tenants/${tenantId}/members/${firebaseUid}`, true);
        await window._rtdbSet(`tenants/${tenantId}/roles/${firebaseUid}`, form.role);
        await window._rtdbSet(`user_tenants/${firebaseUid}`, tenantId);
        const newUser = {id:Date.now(), name:form.name.trim(), username:form.username.trim(),
          email:form.email.trim(), role:form.role, firebaseUid, allowedBizIds};
        saveUsers([...users, newUser]);
      }
      resetForm();
    } catch(e) {
      const msg = e.code==="auth/weak-password" ? "סיסמה חלשה מדי (מינימום 6 תווים)"
        : e.message || "שגיאה ביצירת המשתמש";
      setErr(msg);
    }
    setSaving(false);
  };

  const startEdit = (u) => { setEditId(u.id); setForm({name:u.name,username:u.username,password:"",role:u.role,allowedBizIds:u.allowedBizIds||[]}); setShowAdd(true); };
  const deleteUser = (id) => { if(users.find(u=>u.id===id)?.role==="super_owner") return; saveUsers(users.filter(u=>u.id!==id)); };

  const UM = {
    wrap:{},
    card:{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:14,padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px #0000000A"},
    roleBadge:{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20},
    addForm:{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:14,padding:"18px",marginBottom:12},
    lbl:{fontSize:13,color:"#6B7280",marginBottom:5,display:"block",fontWeight:600},
    inp:{width:"100%",border:"1px solid #D1D5DB",borderRadius:9,padding:"11px 13px",color:"#111827",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10,background:"#FFFFFF"},
    sel:{width:"100%",border:"1px solid #D1D5DB",borderRadius:9,padding:"11px 13px",color:"#111827",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10,background:"#FFFFFF"},
    saveBtn:{flex:1,padding:"12px",background:"#2563EB",border:"none",borderRadius:10,color:"#FFFFFF",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"},
    cancelBtn:{padding:"12px 16px",background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:10,color:"#6B7280",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"},
    addBtn:{width:"100%",padding:"13px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:12,color:"#2563EB",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",marginTop:4},
    delBtn:{background:"none",border:"none",color:"#D1D5DB",cursor:"pointer",fontSize:18,padding:"4px 6px"},
    editBtn:{background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:8,padding:"5px 10px",color:"#6B7280",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600},
    err:{color:"#EF4444",fontSize:12,marginBottom:8,fontWeight:600},
  };

  return (
    <div style={UM.wrap}>
      {/* User list */}
      {users.map(u=>(
        <div key={u.id} style={UM.card}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:"#111827",fontSize:14}}>{u.name}</div>
            <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>@{u.username}</div>
          </div>
          <span style={{...UM.roleBadge,color:ROLES[u.role]?.color||"#6B7280",background:ROLES[u.role]?.bg||"#F9FAFB"}}>
            {ROLES[u.role]?.label||u.role}
          </span>
          {u.allowedBizIds && u.allowedBizIds.length > 0 && businesses && (
            <span style={{fontSize:10,color:"#6B7280",background:"#F1F5F9",borderRadius:6,padding:"2px 7px",fontWeight:600}}>
              {u.allowedBizIds.length===businesses.length ? "כל העסקים" : u.allowedBizIds.map(id=>(businesses.find(b=>b.id===id)?.name||id)).join(", ")}
            </span>
          )}
          <button style={UM.editBtn} onClick={()=>startEdit(u)}>עריכה</button>
          {u.role!=="super_owner" && <button style={UM.delBtn} onClick={()=>deleteUser(u.id)}>✕</button>}
        </div>
      ))}

      {/* Add/Edit form */}
      {showAdd ? (
        <div style={UM.addForm}>
          <div style={{fontWeight:700,color:"#111827",fontSize:15,marginBottom:14}}>{editId?"עריכת משתמש":"הוספת משתמש"}</div>
          {err && <div style={UM.err}>{err}</div>}
          <label style={UM.lbl}>שם מלא</label>
          <input style={UM.inp} placeholder="ישראל ישראלי" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          <label style={UM.lbl}>שם משתמש</label>
          <input style={UM.inp} placeholder="username" autoCapitalize="none" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} disabled={!!editId}/>
          {!editId && <>
            <label style={UM.lbl}>כתובת מייל (לשחזור סיסמה)</label>
            <input style={{...UM.inp,direction:"ltr"}} type="email" placeholder="user@example.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
            <label style={UM.lbl}>סיסמה ראשונית (מינימום 6 תווים)</label>
            <input style={UM.inp} type="password" placeholder="••••••" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
          </>}
          <label style={UM.lbl}>תפקיד</label>
          <select style={UM.sel} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value, allowedBizIds:[]}))}>
            <option value="owner">בעלים -- גישה מלאה לכל</option>
            <option value="manager">מנהל מסעדה -- לוח בקרה מלא</option>
            <option value="staff">אחמש -- צ׳קליסט משמרות בלבד</option>
          </select>
          {needsBizAccess && businesses && businesses.length > 1 && (
            <div style={{marginBottom:12}}>
              <label style={{...UM.lbl,marginBottom:8}}>גישה לעסקים</label>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {businesses.map(biz => (
                  <label key={biz.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:form.allowedBizIds.includes(biz.id)?"#EFF6FF":"#F9FAFB",border:"1px solid "+(form.allowedBizIds.includes(biz.id)?"#BFDBFE":"#E5E7EB"),borderRadius:10,cursor:"pointer",fontFamily:"inherit"}}>
                    <input type="checkbox" checked={form.allowedBizIds.includes(biz.id)} onChange={()=>toggleBiz(biz.id)} style={{width:16,height:16,accentColor:"#2563EB",cursor:"pointer",flexShrink:0}}/>
                    <span style={{fontSize:14,fontWeight:600,color:"#111827"}}>{biz.name}</span>
                  </label>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button style={UM.saveBtn} onClick={save}>שמור</button>
            <button style={UM.cancelBtn} onClick={resetForm}>ביטול</button>
          </div>
        </div>
      ) : (
        <button style={UM.addBtn} onClick={()=>{setShowAdd(true);setEditId(null);}}>+ הוסף משתמש</button>
      )}
    </div>
  );
}

// ─── Setup Wizard ─────────────────────────────────────────────────────────────
const DOW_LABELS = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
const DOW_FULL   = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

function SetupWizard({ initial, initialSuppliers, initialFixed, onComplete, onCancel, isFirstSetup=true }) {
  const [step, setStep] = useState(1);
  // Step 1 -- פרטי עסק
  const [bizName,      setBizName]      = useState(initial.businessName || "");
  const [rentType,     setRentType]     = useState(initial.rentType || "pct"); // "pct" | "fixed"
  const [rentPct,      setRentPct]      = useState(initial.rentPct || "");
  const [rentFixed,    setRentFixed]    = useState(initial.rentFixed || "");
  const [hasRoyalty,   setHasRoyalty]   = useState(initial.hasRoyalty || false);
  const [royaltyPct,   setRoyaltyPct]   = useState(initial.royaltyPct || "");

  // Step 2 -- יעדים
  const [tFood,  setTFood]  = useState(initial.targets?.foodCostPct  || 33);
  const [tLabor, setTLabor] = useState(initial.targets?.laborCostPct || 27);
  const [tGrowth,setTGrowth]= useState(initial.targets?.salesGrowthPct || 5);
  const [waGroupId, setWaGroupId] = useState(initial.whatsappGroupId || "");

  // Step 3 -- ספקים
  const [suppliers, setSuppliers] = useState(
    initialSuppliers.length > 0 ? initialSuppliers :
    [{ id: Date.now().toString(), name: "", category: "כללי", days: [] }]
  );
  const [newSupName, setNewSupName] = useState("");
  const [newSupCat,  setNewSupCat]  = useState("כללי");
  const [newSupDays, setNewSupDays] = useState([]);

  // Step 4 -- קבועות
  const [fixedList, setFixedList] = useState(initialFixed);

  const W = {
    root:{position:"fixed",inset:0,background:"#F1F5F9",overflowY:"auto",zIndex:1000,fontFamily:"inherit",direction:"rtl"},
    wrap:{maxWidth:480,margin:"0 auto",padding:"24px 20px 80px"},
    header:{textAlign:"center",padding:"32px 0 28px"},
    step:{fontSize:12,color:"#9CA3AF",marginBottom:8,fontWeight:600,letterSpacing:1},
    progress:{height:3,background:"#F1F5F9",borderRadius:2,marginBottom:32,overflow:"hidden"},
    bar:{height:"100%",background:"#2563EB",borderRadius:2,transition:"width 0.4s"},
    title:{fontSize:22,fontWeight:900,color:"#111827",margin:"0 0 6px"},
    sub:{fontSize:14,color:"#9CA3AF",margin:0},
    card:{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:16,padding:"18px",marginBottom:12,boxShadow:"0 1px 3px #0000000A"},
    lbl:{fontSize:13,color:"#6B7280",marginBottom:6,display:"block",fontWeight:500},
    inp:{width:"100%",background:"#F8FAFC",border:"1px solid #D1D5DB",borderRadius:10,padding:"12px 14px",color:"#111827",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"},
    inpSm:{width:"80px",background:"#F8FAFC",border:"1px solid #D1D5DB",borderRadius:10,padding:"11px 12px",color:"#111827",fontSize:15,fontFamily:"inherit",outline:"none",textAlign:"center"},
    row:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10},
    rowLabel:{fontSize:14,color:"#111827",fontWeight:500},
    rowSub:{fontSize:12,color:"#9CA3AF"},
    bigBtn:{width:"100%",padding:"18px",background:"#2563EB",border:"none",borderRadius:14,color:"#0A0A0A",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"inherit",marginTop:8},
    outBtn:{width:"100%",padding:"14px",background:"transparent",border:"1px solid #D1D5DB",borderRadius:14,color:"#6B7280",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit",marginTop:8},
    dayBtn:{width:36,height:36,borderRadius:8,border:"1px solid #D1D5DB",background:"#F8FAFC",color:"#6B7280",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"},
    dayBtnA:{background:"#EFF6FF",border:"1px solid #BFDBFE",color:"#2563EB"},
    supRow:{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#F8FAFC",borderRadius:10,marginBottom:6},
    delBtn:{background:"none",border:"none",color:"#9CA3AF",cursor:"pointer",fontSize:16,padding:"2px 6px",fontFamily:"inherit"},
    toggle:{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",position:"relative",flexShrink:0,transition:"background 0.2s"},
    toggleKnob:{position:"absolute",top:3,width:18,height:18,borderRadius:"50%",background:"#F5F5F5",transition:"left 0.2s"},
  };

  const toggleDay = (d) => setNewSupDays(prev => prev.includes(d) ? prev.filter(x=>x!==d) : [...prev, d]);

  const addSupplier = () => {
    if(!newSupName.trim()) return;
    setSuppliers(prev => [...prev, { id: Date.now().toString(), name: newSupName.trim(), category: newSupCat, days: [...newSupDays] }]);
    setNewSupName(""); setNewSupCat("כללי"); setNewSupDays([]);
  };

  const removeSupplier = (id) => setSuppliers(prev => prev.filter(s=>s.id!==id));

  const updateFixed = (id, field, val) => setFixedList(prev => prev.map(f => f.id===id ? {...f, [field]:field==="amount"?Number(val)||0:val} : f));

  // Step 5 -- owner account
  const [ownerName,     setOwnerName]     = useState("");
  const [ownerUsername, setOwnerUsername] = useState("");
  const [ownerEmail,    setOwnerEmail]    = useState("");
  const [ownerPassword, setOwnerPassword] = useState("");
  const [ownerPass2,    setOwnerPass2]    = useState("");
  const [ownerErr,      setOwnerErr]      = useState("");

  const TOTAL_STEPS = isFirstSetup ? 5 : 4;

  const finish = async () => {
    if(isFirstSetup) {
      if(!ownerName.trim()||!ownerUsername.trim()||!ownerEmail.trim()||!ownerPassword) return setOwnerErr("יש למלא את כל השדות כולל מייל");
      if(!/^[^@]+@[^@]+\.[^@]+$/.test(ownerEmail.trim())) return setOwnerErr("כתובת מייל לא תקינה");
      if(ownerPassword.length < 6) return setOwnerErr("סיסמה חייבת להיות לפחות 6 תווים");
      if(ownerPassword!==ownerPass2) return setOwnerErr("הסיסמאות אינן תואמות");
      setOwnerErr("");
    }
    const cfg = {
      businessName: bizName.trim() || "המסעדה שלי",
      rentType,
      rentPct:   rentType==="pct"   ? Number(rentPct)||0   : 0,
      rentFixed: rentType==="fixed" ? Number(rentFixed)||0 : 0,
      hasRoyalty,
      royaltyPct: hasRoyalty ? Number(royaltyPct)||0 : 0,
      targets: { salesGrowthPct:Number(tGrowth)||5, foodCostPct:Number(tFood)||33, laborCostPct:Number(tLabor)||27 },
      whatsappGroupId: waGroupId.trim()
    };
    const updatedFixed = fixedList.map(f => {
      if(f.rentPct) return {...f, name:`שכר דירה (${cfg.rentPct}% ממחזור)`};
      if(f.royaltyPct) return hasRoyalty ? {...f, name:`תמלוגים (${cfg.royaltyPct}% ממחזור)`} : {...f, amount:0};
      return f;
    });
    const firstOwner = isFirstSetup ? { name:ownerName.trim(), username:ownerUsername.trim(),
      email:ownerEmail.trim(), password:ownerPassword } : null;
    onComplete(cfg, suppliers.filter(s=>s.name), updatedFixed, firstOwner);
  };

  return (
    <div style={W.root}>
      <div style={W.wrap}>
        <div style={W.header}>
          <div style={W.step}>שלב {step} מתוך {TOTAL_STEPS}</div>
          <div style={W.progress}><div style={{...W.bar, width:`${(step/TOTAL_STEPS)*100}%`}}/></div>
          {step===1 && <><h2 style={W.title}>ברוכים הבאים 👋</h2><p style={W.sub}>נגדיר את העסק שלך -- לוקח 3 דקות</p></>}
          {step===2 && <><h2 style={W.title}>יעדים עסקיים 🎯</h2><p style={W.sub}>מה אתה מכוון להשיג?</p></>}
          {step===3 && <><h2 style={W.title}>רשימת ספקים 🏭</h2><p style={W.sub}>הוסף ספקים וימי אספקה</p></>}
          {step===4 && <><h2 style={W.title}>הוצאות קבועות 🔒</h2><p style={W.sub}>סכומים חודשיים קבועים</p></>}
          {step===5 && <><h2 style={W.title}>יצירת חשבון 🔐</h2><p style={W.sub}>פרטי כניסה לבעלים הראשי</p></>}
        </div>

        {/* ── STEP 1 ── */}
        {step===1 && (
          <>
            <div style={W.card}>
              <label style={W.lbl}>שם העסק</label>
              <input style={W.inp} placeholder="למשל: קפה ירושלמי" value={bizName} onChange={e=>setBizName(e.target.value)}/>
            </div>
            <div style={W.card}>
              <label style={W.lbl}>שכר דירה</label>
              {/* toggle: % מחזור / קבוע */}
              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {[["pct","% ממחזור"],["fixed","סכום קבוע"]].map(([t,l])=>(
                  <button key={t} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,
                    background:rentType===t?"#22C55E15":"#0A0A0A",
                    borderColor:rentType===t?"#22C55E40":"#2A2A2A",
                    color:rentType===t?"#22C55E":"#737373"}}
                    onClick={()=>setRentType(t)}>{l}</button>
                ))}
              </div>
              {rentType==="pct" ? (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input style={W.inpSm} type="number" placeholder="0" value={rentPct} onChange={e=>setRentPct(e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:14}}>% מההכנסות החודשיות</span>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input style={{...W.inpSm,width:110}} type="number" placeholder="0" value={rentFixed} onChange={e=>setRentFixed(e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:14}}>₪ בחודש</span>
                </div>
              )}
            </div>
            <div style={W.card}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:hasRoyalty?14:0}}>
                <div>
                  <div style={{fontSize:14,color:"#111827",fontWeight:600}}>תמלוגים לרשת</div>
                  <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>רלוונטי לזיכיון / רשת</div>
                </div>
                <button style={{...W.toggle, background:hasRoyalty?"#22C55E":"#2A2A2A"}} onClick={()=>setHasRoyalty(p=>!p)}>
                  <div style={{...W.toggleKnob, left:hasRoyalty?23:3}}/>
                </button>
              </div>
              {hasRoyalty && (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input style={W.inpSm} type="number" placeholder="0" value={royaltyPct} onChange={e=>setRoyaltyPct(e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:14}}>% ממחזור</span>
                </div>
              )}
            </div>
            <button style={W.bigBtn} onClick={()=>setStep(2)}>המשך ←</button>
            {onCancel && <button style={W.outBtn} onClick={onCancel}>ביטול</button>}
          </>
        )}

        {/* ── STEP 2 ── */}
        {step===2 && (
          <>
            {[
              {label:"יעד פוד קוסט",sub:"% מהמחזור -- סטנדרט ענפי 28-35%",val:tFood,set:setTFood,color:"#22C55E"},
              {label:"יעד לייבור",sub:"% מהמחזור -- סטנדרט ענפי 25-30%",val:tLabor,set:setTLabor,color:"#F59E0B"},
              {label:"יעד צמיחה",sub:"% גידול מול שנה שעברה",val:tGrowth,set:setTGrowth,color:"#6B7280"},
            ].map(({label,sub,val,set,color})=>(
              <div key={label} style={W.card}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:14,color:"#111827",fontWeight:600}}>{label}</div>
                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{sub}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button style={{...W.dayBtn,width:32,height:32,fontSize:16}} onClick={()=>set(v=>Math.max(0,Math.round((Number(v)-0.5)*10)/10))}>−</button>
                    <input type="number" inputMode="decimal" step="0.5" min="0" max="100" value={val} onChange={e=>set(e.target.value)} style={{width:58,textAlign:"center",fontSize:16,fontWeight:900,color,border:"1px solid #E5E7EB",borderRadius:8,padding:"3px 4px",background:"#F9FAFB",fontFamily:"inherit"}}/>
                    <span style={{fontSize:14,color,fontWeight:700,marginLeft:-4}}>%</span>
                    <button style={{...W.dayBtn,width:32,height:32,fontSize:16}} onClick={()=>set(v=>Math.round((Number(v)+0.5)*10)/10)}>+</button>
                  </div>
                </div>
              </div>
            ))}
            <div style={W.card}>
              <div style={{fontSize:14,color:"#111827",fontWeight:600,marginBottom:4}}>📱 קבוצת וואטסאפ</div>
              <div style={{fontSize:11,color:"#9CA3AF",marginBottom:10}}>Group ID לקבלת דוחות והתראות (אופציונלי)</div>
              <input style={{width:"100%",border:"1px solid #D1D5DB",borderRadius:9,padding:"10px 12px",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",direction:"ltr",background:"#F9FAFB"}}
                placeholder="120363420449632272" value={waGroupId}
                onChange={e=>setWaGroupId(e.target.value.replace(/[^0-9]/g,""))}/>
            </div>
            <button style={W.bigBtn} onClick={()=>setStep(3)}>המשך ←</button>
            <button style={W.outBtn} onClick={()=>setStep(1)}>→ חזרה</button>
          </>
        )}

        {/* ── STEP 3 ── */}
        {step===3 && (
          <>
            {/* רשימת ספקים קיימים */}
            {suppliers.filter(s=>s.name).map(sup=>(
              <div key={sup.id} style={W.supRow}>
                <button style={W.delBtn} onClick={()=>removeSupplier(sup.id)}>✕</button>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontSize:14,color:"#111827",fontWeight:600}}>{sup.name}</div>
                  </div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>
                    {sup.category} · {sup.days.length>0 ? sup.days.map(d=>DOW_LABELS[d]).join(" ") : "ללא ימים קבועים"}
                  </div>
                </div>
              </div>
            ))}

            {/* הוספת ספק */}
            <div style={{...W.card,marginTop:8}}>
              <label style={W.lbl}>שם ספק חדש</label>
              <input style={{...W.inp,marginBottom:12}} placeholder="למשל: תנובה" value={newSupName} onChange={e=>setNewSupName(e.target.value)}/>
              <label style={W.lbl}>קטגוריה</label>
              <select style={{...W.inp,marginBottom:12}} value={newSupCat} onChange={e=>setNewSupCat(e.target.value)}>
                {["כללי","ירקות","בשר","חלב","מאפים","שתייה","ביצים","דגים","קפה","סלטים","כבושים"].map(c=><option key={c}>{c}</option>)}
              </select>
              <label style={W.lbl}>ימי אספקה</label>
              <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
                {DOW_LABELS.map((d,i)=>(
                  <button key={i} style={{...W.dayBtn,...(newSupDays.includes(i)?W.dayBtnA:{})}} onClick={()=>toggleDay(i)}>{d}</button>
                ))}
              </div>
              <button style={{...W.bigBtn,marginTop:0,background:newSupName.trim()?"#22C55E":"#1C1C1C",color:newSupName.trim()?"#0A0A0A":"#525252"}}
                onClick={addSupplier}>+ הוסף ספק</button>
            </div>

            {suppliers.filter(s=>s.name).length===0 && (
              <p style={{color:"#9CA3AF",fontSize:13,textAlign:"center",marginTop:8}}>אפשר להוסיף ספקים גם אחרי ההגדרה</p>
            )}
            <button style={W.bigBtn} onClick={()=>setStep(4)}>המשך ←</button>
            <button style={W.outBtn} onClick={()=>setStep(2)}>→ חזרה</button>
          </>
        )}

        {/* ── STEP 4 ── */}
        {step===4 && (
          <>
            <p style={{color:"#9CA3AF",fontSize:13,marginBottom:16,textAlign:"center"}}>הזן סכומים חודשיים קבועים -- אפס = לא רלוונטי</p>
            {fixedList.filter(f=>!f.rentPct&&!f.royaltyPct).map(f=>(
              <div key={f.id} style={{...W.row,...{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:12,padding:"12px 14px",marginBottom:8}}}>
                <div>
                  <div style={W.rowLabel}>{f.name}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input style={{...W.inpSm,width:90}} type="number" placeholder="0" value={f.amount||""} onChange={e=>updateFixed(f.id,"amount",e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:12}}>₪</span>
                </div>
              </div>
            ))}
            <div style={{background:"#FFFFFF",border:"1px solid #22C55E25",borderRadius:12,padding:"14px",marginTop:8,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#6B7280",fontSize:13}}>סה״כ קבועות חודשיות</span>
                <span style={{color:"#111827",fontWeight:800,fontSize:15}}>
                  ₪{fixedList.filter(f=>!f.rentPct&&!f.royaltyPct).reduce((a,f)=>a+(Number(f.amount)||0),0).toLocaleString()}
                </span>
              </div>
            </div>
            <button style={W.bigBtn} onClick={isFirstSetup ? ()=>setStep(5) : finish}>{isFirstSetup ? "המשך ←" : "✅ סיום"}</button>
            <button style={W.outBtn} onClick={()=>setStep(3)}>→ חזרה</button>
          </>
        )}
        {/* ── STEP 5 (only for first setup) ── */}
        {step===5 && isFirstSetup && (
          <>
            <div style={W.card}>
              <label style={W.lbl}>שם מלא של הבעלים</label>
              <input style={{...W.inp,marginBottom:12}} placeholder="ישראל ישראלי" value={ownerName} onChange={e=>setOwnerName(e.target.value)}/>
              <label style={W.lbl}>שם משתמש לכניסה</label>
              <input style={{...W.inp,marginBottom:12}} placeholder="username" autoCapitalize="none" value={ownerUsername} onChange={e=>setOwnerUsername(e.target.value)}/>
              <label style={W.lbl}>כתובת מייל (לשחזור סיסמה)</label>
              <input style={{...W.inp,marginBottom:12,direction:"ltr"}} type="email" placeholder="your@email.com" value={ownerEmail} onChange={e=>setOwnerEmail(e.target.value)}/>
              <label style={W.lbl}>סיסמה (לפחות 6 תווים)</label>
              <input style={{...W.inp,marginBottom:12}} type="password" placeholder="לפחות 6 תווים" value={ownerPassword} onChange={e=>setOwnerPassword(e.target.value)}/>
              <label style={W.lbl}>אימות סיסמה</label>
              <input style={{...W.inp,marginBottom:0}} type="password" placeholder="הכנס שוב" value={ownerPass2} onChange={e=>setOwnerPass2(e.target.value)}/>
            </div>
            {ownerErr && <p style={{color:"#EF4444",fontSize:13,textAlign:"center",margin:"0 0 12px",fontWeight:600}}>{ownerErr}</p>}
            <button style={W.bigBtn} onClick={finish}>✅ סיום -- כניסה ללוח הבקרה</button>
            <button style={W.outBtn} onClick={()=>setStep(4)}>→ חזרה</button>
          </>
        )}
      </div>
    </div>
  );
}



// ─── CreditInput ──────────────────────────────────────────────────────────────
function CreditInput({ supplierId, supplierName, date, onAdd }) {
  const [open, setOpen] = useState(false);
  const [amount, setAmount] = useState("");
  const [note, setNote]   = useState("");
  if(!open) return (
    <button onClick={()=>setOpen(true)}
      style={{marginTop:6,fontSize:11,color:"#B45309",background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:8,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>
      📄 הוסף זיכוי ממתין
    </button>
  );
  return (
    <div style={{marginTop:8,background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:10,padding:"10px 12px"}}>
      <div style={{fontSize:12,fontWeight:700,color:"#92400E",marginBottom:8}}>📄 זיכוי ממתין מ{supplierName}</div>
      <input style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #FCD34D",background:"#fff",fontSize:14,fontFamily:"inherit",marginBottom:6,boxSizing:"border-box"}}
        type="number" inputMode="numeric" placeholder="סכום הזיכוי (₪)" value={amount} onChange={e=>setAmount(e.target.value)}/>
      <input style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #FCD34D",background:"#fff",fontSize:13,fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}
        placeholder="הערה (אופציונלי)" value={note} onChange={e=>setNote(e.target.value)}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(Number(amount)>0){onAdd(supplierId,supplierName,date,Number(amount),note);setOpen(false);setAmount("");setNote("");}}}
          style={{flex:1,padding:"7px",background:"#F59E0B",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          ✓ הוסף
        </button>
        <button onClick={()=>setOpen(false)}
          style={{padding:"7px 14px",background:"none",border:"1px solid #FCD34D",borderRadius:8,color:"#B45309",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
          ביטול
        </button>
      </div>
    </div>
  );
}

// ─── Business Selector ────────────────────────────────────────────────────────
function BusinessSelector({ businesses, onSelect, onAdd, onDelete, userName, isSuperOwner }) {
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [ready, setReady] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setReady(true), 250); return () => clearTimeout(t); }, []);
  return (
    <div style={{minHeight:"100vh",background:"#F1F5F9",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Heebo',sans-serif",direction:"rtl"}}>
      <div style={{background:"#FFFFFF",borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:400,boxShadow:"0 4px 24px #0000001A",border:"1px solid #E5E7EB"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>🏢</div>
          <h2 style={{margin:0,fontSize:20,fontWeight:900,color:"#111827"}}>בחר מסעדה</h2>
          <p style={{margin:"6px 0 0",color:"#9CA3AF",fontSize:13}}>שלום {userName}</p>
        </div>
        {businesses.map(biz => (
          <div key={biz.id} style={{position:"relative",marginBottom:10}}>
            {confirmDelete === biz.id ? (
              <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <span style={{fontSize:13,color:"#991B1B",fontWeight:600}}>למחוק את "{biz.name}"?</span>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{ onDelete(biz.id); setConfirmDelete(null); }}
                    style={{padding:"6px 14px",background:"#EF4444",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>מחק</button>
                  <button onClick={()=>setConfirmDelete(null)}
                    style={{padding:"6px 14px",background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:8,color:"#6B7280",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
                </div>
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={(e) => { e.stopPropagation(); if(!ready) return; onSelect(biz.id); }}
                  style={{flex:1,padding:"18px 20px",background:"#F8FAFC",border:"1px solid #E5E7EB",borderRadius:14,cursor:ready?"pointer":"default",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all 0.15s",opacity:ready?1:0.6}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#111827"}}>{biz.name}</div>
                  </div>
                  <span style={{fontSize:20}}>←</span>
                </button>
                {isSuperOwner && (
                  <button onClick={()=>setConfirmDelete(biz.id)}
                    style={{padding:"10px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,color:"#EF4444",cursor:"pointer",fontSize:16,lineHeight:1,fontFamily:"inherit"}}>✕</button>
                )}
              </div>
            )}
          </div>
        ))}
        <button onClick={onAdd}
          style={{width:"100%",padding:"14px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:14,color:"#2563EB",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",marginTop:4}}>
          + הוסף מסעדה חדשה
        </button>
      </div>
    </div>
  );
}

// ─── Main ─────────────────────────────────────────────────────────────────────
function PilotDashboard() {
  const [entries, setEntries] = useState([]);
  const [screen, setScreen] = useState("dashboard");
  const [form, setForm] = useState({...EMPTY_ENTRY});
  const [editingId, setEditingId] = useState(null);
  const [fixedList, setFixedList] = useState(FIXED_EXPENSES_DEFAULT);
  const [lastYear, setLastYear] = useState(LAST_YEAR_2025);
  const [saved, setSaved] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [fcTab, setFcTab] = useState("summary");
  const [weather, setWeather] = useState(null); // {temp, rain, wind, desc, icon, alert}
  const [weatherErr, setWeatherErr] = useState(false);
  const [orefAlert, setOrefAlert] = useState(null); // null | {cities:[], category:str, time:str}
  const [orefHistory, setOrefHistory] = useState([]); // [{date, count}] for today
  const [expandedSup, setExpandedSup] = useState(null);
  const [supMonth, setSupMonth] = useState(`${YEAR}-${MONTH_STR}`);
  // ── הרשאות: null = בעלים, { name, role:"manager", permissions:[] } = אחמש מחובר
  const [currentUser, setCurrentUser] = useState(null);
  const [masterTasks, setMasterTasks] = useState([]);
  const [loggedInUser, setLoggedInUser] = useState(null);
  const [appUsers, setAppUsers]     = useState([]);
  const [setupDone, setSetupDone] = useState(false);
  const [showSetup, setShowSetup] = useState(false);
  const [businesses, setBusinesses] = useState([]);
  const [currentBizId, setCurrentBizId_] = useState(null);
  const setCurrentBizId = id => {
    setCurrentBizId_(id);
    if (id && window.setTenantId) window.setTenantId(id);
    if (id) {
      window._currentTenantId = id;
      const uid = window.storage.getUid ? window.storage.getUid() : null;
      if(uid) try { localStorage.setItem("marjin_biz_" + uid, id); } catch(_){}
    }
  };
  const [showBizSelect, setShowBizSelect] = useState(false);
  const [entryStep, setEntryStep] = useState('idle'); // 'idle' | 'revenue' | 'suppliers'
  const [pendingCredits, setPendingCredits] = useState([]); // [{id,supplierId,supplierName,date,amount,note}]
  const [businessConfig, setBusinessConfig] = useState({
    businessName: "",
    rentPct: 0, royaltyPct: 0, hasRoyalty: false,
    targets: { salesGrowthPct:5, foodCostPct:33, laborCostPct:27 }
  });
  const [suppliers, setSuppliers] = useState([]);

  const sg = async (key, shared=false) => { try { return await window.storage.get(key, shared); } catch(_){ return null; } };

  // useEffect 1: global data (users, businesses)
  useEffect(()=>{
    const init = async () => {
      // Step A: discover tenant -- 3 fallback layers
      const uid = window.storage.getUid ? window.storage.getUid() : null;
      if(uid) {
        let tid = null;

        // Layer 1: localStorage cache (survives page reloads instantly)
        try {
          const cached = localStorage.getItem("marjin_tid_" + uid);
          if(cached) tid = cached;
        } catch(_){}

        // Layer 2: RTDB user_tenants/{uid}
        if(!tid) {
          try {
            const rtdbTid = await window._rtdbGet("user_tenants/" + uid);
            if(rtdbTid && typeof rtdbTid === "string") tid = rtdbTid;
          } catch(_){}
        }

        // Layer 3: Firebase Auth session → uid known → user_tenants readable by owner
        if(!tid) {
          try {
            const fbUser = window._auth ? window._auth.currentUser : null;
            if(fbUser) {
              // user_tenants/{uid} is always readable by the authenticated user
              const rtdbTid2 = await window._rtdbGet("user_tenants/" + fbUser.uid);
              if(rtdbTid2 && typeof rtdbTid2 === "string") tid = rtdbTid2;
            }
          } catch(_){}
        }

        // Layer 4: username_index (public) via displayName
        if(!tid) {
          try {
            const fbUser = window._auth ? window._auth.currentUser : null;
            if(fbUser && fbUser.displayName) {
              const indexed = await window._rtdbGet("username_index/" + fbUser.displayName.toLowerCase());
              if(indexed && indexed.tenantId) tid = indexed.tenantId;
            }
          } catch(_){}
        }

        if(tid) {
          // Cache locally for next reload
          try { localStorage.setItem("marjin_tid_" + uid, tid); } catch(_){}
          // Repair user_tenants if missing
          try { await window._rtdbSet("user_tenants/" + uid, tid); } catch(_){}

          if(window.setTenantId) window.setTenantId(tid);
          window._currentTenantId = tid;

          // Resolve active bizId
          let resolvedBizId = tid;
          try {
            const cachedBiz = localStorage.getItem("marjin_biz_" + uid);
            if(cachedBiz) resolvedBizId = cachedBiz;
            else {
              const activeBiz = await window._rtdbGet("user_active_biz/" + uid);
              if(activeBiz && typeof activeBiz === "string") resolvedBizId = activeBiz;
            }
          } catch(_){}
          try { localStorage.setItem("marjin_biz_" + uid, resolvedBizId); } catch(_){}
          setCurrentBizId_(resolvedBizId);
        }
      }

      // Step B: load data (requires tenantId set above)
      const rau = await sg("app-users", true);
      if(rau) {
        try {
          const users = JSON.parse(rau.value);
          setAppUsers(users);
          // Auto-login if Firebase Auth session is active
          if(uid) {
            const match = users.find(u => u.firebaseUid === uid);
            if(match) {
              setLoggedInUser({...match, _tenantId: window._currentTenantId});
              // Ensure username_index is populated for future cross-browser logins
              if(match.username) {
                try { await window._rtdbSet("username_index/" + match.username.toLowerCase(), { tenantId: window._currentTenantId, email: match.email }); } catch(_){}
              }
            }
          }
        } catch(_){}
      }
      const rb = await sg("app-businesses", true);
      if(rb) {
        try {
          const bizList = JSON.parse(rb.value);
          setBusinesses(bizList);
          if(bizList.length === 1) setCurrentBizId(bizList[0].id);
        } catch(_){}
      }

      // Restore last active biz (if tenant already found above)
      if(uid && window._currentTenantId) {
        try {
          const activeBiz = await window._rtdbGet(`user_active_biz/${uid}`);
          if(activeBiz && typeof activeBiz === "string") {
            setCurrentBizId_(activeBiz);
          }
        } catch(_){}
      }

      setLoaded(true);
    };
    if(window._firebaseReady) { init(); }
    else { window.addEventListener("firebase-ready", init, {once:true}); }
  },[]);

  // useEffect 2: business-specific data -- live listeners
  useEffect(()=>{
    if(!currentBizId) return;
    const unsubs = [];
    const sub = (key, setter, shared=false) => {
      if(!window.storage.subscribe) return;
      unsubs.push(window.storage.subscribe(key, r => {
        try { setter(JSON.parse(r.value)); } catch(_){}
      }, shared));
    };
    // Initial load -- only for data without live listeners
    (async()=>{
      const rly = await sg(`biz:${currentBizId}:lastyear`);
      if(rly) setLastYear(JSON.parse(rly.value));
      setSetupDone(true);
    })();
    // Live listeners -- fire immediately with current value AND on every change
    sub(`biz:${currentBizId}:entries`, (val) => {
      // Only update if we received a non-empty array, or entries is currently empty
      if(Array.isArray(val) && (val.length > 0 || true)) setEntries(val);
    });
    sub(`biz:${currentBizId}:fixed`,     setFixedList);
    sub(`biz:${currentBizId}:suppliers`, setSuppliers);
    sub(`biz:${currentBizId}:config`,    setBusinessConfig);
    sub(`biz:${currentBizId}:credits`,   setPendingCredits);
    sub(`biz:${currentBizId}:tasks`,    setMasterTasks);
    sub("app-users", u => { setAppUsers(u); }, true);

    // Fetch weather -- Open-Meteo, no API key needed
    const lat = businessConfig?.lat || 32.4342;
    const lon = businessConfig?.lon || 34.9194;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,windspeed_10m,weathercode&timezone=Asia/Jerusalem`)
      .then(r=>r.json())
      .then(d=>{
        const c = d.current;
        const wc = c.weathercode;
        const isRain = wc>=51 && wc<=99;
        const isHeat = c.temperature_2m >= 35;
        const isCold = c.temperature_2m <= 10;
        const icons = {clear:"☀️",cloud:"⛅",rain:"🌧️",thunder:"⛈️",snow:"❄️",fog:"🌫️"};
        const icon = wc<=1?"☀️":wc<=3?"⛅":wc<=49?"🌫️":wc<=69?"🌧️":wc<=79?"❄️":wc<=99?"⛈️":"☀️";
        const desc = isRain?"גשם":isHeat?"חום קיצוני":isCold?"קור":wc<=1?"בהיר":wc<=3?"מעונן חלקית":"מעונן";
        const alert = isRain||isHeat||isCold;
        setWeather({temp:Math.round(c.temperature_2m), rain:c.precipitation, wind:Math.round(c.windspeed_10m), desc, icon, alert, isRain, isHeat, isCold});
      })
      .catch(()=>setWeatherErr(true));

    // ─── Pikud Ha-Oref -- current alerts ───
    const HADERA_AREAS = ["חדרה","קרית ים","קרית ביאליק","בנימינה","זכרון יעקב","עמיקם","עין עירון","קציר"];
    const fetchOref = () => {
      fetch("/api/oref")
      .then(r=>r.text())
      .then(txt=>{
        if(!txt || txt.trim()==="") { setOrefAlert(null); return; }
        const d = JSON.parse(txt);
        const cities = d.data||[];
        const inArea = cities.some(c=>HADERA_AREAS.some(a=>c.includes(a)));
        if(inArea || cities.length>0) {
          setOrefAlert({cities, category:d.cat||"1", time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})});
        } else {
          setOrefAlert(null);
        }
      })
      .catch(()=>{}); // silent -- CORS may block
    };
    fetchOref();
    const orefInterval = setInterval(fetchOref, 30000); // poll every 30s

    return () => { unsubs.forEach(u => typeof u==="function" && u()); clearInterval(orefInterval); };
  },[currentBizId]);

  const persist = async (e, f) => {
    if(!currentBizId) { console.warn("[persist] no bizId"); return; }
    try { await window.storage.set(`biz:${currentBizId}:entries`, JSON.stringify(e), true); }
    catch(err) { console.error("[persist] entries save failed:", err.message); }
    if(f) {
      try { await window.storage.set(`biz:${currentBizId}:fixed`, JSON.stringify(f), true); }
      catch(err) { console.error("[persist] fixed save failed:", err.message); }
    }
  };
  const saveLastYear = async (ly) => {
    setLastYear(ly);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:lastyear`, JSON.stringify(ly), true); } catch(_){}
  };
  const saveBusinessConfig = async (cfg) => {
    setBusinessConfig(cfg);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:config`, JSON.stringify(cfg), true); } catch(_){}
  };
  const saveSuppliers = async (sups) => {
    setSuppliers(sups);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:suppliers`, JSON.stringify(sups), true); } catch(_){}
  };
  const completeSetup = async (cfg, sups, fixed, firstOwner) => {
    // tenantId = the account/owner namespace (stays the same across all businesses)
    // bizId    = unique id for this specific business (sub-namespace within tenant)
    // Priority: loggedInUser._tenantId > window._currentTenantId > new bizId (first setup only)
    const existingTenantId = loggedInUser?._tenantId || window._currentTenantId || null;
    const bizId    = `biz_${Date.now()}`;
    const tenantId = existingTenantId || bizId;
    // Always sync _currentTenantId immediately
    if(window.setTenantId) window.setTenantId(tenantId);
    window._currentTenantId = tenantId;

    // ── STEP 1: Firebase Auth (must happen FIRST -- RTDB rules require auth) ──
    let firebaseUid = null;
    let ownerRecord = null;
    if(firstOwner) {
      try {
        try {
          firebaseUid = await window.firebaseCreateUser(firstOwner.email, firstOwner.password);
        } catch(createErr) {
          if(createErr.code !== "auth/email-already-in-use") throw createErr;
          // user already exists -- uid will come from signIn below
        }
        const signedInUser = await window.firebaseSignIn(firstOwner.email, firstOwner.password);
        firebaseUid = firebaseUid || signedInUser.uid;
        ownerRecord = {id:Date.now(), name:firstOwner.name, username:firstOwner.username,
          email:firstOwner.email, role:"super_owner", firebaseUid};
      } catch(e) {
        console.error("[completeSetup] auth failed:", e.message);
        ownerRecord = {id:Date.now(), name:firstOwner.name, username:firstOwner.username,
          email:firstOwner.email||"", role:"super_owner"};
      }
    }

    // ── STEP 2: get firebaseUid from Auth session if not set by firstOwner ──
    if(!firebaseUid && window._auth && window._auth.currentUser) {
      firebaseUid = window._auth.currentUser.uid;
    }
    if(!firebaseUid && window.storage.getUid) {
      firebaseUid = window.storage.getUid();
    }

    // ── STEP 3: members/roles FIRST -- rules check role before allowing writes ──
    if(firebaseUid) {
      try {
        await window._rtdbSet(`tenants/${tenantId}/members/${firebaseUid}`, true);
        await window._rtdbSet(`tenants/${tenantId}/roles/${firebaseUid}`, "super_owner");
        await window._rtdbSet(`user_tenants/${firebaseUid}`, tenantId);
        if(firstOwner) {
          const unameLower = firstOwner.username.toLowerCase();
          await window._rtdbSet(`tenants/${tenantId}/lookup/${unameLower}`, { email: firstOwner.email, firebaseUid });
          await window._rtdbSet(`username_index/${unameLower}`, { tenantId, email: firstOwner.email });
        }
        try { localStorage.setItem("marjin_tid_" + firebaseUid, tenantId); } catch(_){}
      } catch(e){ console.error("[setup] members/roles write failed:", e.message); }
    }

    // Small delay so Firebase propagates the role write before data writes
    await new Promise(r => setTimeout(r, 800));

    // ── STEP 4: Write business data (role exists now → allowed) ──────────────
    const bizName = cfg.businessName || "מסעדה חדשה";
    const updatedBizList = [...businesses.filter(b=>b.id!==bizId), {id:bizId, name:bizName}];
    setBusinesses(updatedBizList);
    try { await window.storage.set("app-businesses", JSON.stringify(updatedBizList), true); } catch(e){ console.error("[setup] businesses save failed:", e.message); }
    try { await window.storage.set(`biz:${bizId}:config`, JSON.stringify(cfg), true); } catch(e){ console.error("[setup] config save failed:", e.message); }
    setBusinessConfig(cfg);
    try { await window.storage.set(`biz:${bizId}:suppliers`, JSON.stringify(sups), true); } catch(e){ console.error("[setup] suppliers save failed:", e.message); }
    setSuppliers(sups);
    if(fixed) {
      setFixedList(fixed);
      try { await window.storage.set(`biz:${bizId}:fixed`, JSON.stringify(fixed), true); } catch(e){ console.error("[setup] fixed save failed:", e.message); }
    }
    try { await window._rtdbSet(`user_active_biz/${window.storage.getUid ? window.storage.getUid() : firebaseUid}`, bizId); } catch(_){}
    try { localStorage.setItem("marjin_biz_" + (firebaseUid||""), bizId); } catch(_){}

    // ── STEP 5: user record ────────────────────────────────────────────────────
    if(ownerRecord) {
      const users = [ownerRecord];
      setAppUsers(users);
      try { await window.storage.set("app-users", JSON.stringify(users), true); } catch(e){ console.error("[setup] users save failed:", e.message); }
      setLoggedInUser(ownerRecord);
    }

    setCurrentBizId(bizId); // switch to new business
    setSetupDone(true);
    setShowSetup(false);
    // Use updatedBizList (not businesses state — it's stale at this point)
    if(updatedBizList.length > 1) setShowBizSelect(true);
    else setShowBizSelect(false);
  };
  const saveAppUsers = async (users) => {
    setAppUsers(users);
    try { await window.storage.set("app-users", JSON.stringify(users), true); } catch(_){}
  };


  const saveMasterTasks = async (t) => {
    setMasterTasks(t);
    if(!currentBizId) return;
    try { await window.storage.set(`biz:${currentBizId}:tasks`, JSON.stringify(t), true); } catch(_){}
  };

  const setSupPay = (sid, val) => setForm(f=>({...f, supplier_payments:{...f.supplier_payments,[sid]:val}}));

  const saveRevenueStep = () => {
    // Save with current supplier data (empty if new entry)
    let updated = editingId!==null
      ? entries.map((e,i)=>i===editingId?{...form}:e)
      : [...entries,{...form}];
    updated.sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(updated); persist(updated,null);
    if(editingId!==null) {
      // editing: go straight to done
      setForm({...EMPTY_ENTRY}); setEditingId(null); setSaved(true);
      setTimeout(()=>{setSaved(false); setEntryStep('idle'); setScreen("dashboard");},1000);
    } else {
      setEntryStep('suppliers');
    }
  };

  const saveEntry = async (skipSuppliers=false) => {
    const globalEmps = (businessConfig.employees||[]).filter(e=>Number(e.monthlySalary)>0);
    const globalDaily = globalEmps.reduce((a,e)=>a+Math.round(Number(e.monthlySalary)/DAYS_IN_MONTH),0);
    const formFinal = {...form, payroll: globalDaily + (Number(form.payroll)||0)};
    const netForm = formFinal.includeVat ? {
      ...formFinal,
      sales:        Math.round((Number(formFinal.sales)||0)        / VAT_RATE),
      deliveries:   Math.round((Number(formFinal.deliveries)||0)   / VAT_RATE),
      other_income: Math.round((Number(formFinal.other_income)||0) / VAT_RATE),
      includeVat: false,
    } : formFinal;
    let updated = editingId!==null
      ? entries.map((e,i)=>i===editingId?{...netForm}:e)
      : [...entries,{...netForm}];
    updated.sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(updated);
    try {
      await persist(updated, null);
    } catch(err) {
      console.warn("[save] persist error:", err.message);
    }
    setForm({...EMPTY_ENTRY}); setEditingId(null); setSaved(true);
    setTimeout(()=>{setSaved(false); setEntryStep('idle'); setScreen("dashboard");},2000);
    // Check anomalies and send WhatsApp alert if needed
    if(currentBizId && typeof sendWhatsAppNotification === "function") {
      const tgt = businessConfig?.targets || {};
      const foodTarget  = tgt.foodCostPct  || 33;
      const laborTarget = tgt.laborCostPct || 27;
      const s = Number(netForm.sales)||0;
      const food  = s > 0 ? ((Number(netForm.food_cost)||0) / s) * 100  : 0;
      const labor = s > 0 ? ((Number(netForm.payroll)||0)   / s) * 100  : 0;
      const bizName = businessConfig?.businessName || "המסעדה";
      const alerts = [];
      if(food  > foodTarget  + 2) alerts.push(`🍽️ *עלות מזון:* ${food.toFixed(1)}% (יעד ${foodTarget}%)`);
      if(labor > laborTarget + 2) alerts.push(`👥 *עלות עבודה:* ${labor.toFixed(1)}% (יעד ${laborTarget}%)`);
      if(s > 0 && s < 5000) alerts.push(`📉 *מחזור נמוך:* ₪${Math.round(s).toLocaleString("he-IL")}`);
      if(alerts.length > 0) {
        const sep = "---";
      const msg = ["🚨 *התראת חריגה -- "+bizName+"*", "📅 "+netForm.date, sep, ...alerts, sep, "_Marjin_"].join("\n");
        sendWhatsAppNotification(currentBizId, msg, getWhatsAppTarget(businessConfig));
      }
    }
  };

  const deleteEntry = i => { const u=entries.filter((_,idx)=>idx!==i); setEntries(u); persist(u,null); };

  // Filter entries to current month only -- dashboard always shows current month
  // Derive which businesses this user can see
  const isSuperOwner = loggedInUser?.role === "super_owner" || loggedInUser?.role === "owner";
  const allowedBusinesses = isSuperOwner
    ? businesses
    : businesses.filter(b => (loggedInUser?.allowedBizIds || []).includes(b.id));

  const monthPrefix = `${YEAR}-${MONTH_STR}-`;
  const monthEntries = entries.filter(e => e.date && e.date.startsWith(monthPrefix));
  const metrics = calcMetrics(monthEntries, fixedList, {...businessConfig, suppliers});
  const chart = buildChart(monthEntries);
  const todayEntry = entries.find(e=>e.date===TODAY_STR);

  // Calculate missing supplier data per supplier this month
  const supplierMissingDays = {};
  if(suppliers.length > 0) {
    for(let d=1; d<DAY_OF_MONTH; d++){
      const ds=`${YEAR}-${MONTH_STR}-${String(d).padStart(2,"0")}`;
      const dow=getDateDOW(ds);
      if(dow===6) continue;
      const entry=entries.find(e=>e.date===ds);
      const expected=suppliersOnDay(dow, suppliers);
      expected.forEach(sup=>{
