<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.sheetjs.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.open-meteo.com https://www.oref.org.il https://*.cloudfunctions.net https://firestore.googleapis.com https://firebase.googleapis.com wss://*.firebaseio.com https://*.firebase.com wss://*.firebase.com https://fcmregistrations.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; object-src 'none'; base-uri 'self';">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Marjin" />
  <title>Marjin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══ Design Tokens ══════════════════════════════════════════════════════ */
    :root {
      --bg:         #F9FAFB;
      --surface:    #FFFFFF;
      --border:     #E5E7EB;
      --border-sub: #F3F4F6;
      --ink:        #111827;
      --ink-sub:    #6B7280;
      --ink-muted:  #9CA3AF;
      --accent:     #B91C1C;
      --success:    #16A34A;
      --warning:    #D97706;
      --danger:     #DC2626;
      --r:          8px;
      --rsm:        5px;
      --shadow:     0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 12px rgba(0,0,0,0.08);
    }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
    @keyframes shimmer { from{opacity:.6} to{opacity:1} }

    /* ══ Reset ══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html                   { overflow-x:hidden; }
    html, body, #root      { width:100%; max-width:100vw; min-height:100vh; font-family:'Heebo',sans-serif; background:var(--bg); color:var(--ink); overflow-x:hidden; }
    input, button, select, textarea { font-family:inherit; font-size:inherit; }
    ::-webkit-scrollbar { display:none; } * { scrollbar-width:none; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--ink) !important; }
    button:active { opacity:.85; }
    a { color:inherit; text-decoration:none; }

    /* ══ App shell ══════════════════════════════════════════════════════════ */
    .app { min-height:100vh; background:var(--bg); width:100%; overflow-x:hidden; }
    .app-header {
      display:flex; align-items:center; justify-content:space-between;
      height:52px; padding:0 14px; gap:8px;
      background:var(--surface); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:50;
      width:100%; max-width:100%; overflow:hidden;
    }
    .app-logo  { width:30px; height:30px; background:var(--ink); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .app-logo span { color:#fff; font-size:13px; font-weight:700; letter-spacing:-.5px; }
    .app-title { font-size:14px; font-weight:700; color:var(--ink); letter-spacing:-.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
    .app-sub   { font-size:11px; color:var(--ink-muted); white-space:nowrap; }
    .app-nav   {
      background:var(--surface); border-bottom:1px solid var(--border);
      position:sticky; top:52px; z-index:40;
      width:100%; max-width:100%; overflow:hidden;
      display:block;
    }
    .app-nav-inner {
      display:flex; padding:0 14px;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
      scrollbar-width:none; max-width:100%;
    }
    .app-nav-inner::-webkit-scrollbar { display:none; }
    .nav-tab {
      height:40px; padding:0 12px; display:inline-flex; align-items:center;
      font-size:12px; font-weight:500; color:var(--ink-muted);
      background:transparent; border:none; border-bottom:2px solid transparent;
      cursor:pointer; white-space:nowrap; flex-shrink:0; transition:color .1s;
    }
    .nav-tab:hover   { color:var(--ink-sub); }
    .nav-tab.is-active { color:var(--ink); font-weight:600; border-bottom-color:var(--ink); }
    .nav-tab.is-red    { color:var(--accent); font-weight:600; border-bottom-color:var(--accent); }
    .screen { padding:14px 14px 80px; background:var(--bg); min-height:calc(100vh - 92px); width:100%; max-width:100%; overflow-x:hidden; }

    /* ══ Cards ══════════════════════════════════════════════════════════════ */
    .card       { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); }
    .card-p     { padding:16px; }
    .card-p-sm  { padding:12px 14px; }
    .card + .card { margin-top:10px; }

    /* ══ KPI ════════════════════════════════════════════════════════════════ */
    .kpi-grid  { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:12px; }
    .kpi-card  { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 14px; box-shadow:var(--shadow); }
    .kpi-label { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:9px; display:block; }
    .kpi-val   { font-size:22px; font-weight:700; letter-spacing:-.8px; line-height:1; color:var(--ink); }
    .kpi-val.warn   { color:var(--warning); }
    .kpi-val.danger { color:var(--danger); }
    .kpi-sub   { font-size:11px; color:var(--ink-muted); margin-top:5px; line-height:1.3; }

    /* ══ Buttons ════════════════════════════════════════════════════════════ */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
      cursor:pointer; font-weight:600; font-size:13px;
      border-radius:var(--rsm); border:none; padding:8px 14px;
      line-height:1; transition:opacity .1s; white-space:nowrap;
    }
    .btn:disabled { opacity:.4; cursor:default; pointer-events:none; }
    .btn-primary   { background:var(--ink); color:#fff; }
    .btn-secondary { background:var(--surface); color:var(--ink-sub); border:1px solid var(--border); }
    .btn-ghost     { background:transparent; color:var(--ink-sub); border:1px solid var(--border); }
    .btn-danger    { background:#FEF2F2; color:var(--danger); border:1px solid #FECACA; }
    .btn-sm   { padding:6px 11px; font-size:12px; }
    .btn-xs   { padding:4px 8px;  font-size:11px; }
    .btn-full { width:100%; }
    .btn-full + .btn-full { margin-top:6px; }
    .btn-link { background:none; border:none; color:var(--ink-sub); cursor:pointer; font-size:12px; padding:0; }
    .icon-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:28px; height:28px; padding:0; border-radius:4px;
      background:transparent; border:none; cursor:pointer; color:var(--ink-muted);
    }
    .icon-btn:hover { background:var(--border-sub); color:var(--ink-sub); }
    .icon-btn svg   { pointer-events:none; }

    /* ══ Forms ══════════════════════════════════════════════════════════════ */
    .field    { margin-bottom:9px; }
    .label    { display:block; font-size:12px; color:var(--ink-sub); margin-bottom:4px; font-weight:500; }
    .input    { width:100%; background:var(--surface); border:1px solid #D1D5DB; border-radius:var(--rsm); padding:9px 11px; color:var(--ink); font-size:13px; outline:none; box-sizing:border-box; }
    .input-sm { padding:7px 9px; font-size:12px; }
    .input-num{ width:64px; text-align:center; }
    .input-pin{ text-align:center; letter-spacing:10px; font-size:22px; padding:12px; }
    .select   { width:100%; appearance:none; background:var(--surface); border:1px solid #D1D5DB; border-radius:var(--rsm); padding:9px 11px; color:var(--ink); font-size:13px; outline:none; box-sizing:border-box; cursor:pointer; }
    .pass-wrap { position:relative; }
    .pass-wrap .input { padding-left:32px; }
    [dir=rtl] .pass-wrap .input { padding-left:11px; padding-right:32px; }
    .pass-eye { position:absolute; left:9px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--ink-muted); padding:4px; line-height:1; font-size:12px; }
    [dir=rtl] .pass-eye { left:auto; right:9px; }
    .form-sec  { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; margin:16px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border-sub); }
    .form-err  { background:#FEF2F2; border:1px solid #FECACA; border-radius:var(--rsm); padding:7px 10px; font-size:12px; color:var(--danger); margin-bottom:9px; }
    .form-hint { background:var(--bg); border:1px solid var(--border); border-radius:var(--rsm); padding:8px 11px; font-size:12px; color:var(--ink-sub); margin-bottom:9px; line-height:1.5; }
    .form-ok   { background:#F0FDF4; border:1px solid #D1FAE5; border-radius:var(--rsm); padding:7px 10px; font-size:12px; color:#166534; margin-bottom:9px; }

    /* ══ Badges ═════════════════════════════════════════════════════════════ */
    .badge         { display:inline-block; padding:2px 7px; border-radius:3px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
    .badge-neutral { background:var(--border-sub); color:var(--ink-sub); }
    .badge-pending { background:#FFFBEB; color:#92400E; border:1px solid #FDE68A; }
    .badge-success { background:#F0FDF4; color:#166534; border:1px solid #D1FAE5; }
    .badge-danger  { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
    .badge-dot     { position:absolute; top:-4px; left:-4px; background:var(--accent); color:#fff; font-size:9px; font-weight:700; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center; }

    /* ══ Section headers ════════════════════════════════════════════════════ */
    .sec-head  { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; margin:0 0 12px; }
    .page-head { font-size:14px; font-weight:700; color:var(--ink); }
    .page-sub  { font-size:11px; color:var(--ink-muted); margin-top:2px; }

    /* ══ Status / Alerts ════════════════════════════════════════════════════ */
    .status-strip { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:12px; color:var(--ink-muted); }
    .status-dot   { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .banner       { border-radius:var(--rsm); padding:9px 12px; font-size:12px; font-weight:500; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .banner-ok    { background:#F0FDF4; border:1px solid #D1FAE5; color:#166534; }
    .banner-warn  { background:#FFFBEB; border:1px solid #FDE68A; color:#92400E; }
    .banner-alert { background:#FEF2F2; border:1px solid #FECACA; color:#991B1B; }
    .alert-box    { background:#FEF2F2; border:1px solid #FECACA; border-radius:var(--rsm); padding:10px 12px; margin-bottom:12px; }
    .alert-title  { color:#991B1B; font-weight:600; font-size:12px; margin-bottom:5px; }
    .alert-tag    { background:#FEE2E2; border:1px solid #FECACA; color:#991B1B; padding:2px 7px; border-radius:3px; font-size:11px; font-weight:500; display:inline-block; margin:2px; }
    .alert-row    { display:flex; align-items:flex-start; gap:9px; }
    .alert-row + .alert-row { margin-top:10px; padding-top:10px; border-top:1px solid var(--border-sub); }

    /* ══ Progress / Gauge ═══════════════════════════════════════════════════ */
    .progress      { height:3px; background:var(--border-sub); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:2px; transition:width .4s ease; }
    .gauge         { height:4px; background:var(--border-sub); border-radius:2px; overflow:hidden; position:relative; }
    .gauge-fill    { height:100%; border-radius:2px; transition:width .5s ease; }
    .gauge-marker  { position:absolute; top:0; bottom:0; width:1px; background:var(--ink-muted); opacity:.4; }

    /* ══ Data tables ════════════════════════════════════════════════════════ */
    .data-table      { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
    .data-table-head { display:flex; align-items:center; padding:8px 14px; background:var(--bg); border-bottom:1px solid var(--border-sub); }
    .th  { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; }
    .data-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border-sub); background:var(--surface); }
    .data-row:last-child { border-bottom:none; }

    /* ══ Empty states ═══════════════════════════════════════════════════════ */
    .empty      { text-align:center; padding:52px 20px; color:var(--ink-muted); }
    .empty-icon { width:36px; height:36px; border:1px solid var(--border); border-radius:var(--rsm); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:14px; }
    .empty p    { font-size:13px; margin:0 0 14px; color:var(--ink-muted); }

    /* ══ Modals ═════════════════════════════════════════════════════════════ */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:999; display:flex; align-items:center; justify-content:center; padding:24px; }
    .modal-box     { background:var(--surface); border-radius:var(--r); padding:22px 24px; width:100%; max-width:380px; border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.12); direction:rtl; animation:fadeIn .15s ease; }
    .modal-title   { font-size:15px; font-weight:700; color:var(--ink); margin:0 0 4px; }
    .modal-sub     { font-size:12px; color:var(--ink-muted); margin:0 0 18px; }
    .modal-actions { display:flex; gap:8px; margin-top:16px; }

    /* ══ Auth screens ═══════════════════════════════════════════════════════ */
    .auth-root   { min-height:100vh; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; direction:rtl; }
    .auth-box    { background:var(--surface); border-radius:var(--r); padding:28px 24px; width:100%; max-width:380px; border:1px solid var(--border); box-shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.04); }
    .auth-logo   { width:32px; height:32px; background:var(--ink); border-radius:7px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
    .auth-logo span { color:#fff; font-size:13px; font-weight:700; }
    .auth-title  { font-size:17px; font-weight:700; color:var(--ink); text-align:center; letter-spacing:-.3px; }
    .auth-sub    { font-size:12px; color:var(--ink-muted); text-align:center; margin-top:3px; }
    .auth-footer { text-align:center; margin-top:14px; font-size:11px; color:var(--ink-muted); }

    /* ══ Setup Wizard ═══════════════════════════════════════════════════════ */
    .wizard-root   { position:fixed; inset:0; background:var(--bg); overflow-y:auto; z-index:1000; direction:rtl; }
    .wizard-wrap   { max-width:420px; margin:0 auto; padding:20px 20px 80px; }
    .wizard-header { text-align:center; padding:20px 0 16px; }
    .wizard-step   { font-size:11px; color:var(--ink-muted); margin-bottom:4px; }
    .wizard-title  { font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-.3px; }
    .wizard-sub    { font-size:12px; color:var(--ink-muted); margin-top:2px; }
    .wizard-prog   { height:2px; background:var(--border); border-radius:1px; margin-bottom:22px; overflow:hidden; }
    .wizard-bar    { height:100%; background:var(--ink); border-radius:1px; transition:width .3s ease; }
    .toggle-wrap   { width:38px; height:20px; border-radius:10px; border:none; cursor:pointer; position:relative; flex-shrink:0; transition:background .2s; }
    .toggle-knob   { position:absolute; top:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition:left .2s; pointer-events:none; }
    .day-btn       { width:32px; height:32px; border-radius:var(--rsm); border:1px solid var(--border); background:var(--bg); color:var(--ink-sub); cursor:pointer; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; }
    .day-btn.on    { background:var(--ink); border-color:var(--ink); color:#fff; }

    /* ══ Shift Manager ══════════════════════════════════════════════════════ */
    .shift-wrap { padding:14px 18px 80px; }
    .task-row     { display:flex; align-items:flex-start; gap:9px; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--rsm); margin-bottom:5px; }
    .task-row.done{ background:var(--bg); }
    .task-cb      { width:20px; height:20px; border-radius:4px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; cursor:pointer; }
    .task-cb.on   { background:#16A34A; border-color:#16A34A; color:#fff; }
    .shift-nav    { display:flex; border-bottom:1px solid var(--border); margin-bottom:14px; }
    .shift-tab    { padding:0 11px; height:36px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--ink-muted); cursor:pointer; font-size:12px; font-weight:500; white-space:nowrap; display:inline-flex; align-items:center; }
    .shift-tab.on { color:var(--ink); font-weight:600; border-bottom-color:var(--ink); }

    /* ══ Forecast ═══════════════════════════════════════════════════════════ */
    .forecast-card  { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
    .forecast-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid var(--border-sub); padding-top:13px; }
    .forecast-cell  { }
    .forecast-cell:not(:last-child) { padding-left:14px; border-left:1px solid var(--border-sub); margin-left:14px; }

    /* ══ Utility classes ════════════════════════════════════════════════════ */
    .flex    { display:flex; }
    .fcol    { flex-direction:column; }
    .icenter { align-items:center; }
    .istart  { align-items:flex-start; }
    .jbet    { justify-content:space-between; }
    .jcenter { justify-content:center; }
    .g1 { gap:4px; }  .g2 { gap:8px; }  .g3 { gap:12px; }  .g4 { gap:16px; }
    .f1 { flex:1; }   .f0 { flex-shrink:0; }
    .fw { width:100%; }
    .tc { text-align:center; } .tl { text-align:left; }
    .rel { position:relative; } .abs { position:absolute; }
    .of-h { overflow:hidden; } .trunc { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mt1 { margin-top:4px; }   .mt2 { margin-top:8px; }   .mt3 { margin-top:12px; }  .mt4 { margin-top:16px; }
    .mb0 { margin-bottom:0; }  .mb1 { margin-bottom:4px; } .mb2 { margin-bottom:8px; } .mb3 { margin-bottom:12px; } .mb4 { margin-bottom:16px; }
    .mr2 { margin-right:8px; } .mr3 { margin-right:12px; }
    .p2 { padding:8px; }  .p3 { padding:12px; }  .p4 { padding:16px; }
    .px3 { padding-left:12px; padding-right:12px; }
    .py1 { padding-top:4px; padding-bottom:4px; }
    .py2 { padding-top:8px; padding-bottom:8px; }
    .t-xs   { font-size:10px; }  .t-sm  { font-size:12px; }  .t-base { font-size:13px; }  .t-md { font-size:14px; }
    .fw5 { font-weight:500; }  .fw6 { font-weight:600; }  .fw7 { font-weight:700; }
    .c-ink   { color:var(--ink); }
    .c-sub   { color:var(--ink-sub); }
    .c-muted { color:var(--ink-muted); }
    .c-ok    { color:var(--success); }
    .c-warn  { color:var(--warning); }
    .c-err   { color:var(--danger); }
    .bg-bg   { background:var(--bg); }
    .bg-surface { background:var(--surface); }
    .divider { border:none; border-top:1px solid var(--border-sub); margin:12px 0; }
    .sep     { font-size:11px; color:var(--border); }
    .border  { border:1px solid var(--border); }
    .border-b{ border-bottom:1px solid var(--border-sub); }
    .rounded   { border-radius:var(--rsm); }
    .rounded-md{ border-radius:var(--r); }
    .shadow-sm { box-shadow:var(--shadow); }
    .shadow-md { box-shadow:var(--shadow-md); }

    /* ══ Dashboard ══════════════════════════════════════════════════════════ */
    .dash            { padding:0 0 96px; background:linear-gradient(180deg,#F8FAFC 0%,#EEF2F7 100%); min-height:100vh; width:100%; overflow-x:hidden; }
    .dash-wrap       { max-width:980px; width:100%; margin:0 auto; padding:0 14px; box-sizing:border-box; }
    .dash-section    { margin-top:36px; }

    /* Status strip */
    .dash-status { display:flex; align-items:center; gap:10px; font-size:12px; color:#94A3B8; padding:16px 0 6px; line-height:1.5; }
    .dash-dot    { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

    /* ── KPI row — flat, secondary ── */
    .kpi-row  { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; width:100%; }
    .kpi-card {

    <script type="module">
    import { initializeApp, initializeApp as initializeApp2 } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, set, remove, onValue, forceWebSockets } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             sendPasswordResetEmail, onAuthStateChanged, signOut, updateProfile,
             updateEmail, updatePassword }
             from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";

    // ── Config loaded from server (keeps keys out of static HTML) ──────────────
    let firebaseConfig;
    try {
      const res = await fetch("/api/config");
      if (!res.ok) throw new Error("config fetch failed");
      firebaseConfig = await res.json();
      if (firebaseConfig.error) throw new Error(firebaseConfig.error);
    } catch(e) {
      console.error("[firebase-init] could not load config:", e.message);
      document.getElementById("root").innerHTML =
        "<div style='padding:40px;text-align:center;color:#DC2626;font-family:sans-serif'>שגיאה בטעינת הגדרות האפליקציה. רענן את הדף.</div>";
      throw e; // stop execution
    }

    const app  = initializeApp(firebaseConfig);
    forceWebSockets(); // Use WebSocket only -- prevents CSP violations from long-polling <script> injection
    const db   = getDatabase(app);
    const auth = getAuth(app);

    // ── App Check (reCAPTCHA v3) -- enforced on RTDB ────────────────────────────
    // Set RECAPTCHA_SITE_KEY in Vercel env. In dev, set self.FIREBASE_APPCHECK_DEBUG_TOKEN=true in console.
    const recaptchaKey = firebaseConfig.recaptchaSiteKey;
    if (recaptchaKey) {
      try {
        initializeAppCheck(app, {
          provider: new ReCaptchaV3Provider(recaptchaKey),
          isTokenAutoRefreshEnabled: true,
        });
      } catch(e) { console.warn("[app-check] init failed:", e.message); }
    } else {
      console.warn("[app-check] RECAPTCHA_SITE_KEY missing -- App Check disabled");
    }

    // ── Auth: Email/Password ──────────────────────────────────────────────────
    let _uid  = null;
    let _user = null;

    // Returns a fresh ID token for API Authorization headers
    window.getIdToken = async (forceRefresh=false) => {
      if (!_user) throw new Error("not authenticated");
      return _user.getIdToken(forceRefresh);
    };

    // Sign in with email + password
    window.firebaseSignIn = async (email, password) => {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      _uid  = cred.user.uid;
      _user = cred.user;
      return cred.user;
    };

    // Create a new Firebase Auth user (uses secondary app to avoid signing out current user)
    window.firebaseCreateUser = async (email, password) => {
      const cfg = window._firebaseConfig || firebaseConfig;
      const secondaryApp  = window._initializeApp(cfg, `secondary_${Date.now()}`);
      const secondaryAuth = getAuth(secondaryApp);
      const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
      const uid  = cred.user.uid;
      await signOut(secondaryAuth);
      return uid;
    };

    // Send password reset email
    window.firebaseSendReset = async (email) => {
      await sendPasswordResetEmail(auth, email);
    };

    // Update user display name (used for tenant discovery)
    window.firebaseUpdateDisplayName = async (user, name) => {
      try { await updateProfile(user, { displayName: name }); } catch(_){}
    };

    // Update email for current logged-in user (used on first login profile completion)
    window.firebaseUpdateEmail = async (newEmail) => {
      if (!_user) throw new Error("not authenticated");
      await updateEmail(_user, newEmail);
    };

    // Update password for current logged-in user
    window.firebaseUpdatePassword = async (newPassword) => {
      if (!_user) throw new Error("not authenticated");
      await updatePassword(_user, newPassword);
    };

    // Sign out
    window.firebaseSignOut = async () => {
      const prevUid = _uid;
      await signOut(auth);
      _uid  = null;
      _user = null;
      // Clear tenant cache on logout
      if(prevUid) {
        try {
          localStorage.removeItem("marjin_tid_" + prevUid);
          localStorage.removeItem("marjin_biz_" + prevUid);
        } catch(_){}
      }
    };

    // Wait for auth state to settle (user may already be signed in from previous session)
    const authReady = new Promise(resolve => {
      onAuthStateChanged(auth, user => {
        if (user) { _uid = user.uid; _user = user; }
        resolve(user); // resolve with user or null -- app decides what to do
      });
    });
    await authReady;

    // Firebase converts arrays to objects -- so we store as {v: jsonString}
    // All operational data lives under /tenants/{bizId}/ scoped by RTDB RBAC
    // _currentTenantId is set by the app when a business is selected
    let _currentTenantId = null;
    window.setTenantId = id => { _currentTenantId = id; };

    const fkey = k => {
      if (!_currentTenantId) throw new Error("tenant not set");
      return "tenants/" + _currentTenantId + "/" + k.replace(/[.#$\[\]]/g, "_");
    };
    // System data now lives under tenants/{tenantId}/app/
    // Requires tenantId to be set first via window.setTenantId
    const fkeyShared = k => {
      const safe = k.replace(/[.#$\[\]]/g, "_");
      if (safe === "app-users")      return _currentTenantId ? `tenants/${_currentTenantId}/app/users`    : null;
      if (safe === "app-businesses") return _currentTenantId ? `tenants/${_currentTenantId}/app/business` : null;
      if (!_currentTenantId) return null;
      return `tenants/${_currentTenantId}/${safe}`;
    };
    window.storage = {
      get: async (key, shared=false) => {
        const path = shared ? fkeyShared(key) : fkey(key);
        if (!path) throw new Error("tenant not set for shared key: " + key);
        const snap = await get(ref(db, path));
        if (!snap.exists()) throw new Error("not found");
        const raw = snap.val();
        const value = (raw && typeof raw === "object" && "_v" in raw) ? raw._v : JSON.stringify(raw);
        return { key, value, shared };
      },
      set: async (key, value, shared=false) => {
        const str = typeof value === "string" ? value : JSON.stringify(value);
        const path = shared ? fkeyShared(key) : fkey(key);
        if (!path) throw new Error("tenant not set for shared key: " + key);
        await set(ref(db, path), { _v: str });
        return { key, value: str, shared };
      },
      delete: async (key, shared=false) => {
        const path = shared ? fkeyShared(key) : fkey(key);
        await remove(ref(db, path));
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const snap = await get(ref(db, "marjin"));
        if (!snap.exists()) return { keys: [] };
        const pfx = (prefix || "").replace(/[.#$\[\]]/g, "_");
        const keys = Object.keys(snap.val()).filter(k => k.startsWith(pfx));
        return { keys };
      },
    };

    // Live listener -- calls callback whenever any key changes
    window.storage.subscribe = (key, callback, shared=false) => {
      const path = shared ? fkeyShared(key) : fkey(key);
      if (!path) return () => {}; // no-op unsubscribe if tenant not set
      const r = ref(db, path);
      return onValue(r, (snap) => {
        if (snap.exists()) {
          const raw = snap.val();
          const value = (raw && typeof raw === "object" && "_v" in raw) ? raw._v : JSON.stringify(raw);
          callback({ key, value });
        }
      });
    };
    // Expose uid for app use
    window.storage.getUid = () => _uid;

    // ── Authenticated fetch for Edge Functions ────────────────────────────────
    window.apiFetch = async (path, options={}) => {
      const token = await window.getIdToken();
      const headers = {
        "Authorization": `Bearer ${token}`,
        "Content-Type":  "application/json",
        ...(options.headers || {}),
      };
      return fetch(path, { ...options, headers });
    };

    // Raw RTDB get (without storage wrapper) -- used for pre-auth lookups
    window._rtdbGet = async (path) => {
      const snap = await get(ref(db, path));
      return snap.exists() ? snap.val() : null;
    };
    // Raw RTDB set -- used for lookup table writes
    window._rtdbSet = async (path, val) => {
      await set(ref(db, path), val);
    };

    window._auth            = auth;             // expose for tenant discovery fallback
    window._initializeApp   = initializeApp2;  // expose for creating secondary apps
    window._firebaseConfig  = firebaseConfig;  // expose config for secondary app creation
    window._firebaseReady = true;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  const d = new Date(_NOW); d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

const getDateDOW = (dateStr) => {
  if (!dateStr) return -1;
  const d = new Date(dateStr + 'T00:00:00');
  return d.getDay();
};
const getDateDay = (dateStr) => {
  if (!dateStr) return 0;
  return new Date(dateStr + 'T00:00:00').getDate();
};

function LoginScreen({ onLogin, tenantId }) {
  const [username,    setUsername]    = useState("");
  const [password,    setPassword]    = useState("");
  const [err,         setErr]         = useState("");
  const [loading,     setLoading]     = useState(false);
  const [showPass,    setShowPass]    = useState(false);
  const [resetMode,   setResetMode]   = useState(false);
  const [resetEmail,  setResetEmail]  = useState("");
  const [resetSent,   setResetSent]   = useState(false);

  // ── Hardcoded master user fallback ─────────────────────────────────────────
  const MASTER_USERS = {
    "yonatan": { email: "salaryonatan@gmail.com", tenantId: "biz_1772560427387", name: "יונתן סלרי" }
  };

  const tryLogin = async () => {
    if(!username.trim() || !password.trim()) { setErr("יש למלא שם משתמש וסיסמה"); return; }
    setLoading(true); setErr("");
    const dbg = []; // debug log
    try {
      const input = username.trim();
      const isEmail = input.includes("@");
      const uname = isEmail ? null : input.toLowerCase();
      let email = isEmail ? input.toLowerCase() : null;
      let foundTenantId = null;
      dbg.push("input=" + input + " isEmail=" + isEmail + " tenantId=" + tenantId);

      // ── Path A: username given -- lookup email ────────────────────────────────
      if(!email) {
        // Fast: tenantId already known
        if(tenantId) {
          try {
            const snap = await window._rtdbGet(`tenants/${tenantId}/lookup/${uname}`);
            dbg.push("fast-lookup=" + JSON.stringify(snap));
            if(snap && snap.email) { email = snap.email; foundTenantId = tenantId; }
          } catch(e){ dbg.push("fast-err=" + e.message); }
        }
        // Medium: username_index
        if(!email) {
          try {
            const indexed = await window._rtdbGet("username_index/" + uname);
            dbg.push("index=" + JSON.stringify(indexed));
            if(indexed && indexed.email) { email = indexed.email; foundTenantId = indexed.tenantId; }
            else if(indexed && indexed.tenantId) {
              foundTenantId = indexed.tenantId;
              const snap2 = await window._rtdbGet(`tenants/${indexed.tenantId}/lookup/${uname}`);
              dbg.push("lookup2=" + JSON.stringify(snap2));
              if(snap2 && snap2.email) email = snap2.email;
            }
          } catch(e){ dbg.push("index-err=" + e.message); }
        }
        // Hardcoded master fallback
        if(!email && MASTER_USERS[uname]) {
          email = MASTER_USERS[uname].email;
          foundTenantId = MASTER_USERS[uname].tenantId;
          dbg.push("master-fallback=true");
        }
        if(!email) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }
      }

      // ── Sign in with Firebase Auth ─────────────────────────────────────────
      dbg.push("before-signIn email=" + email);
      const fbUser = await window.firebaseSignIn(email, password);
      dbg.push("signIn-ok uid=" + fbUser.uid);

      // ── Find tenantId ─────────────────────────────────────────────────────────
      if(!foundTenantId) {
        try {
          const t = await window._rtdbGet("user_tenants/" + fbUser.uid);
          dbg.push("user_tenants=" + t);
          if(t && typeof t === "string") foundTenantId = t;
        } catch(e){ dbg.push("user_tenants-err=" + e.message); }
      }
      if(!foundTenantId) {
        try {
          const cached = localStorage.getItem("marjin_tid_" + fbUser.uid);
          dbg.push("ls-cache=" + cached);
          if(cached) foundTenantId = cached;
        } catch(_){}
      }
      dbg.push("foundTenantId=" + foundTenantId);
      if(!foundTenantId) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }

      // ── Load user profile ────────────────────────────────────────────────────
      let users = [];
      try {
        const userSnap = await window._rtdbGet(`tenants/${foundTenantId}/app/users`);
        users = userSnap?._v ? JSON.parse(userSnap._v) : [];
      } catch(_) { users = []; }
      // Find by username or by email (support both inputs)
      let u = uname
        ? users.find(u => u.username?.toLowerCase() === uname)
        : users.find(u => u.email?.toLowerCase() === email.toLowerCase());
      dbg.push("users=" + users.length + " searching-" + (uname||email));
      // Fallback: build user from master data if not found in app/users
      if(!u && uname && MASTER_USERS[uname]) {
        u = { id: 1, username: uname, name: MASTER_USERS[uname].name,
               email: MASTER_USERS[uname].email, role: "super_owner", firebaseUid: fbUser.uid };
        dbg.push("user-from-master=true");
        // Write to app/users so future logins find it
        try {
          await window._rtdbSet("username_index/" + uname, { tenantId: foundTenantId, email: u.email });
          await window._rtdbSet("user_tenants/" + fbUser.uid, foundTenantId);
        } catch(_){}
      }
      dbg.push("u=" + (u ? u.username : "null"));
      if(!u) { setErr("debug: " + dbg.join(" | ")); setLoading(false); return; }

      // Cache tenant + biz to localStorage + RTDB on every login
      try {
        localStorage.setItem("marjin_tid_" + fbUser.uid, foundTenantId);
        localStorage.setItem("marjin_biz_" + fbUser.uid, foundTenantId);
        await window._rtdbSet("user_tenants/" + fbUser.uid, foundTenantId);
        // Always update username_index so new browsers can find this user
        if(u.username) await window._rtdbSet("username_index/" + u.username.toLowerCase(), { tenantId: foundTenantId, email: u.email });
      } catch(_){}
      setErr("");
      // Store username in Firebase Auth displayName for tenant discovery fallback
      try { await window.firebaseUpdateDisplayName(fbUser, uname); } catch(_){}
      onLogin({...u, _tenantId: foundTenantId, firebaseUid: fbUser.uid});
    } catch(e) {
      const msg = e.code === "auth/wrong-password" || e.code === "auth/invalid-credential"
        ? "סיסמה שגויה" : e.code === "auth/too-many-requests"
        ? "יותר מדי ניסיונות -- נסה שוב מאוחר יותר" : (e.message||"err") + " | " + dbg.join(" | ");
      setErr(msg);
    }
    setLoading(false);
  };

  const trySendReset = async () => {
    if(!resetEmail.trim()) { setErr("יש להזין כתובת מייל"); return; }
    setLoading(true); setErr("");
    try {
      await window.firebaseSendReset(resetEmail.trim());
      setResetSent(true);
    } catch(e) {
      setErr(e.code === "auth/user-not-found" ? "מייל לא נמצא במערכת" : "שגיאה בשליחת המייל");
    }
    setLoading(false);
  };

  return (
    <div className="auth-root">
      <div className="auth-box">
        <div className="tc mb4">
          <div className="auth-logo">
            <span style={{color:"#fff",fontSize:16,fontWeight:700,letterSpacing:-0.5}}>M</span>
          </div>
          <h1 className="auth-title">Marjin</h1>
          <p className="auth-sub" style={{marginBottom:0}}>מערכת ניהול מסעדות</p>
        </div>
        <label className="label">שם משתמש</label>
        <input className="input" placeholder="username" value={username}
          onChange={e=>{setUsername(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          autoCapitalize="none" autoCorrect="off"/>
        <label className="label">סיסמה</label>
        <div className="pass-wrap field">
          <input className="input" type={showPass?"text":"password"} placeholder="••••••"
            value={password} onChange={e=>{setPassword(e.target.value);setErr(false);}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
          <button className="pass-eye" onClick={()=>setShowPass(p=>!p)}>
            {showPass ? "×" : <svg width="14" height="14" fill="none" stroke="#9CA3AF" strokeWidth="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>}
          </button>
        </div>
        {err && <div className="form-err">{err}</div>}
        <button className="btn btn-primary btn-full" style={{opacity:loading?0.6:1}} onClick={loading?null:tryLogin} disabled={loading}>
          {loading ? "מתחבר..." : "כניסה"}
        </button>
        <div style={{textAlign:"center",marginTop:16}}>
          <button className="btn-link" onClick={()=>{setResetMode(true);setErr("");}}>שכחתי סיסמה
          </button>
        </div>
      </div>
      {/* ── Forgot password modal ─────────────────────────────────────── */}
      {resetMode && (
        <div className="modal-overlay" style={{zIndex:9999}}>
          <div className="modal-box" style={{maxWidth:360}}>
            {resetSent ? (
              <>
                <div style={{width:36,height:36,background:"#F9FAFB",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
                  <svg width="18" height="18" fill="none" stroke="#16A34A" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.82a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.91a16 16 0 006.18 6.18l1.28-1.28a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                </div>
                <h3 className="modal-title tc mb2">קישור נשלח</h3>
                <p className="t-sm c-sub tc mb4">בדוק את תיבת הדואר ולחץ על הקישור לאיפוס הסיסמה.</p>
                <button onClick={()=>{setResetMode(false);setResetSent(false);setResetEmail("");}}
                  className="btn btn-primary btn-full">
                  סגור
                </button>
              </>
            ) : (
              <>
                <h3 className="modal-title mb1">איפוס סיסמה</h3>
                <p className="t-sm c-sub mb3">הזן את כתובת המייל ונשלח לך קישור לאיפוס.</p>
                <input className="input mb2" style={{direction:"ltr"}}
                  type="email" placeholder="your@email.com"
                  value={resetEmail} onChange={e=>setResetEmail(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&trySendReset()}/>
                {err && <div className="form-err">{err}</div>}
                <div className="modal-actions">
                  <button onClick={trySendReset} disabled={loading}
                    className="btn btn-primary" style={{flex:1,opacity:loading?0.6:1}}>
                    {loading ? "שולח..." : "שלח קישור"}
                  </button>
                  <button onClick={()=>{setResetMode(false);setErr("");}}
                    style={{padding:"11px 14px",background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:8,color:"#6B7280",fontWeight:500,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                    ביטול
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── User Management Panel ────────────────────────────────────────────────────
function UserManagement({ users, saveUsers, tenantId, businesses }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId,  setEditId]  = useState(null);
  const [form, setForm] = useState({name:"",username:"",password:"",role:"manager",allowedBizIds:[]});
  const [err,  setErr]  = useState("");
  const [saving, setSaving] = useState(false);

  const resetForm = () => { setForm({name:"",username:"",password:"",role:"manager",allowedBizIds:[]}); setErr(""); setShowAdd(false); setEditId(null); };

  const toggleBiz = (bizId) => {
    setForm(f => ({
      ...f,
      allowedBizIds: f.allowedBizIds.includes(bizId)
        ? f.allowedBizIds.filter(id => id !== bizId)
        : [...f.allowedBizIds, bizId]
    }));
  };

  const needsBizAccess = form.role !== "super_owner" && form.role !== "owner";

  const save = async () => {
    if(!form.name.trim()||!form.username.trim()) return setErr("יש למלא שם ושם משתמש");
    if(!editId && !form.password) return setErr("יש להזין סיסמה ראשונית");
    if(!editId && form.password.length < 6) return setErr("סיסמה חייבת להיות לפחות 6 תווים");
    if(users.find(u=>u.username===form.username.trim()&&u.id!==editId)) return setErr("שם משתמש כבר קיים");
    if(needsBizAccess && form.allowedBizIds.length===0 && businesses.length>1) return setErr("יש לבחור לפחות עסק אחד");
    setSaving(true); setErr("");
    try {
      const allowedBizIds = needsBizAccess
        ? (businesses.length === 1 ? [businesses[0].id] : form.allowedBizIds)
        : null;
      if(editId) {
        saveUsers(users.map(u=>u.id===editId
          ? {...u, name:form.name, username:form.username.trim(), role:form.role, allowedBizIds}
          : u));
      } else {
        // Use placeholder email — user will set real email on first login
        const placeholderEmail = `${form.username.trim().toLowerCase()}@marjin-user.app`;
        let firebaseUid;
        try {
          firebaseUid = await window.firebaseCreateUser(placeholderEmail, form.password);
        } catch(createErr) {
          if(createErr.code === "auth/email-already-in-use") {
            setErr("שם משתמש כבר קיים במערכת — נסה שם אחר");
            setSaving(false); return;
          } else throw createErr;
        }
        const uLower2 = form.username.trim().toLowerCase();
        // Write each path independently — some may be blocked by RTDB rules
        const safeWrite = async (path, val) => {
          try { await window._rtdbSet(path, val); } catch(_) {}
        };
        await safeWrite(`tenants/${tenantId}/lookup/${uLower2}`, { email: placeholderEmail, firebaseUid });
        await safeWrite(`username_index/${uLower2}`, { tenantId, email: placeholderEmail });
        await safeWrite(`tenants/${tenantId}/members/${firebaseUid}`, true);
        await safeWrite(`tenants/${tenantId}/roles/${firebaseUid}`, form.role);
        await safeWrite(`user_tenants/${firebaseUid}`, tenantId);
        const newUser = {id:Date.now(), name:form.name.trim(), username:form.username.trim(),
          email: placeholderEmail, role:form.role, firebaseUid, allowedBizIds,
          mustCompleteProfile: true};
        saveUsers([...users, newUser]);
      }
      resetForm();
    } catch(e) {
      const msg = e.code==="auth/weak-password" ? "סיסמה חלשה מדי (מינימום 6 תווים)"
        : e.message || "שגיאה ביצירת המשתמש";
      setErr(msg);
    }
    setSaving(false);
  };

  const startEdit = (u) => { setEditId(u.id); setForm({name:u.name,username:u.username,password:"",role:u.role,allowedBizIds:u.allowedBizIds||[]}); setShowAdd(true); };
  const deleteUser = (id) => { if(users.find(u=>u.id===id)?.role==="super_owner") return; saveUsers(users.filter(u=>u.id!==id)); };

  return (
    <div className="fw">
      {users.map(u=>(
        <div key={u.id} className="data-row">
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <div style={{fontWeight:600,color:"#111827",fontSize:13}}>{u.name}</div>
              {u.mustCompleteProfile && (
                <span style={{fontSize:10,background:"#F9FAFB",border:"1px solid #E5E7EB",color:"#6B7280",borderRadius:3,padding:"1px 6px"}}>
                  ממתין
                </span>
              )}
            </div>
            <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>@{u.username}</div>
          </div>
          <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:3,textTransform:"uppercase",letterSpacing:0.4,color:ROLE_COLORS[u.role]?.color||"#6B7280",background:ROLE_COLORS[u.role]?.bg||"#F9FAFB"}}>
            {ROLES[u.role]?.label||u.role}
          </span>
          {u.allowedBizIds && u.allowedBizIds.length > 0 && businesses && (
            <span style={{fontSize:10,color:"#9CA3AF",flexShrink:0}}>
              {u.allowedBizIds.length===businesses.length ? "הכל" : `${u.allowedBizIds.length} עסקים`}
            </span>
          )}
          <button className="icon-btn" onClick={()=>startEdit(u)} title="עריכה"><IcoEdit/></button>
          {u.role!=="super_owner" && <button className="icon-btn" onClick={()=>deleteUser(u.id)}><IcoTrash/></button>}
        </div>
      ))}

      {showAdd ? (
        <div className="card card-p mb3">
          <div style={{fontWeight:600,color:"#111827",fontSize:13,marginBottom:12}}>{editId?"עריכת משתמש":"הוספת משתמש"}</div>
          {!editId && (
            <div className="form-hint">
              המשתמש יוזמן להגדיר מייל וסיסמה אישית בכניסה הראשונה שלו
            </div>
          )}
          {err && <div className="form-err">{err}</div>}
          <label className="label">שם מלא</label>
          <input className="input" placeholder="ישראל ישראלי" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          <label className="label">שם משתמש</label>
          <input className="input" placeholder="username" autoCapitalize="none" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} disabled={!!editId}/>
          {!editId && <>
            <label className="label">סיסמה ראשונית (לפחות 6 תווים)</label>
            <input className="input" type="password" placeholder="••••••" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
          </>}
          <label className="label">תפקיד</label>
          <select className="select" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value, allowedBizIds:[]}))}>
            <option value="owner">בעלים — גישה מלאה</option>
            <option value="manager">מנהל — לוח בקרה מלא</option>
            <option value="staff">אחמש — משמרות בלבד</option>
          </select>
          {needsBizAccess && businesses && businesses.length > 1 && (
            <div style={{marginBottom:10}}>
              <label className="label" style={{marginBottom:6}}>גישה לעסקים</label>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {businesses.map(biz => (
                  <label key={biz.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 11px",background:form.allowedBizIds.includes(biz.id)?"#F9FAFB":"#FFFFFF",border:"1px solid "+(form.allowedBizIds.includes(biz.id)?"#D1D5DB":"#E5E7EB"),borderRadius:6,cursor:"pointer",fontFamily:"inherit"}}>
                    <input type="checkbox" checked={form.allowedBizIds.includes(biz.id)} onChange={()=>toggleBiz(biz.id)} style={{width:14,height:14,accentColor:"#111827",cursor:"pointer",flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>{biz.name}</span>
                  </label>
                ))}
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:7,marginTop:4}}>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?"שומר...":"שמור"}</button>
            <button className="btn btn-secondary" onClick={resetForm}>ביטול</button>
          </div>
        </div>
      ) : (
        <button className="btn btn-ghost btn-full mt2" onClick={()=>{setShowAdd(true);setEditId(null);}}>הוסף משתמש</button>
      )}
    </div>
  );
}

// ─── Profile Completion Screen (first login) ──────────────────────────────────
function ProfileCompletionScreen({ user, onComplete }) {
  const [email,    setEmail]    = useState("");
  const [pass,     setPass]     = useState("");
  const [pass2,    setPass2]    = useState("");
  const [showPass, setShowPass] = useState(false);
  const [err,      setErr]      = useState("");
  const [loading,  setLoading]  = useState(false);
  const [step,     setStep]     = useState(1); // 1=welcome, 2=form

  const save = async () => {
    if(!email.trim()) return setErr("יש להזין כתובת מייל");
    if(!/^[^@]+@[^@]+\.[^@]+$/.test(email.trim())) return setErr("כתובת מייל לא תקינה");
    if(!pass) return setErr("יש לבחור סיסמה חדשה");
    if(pass.length < 6) return setErr("סיסמה חייבת להיות לפחות 6 תווים");
    if(pass !== pass2) return setErr("הסיסמאות אינן תואמות");
    setLoading(true); setErr("");
    try {
      // Update Firebase Auth email + password
      await window.firebaseUpdateEmail(email.trim());
      await window.firebaseUpdatePassword(pass);
      // Update user record
      onComplete({ email: email.trim() });
    } catch(e) {
      const msg = e.code === "auth/email-already-in-use"
        ? "כתובת המייל כבר בשימוש -- נסה כתובת אחרת"
        : e.code === "auth/invalid-email"
        ? "כתובת מייל לא תקינה"
        : e.message || "שגיאה בשמירת הפרטים";
      setErr(msg);
    }
    setLoading(false);
  };

  if(step === 1) return (
    <div className="auth-root">
      <div className="auth-box">
        <div style={{width:36,height:36,background:"#111827",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}>
          <span style={{color:"#fff",fontSize:14,fontWeight:700}}>M</span>
        </div>
        <h2 className="auth-title mb1">ברוך הבא, {user.name}</h2>
        <p className="c-muted t-sm tc mb4">נגדיר מייל וסיסמה אישית לחשבון שלך</p>
        <div className="tc fw6 c-muted t-sm mb4 card card-p-sm">@{user.username}</div>
        <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:7,padding:"12px 14px",marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:600,color:"#6B7280",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>מה נגדיר</div>
          {["כתובת מייל לשחזור סיסמה","סיסמה אישית שרק אתה יודע"].map((text,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#6B7280",marginBottom:i===0?5:0}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:"#D1D5DB",flexShrink:0}}/>
              <span>{text}</span>
            </div>
          ))}
        </div>
        <button className="btn btn-primary btn-full" onClick={()=>setStep(2)}>המשך</button>
      </div>
    </div>
  );

  return (
    <div className="auth-root">
      <div className="auth-box">
        <div className="flex jcenter g2 mb3">
          <div style={{width:6,height:6,borderRadius:"50%",background:"#D1D5DB"}}/>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#111827"}}/>
        </div>
        <h2 className="auth-title mb1">הגדרת פרטים אישיים</h2>
        <p className="c-muted t-sm tc">פרטים אלו שמורים אצלך בלבד</p>

        <label className="label">כתובת מייל (לשחזור סיסמה)</label>
        <input className="input" style={{direction:"ltr"}} type="email" placeholder="your@email.com"
          value={email} onChange={e=>{setEmail(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&save()}/>

        <label className="label">סיסמה חדשה</label>
        <div className="pass-wrap field">
          <input className="input" type={showPass?"text":"password"} placeholder="לפחות 6 תווים"
            value={pass} onChange={e=>{setPass(e.target.value);setErr("");}}/>
          <button className="pass-eye" onClick={()=>setShowPass(p=>!p)}>{showPass?"×":"···"}</button>
        </div>

        <label className="label">אימות סיסמה</label>
        <input className="input" style={{border:`1px solid ${pass2&&pass2!==pass?"#FECACA":pass2?"#E5E7EB":"#D1D5DB"}`}}
          type="password" placeholder="הכנס שוב"
          value={pass2} onChange={e=>{setPass2(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&save()}/>
        {pass2 && pass2!==pass && <div style={{fontSize:11,color:"var(--danger)",marginTop:-5,marginBottom:7}}>הסיסמאות אינן תואמות</div>}
        {pass2 && pass2===pass && <div style={{fontSize:11,color:"var(--success)",marginTop:-5,marginBottom:7}}>הסיסמאות תואמות</div>}

        {err && <div className="form-err">{err}</div>}
        <button className="btn btn-primary btn-full" style={{opacity:loading?0.6:1}} onClick={loading?null:save} disabled={loading}>
          {loading?"שומר...":"שמור וכנס למערכת"}
        </button>
      </div>
    </div>
  );
}

// ─── Setup Wizard ─────────────────────────────────────────────────────────────
const DOW_FULL   = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

function SetupWizard({ initial, initialSuppliers, initialFixed, onComplete, onCancel, isFirstSetup=true }) {
  const [step, setStep] = useState(1);
  // Step 1 -- פרטי עסק
  const [bizName,      setBizName]      = useState(initial.businessName || "");
  const [rentType,     setRentType]     = useState(initial.rentType || "pct"); // "pct" | "fixed"
  const [rentPct,      setRentPct]      = useState(initial.rentPct || "");
  const [rentFixed,    setRentFixed]    = useState(initial.rentFixed || "");
  const [hasRoyalty,   setHasRoyalty]   = useState(initial.hasRoyalty || false);
  const [royaltyPct,   setRoyaltyPct]   = useState(initial.royaltyPct || "");

  // Step 2 -- יעדים
  const [tFood,  setTFood]  = useState(initial.targets?.foodCostPct  || 33);
  const [tLabor, setTLabor] = useState(initial.targets?.laborCostPct || 27);
  const [tGrowth,setTGrowth]= useState(initial.targets?.salesGrowthPct || 5);
  const [waGroupId, setWaGroupId] = useState(initial.whatsappGroupId || "");

  // Step 3 -- ספקים
  const [suppliers, setSuppliers] = useState(
    initialSuppliers.length > 0 ? initialSuppliers :
    [{ id: Date.now().toString(), name: "", category: "כללי", days: [] }]
  );
  const [newSupName, setNewSupName] = useState("");
  const [newSupCat,  setNewSupCat]  = useState("כללי");
  const [newSupDays, setNewSupDays] = useState([]);
  const [editingSupId,   setEditingSupId]   = useState(null);
  const [editingSupDays, setEditingSupDays] = useState([]);
  const [editingSupCat,  setEditingSupCat]  = useState("כללי");

  // Step 4 -- קבועות
  const [fixedList, setFixedList] = useState(initialFixed);
;

  const toggleDay = (d) => setNewSupDays(prev => prev.includes(d) ? prev.filter(x=>x!==d) : [...prev, d]);

  const addSupplier = () => {
    if(!newSupName.trim()) return;
    setSuppliers(prev => [...prev, { id: Date.now().toString(), name: newSupName.trim(), category: newSupCat, days: [...newSupDays] }]);
    setNewSupName(""); setNewSupCat("כללי"); setNewSupDays([]);
  };

  const removeSupplier = (id) => setSuppliers(prev => prev.filter(s=>s.id!==id));
  const saveEditedSupplier = async (updated) => {
    try {
      const uid = window.storage.getUid ? window.storage.getUid() : null;
      const bizId = uid ? localStorage.getItem("marjin_biz_"+uid) : null;
      if(!bizId) return;
      await window.storage.set(`biz:${bizId}:suppliers`, JSON.stringify(updated), true);
    } catch(_){}
  };

  const updateFixed = (id, field, val) => setFixedList(prev => prev.map(f => f.id===id ? {...f, [field]:field==="amount"?Number(val)||0:val} : f));

  // Step 5 -- owner account
  const [ownerName,     setOwnerName]     = useState("");
  const [ownerUsername, setOwnerUsername] = useState("");
  const [ownerEmail,    setOwnerEmail]    = useState("");
  const [ownerPassword, setOwnerPassword] = useState("");
  const [ownerPass2,    setOwnerPass2]    = useState("");
  const [ownerErr,      setOwnerErr]      = useState("");

  const TOTAL_STEPS = isFirstSetup ? 5 : 4;

  const finish = async () => {
    if(isFirstSetup) {
      if(!ownerName.trim()||!ownerUsername.trim()||!ownerEmail.trim()||!ownerPassword) return setOwnerErr("יש למלא את כל השדות כולל מייל");
      if(!/^[^@]+@[^@]+\.[^@]+$/.test(ownerEmail.trim())) return setOwnerErr("כתובת מייל לא תקינה");
      if(ownerPassword.length < 6) return setOwnerErr("סיסמה חייבת להיות לפחות 6 תווים");
      if(ownerPassword!==ownerPass2) return setOwnerErr("הסיסמאות אינן תואמות");
      setOwnerErr("");
    }
    const cfg = {
      businessName: bizName.trim() || "המסעדה שלי",
      rentType,
      rentPct:   rentType==="pct"   ? Number(rentPct)||0   : 0,
      rentFixed: rentType==="fixed" ? Number(rentFixed)||0 : 0,
      hasRoyalty,
      royaltyPct: hasRoyalty ? Number(royaltyPct)||0 : 0,
      targets: { salesGrowthPct:Number(tGrowth)||5, foodCostPct:Number(tFood)||33, laborCostPct:Number(tLabor)||27 },
      whatsappGroupId: waGroupId.trim()
    };
    const updatedFixed = fixedList.map(f => {
      if(f.rentPct) return {...f, name:`שכר דירה (${cfg.rentPct}% ממחזור)`};
      if(f.royaltyPct) return hasRoyalty ? {...f, name:`תמלוגים (${cfg.royaltyPct}% ממחזור)`} : {...f, amount:0};
      return f;
    });
    const firstOwner = isFirstSetup ? { name:ownerName.trim(), username:ownerUsername.trim(),
      email:ownerEmail.trim(), password:ownerPassword } : null;
    onComplete(cfg, suppliers.filter(s=>s.name), updatedFixed, firstOwner);
  };

  return (
    <div className="wizard-root">
      <div className="wizard-wrap">
        <div className="wizard-header">
          <div className="wizard-step">שלב {step} מתוך {TOTAL_STEPS}</div>
          <div className="wizard-prog"><div className="wizard-bar" style={{width:`${(step/TOTAL_STEPS)*100}%`}}/></div>
          {step===1 && <><h2 className="wizard-title">ברוכים הבאים</h2><p className="wizard-sub">נגדיר את העסק — לוקח 3 דקות</p></>}
          {step===2 && <><h2 className="wizard-title">יעדים עסקיים</h2><p className="wizard-sub">מה אתה מכוון להשיג?</p></>}
          {step===3 && <><h2 className="wizard-title">ספקים</h2><p className="wizard-sub">הוסף ספקים וימי אספקה</p></>}
          {step===4 && <><h2 className="wizard-title">הוצאות קבועות</h2><p className="wizard-sub">סכומים חודשיים קבועים</p></>}
          {step===5 && <><h2 className="wizard-title">יצירת חשבון</h2><p className="wizard-sub">פרטי כניסה לבעלים הראשי</p></>}
        </div>

        {/* ── STEP 1 ── */}
        {step===1 && (
          <>
            <div className="card card-p">
              <label className="label">שם העסק</label>
              <input className="input" style={{direction:"ltr"}} placeholder="למשל: קפה ירושלמי" value={bizName} onChange={e=>setBizName(e.target.value)}/>
            </div>
            <div className="card card-p">
              <label className="label">שכר דירה</label>
              {/* toggle: % מחזור / קבוע */}
              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {[["pct","% ממחזור"],["fixed","סכום קבוע"]].map(([t,l])=>(
                  <button key={t} style={{flex:1,padding:"9px",borderRadius:6,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,
                    background:rentType===t?"#111827":"#FFFFFF",
                    borderColor:rentType===t?"#111827":"#E5E7EB",
                    color:rentType===t?"#FFFFFF":"#6B7280"}}
                    onClick={()=>setRentType(t)}>{l}</button>
                ))}
              </div>
              {rentType==="pct" ? (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="input input-sm input-num" type="number" placeholder="0" value={rentPct} onChange={e=>setRentPct(e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:14}}>% מההכנסות החודשיות</span>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="input input-sm" type="number" placeholder="0" value={rentFixed} onChange={e=>setRentFixed(e.target.value)}/>
                  <span style={{color:"#9CA3AF",fontSize:14}}>₪ בחודש</span>
                </div>
              )}

// ─── Helper: suppliers expected on a given day-of-week ───────────────────────
function suppliersOnDay(dow, suppliers) {
  if (!Array.isArray(suppliers)) return [];
  return suppliers.filter(s => {
    if (!s || !Array.isArray(s.days)) return false;
    return s.days.includes(dow);
  });
}

// ─── Helper: compute monthly metrics from entries ────────────────────────────
function calcMetrics(entries, fixedList, cfg) {
  const { rentPct=0, rentType='fixed', rentFixed=0, hasRoyalty=false, royaltyPct=0,
          suppliers=[] } = cfg || {};

  let totalSales=0, totalFood=0, totalPayroll=0, totalOtherExpense=0,
      totalOtherIncome=0, totalNetworkDelivery=0;

  entries.forEach(e => {
    const sales        = Number(e.sales)        || 0;
    const deliveries   = Number(e.deliveries)   || 0;
    const food         = Number(e.food_cost)    || 0;
    const payroll      = Number(e.payroll)      || 0;
    const hourly       = Object.values(e.hourly_payroll || {}).reduce((a,v)=>a+(Number(v)||0),0);
    const otherExp     = Number(e.other_expense) || 0;
    const otherInc     = Number(e.other_income)  || 0;
    const supPayments  = Object.values(e.supplier_payments || {}).reduce((a,v)=>a+(Number(v)||0),0);

    totalSales           += sales + deliveries + otherInc;
    totalNetworkDelivery += deliveries;
    totalFood            += supPayments > 0 ? supPayments : food;
    totalPayroll         += payroll + hourly;
    totalOtherExpense    += otherExp;
    totalOtherIncome     += otherInc;
  });

  // Fixed expenses prorated to days elapsed
  const daysPassed = entries.length;
  const daysInMonth = DAYS_IN_MONTH || 30;
  const fixedMonthly = fixedList.reduce((a,f) => {
    if (f.rentPct)    return a + Math.round(totalSales * (rentPct/100));
    if (f.royaltyPct) return a + (hasRoyalty ? Math.round(totalSales * (royaltyPct/100)) : 0);
    return a + (Number(f.amount) || 0);
  }, 0);

  const rentAmount = rentType === 'pct' ? Math.round(totalSales * (rentPct/100)) : rentFixed;
  const royaltyAmount = hasRoyalty ? Math.round(totalSales * (royaltyPct/100)) : 0;
  const TOTAL_FIXED = fixedMonthly;
  const fixedSoFar  = daysInMonth > 0 ? Math.round(TOTAL_FIXED * (daysPassed / daysInMonth)) : 0;

  const totalExpenses = totalFood + totalPayroll + totalOtherExpense + rentAmount + royaltyAmount + fixedSoFar;
  const lc            = totalSales - totalExpenses;
  const foodCostPct   = totalSales > 0 ? (totalFood / totalSales) * 100 : 0;
  const dailyAvg      = daysPassed > 0 ? lc / daysPassed : 0;
  const daysLeft      = Math.max(daysInMonth - daysPassed, 0);
  const forecast      = lc + (dailyAvg * daysLeft);

  return {
    totalSales, totalFood, totalPayroll, totalOtherExpense,
    totalNetworkDelivery, fixedSoFar, totalExpenses,
    lc, foodCostPct, dailyAvg, forecast, TOTAL_FIXED,
  };
}

// ─── Helper: build daily LC cumulative chart data ────────────────────────────
function buildChart(entries) {
  if (!Array.isArray(entries) || entries.length === 0) return [];
  let cum = 0;
  return entries
    .slice()
    .sort((a, b) => (a.date||'').localeCompare(b.date||''))
    .map(e => {
      const sales = (Number(e.sales)||0) + (Number(e.deliveries)||0) + (Number(e.other_income)||0);
      const food  = Object.values(e.supplier_payments||{}).reduce((a,v)=>a+(Number(v)||0),0) || (Number(e.food_cost)||0);
      const pay   = (Number(e.payroll)||0) + Object.values(e.hourly_payroll||{}).reduce((a,v)=>a+(Number(v)||0),0);
      const exp   = food + pay + (Number(e.other_expense)||0);
      cum += sales - exp;
      return { day: (e.date||'').slice(8), יתרה: Math.round(cum), הכנסות: Math.round(sales), הוצאות: Math.round(exp) };
    });
}

// ─── Count-up hook for hero number ────────────────────────────────────────────
function useCountUp(target, duration=900) {
  const [val, setVal] = React.useState(0);
  const prev = React.useRef(0);
  React.useEffect(() => {
    if (!target) return;
    const start = prev.current;
    const diff = target - start;
    const startTime = performance.now();
    const tick = (now) => {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // Ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(start + diff * eased));
      if (progress < 1) requestAnimationFrame(tick);
      else prev.current = target;
    };
    requestAnimationFrame(tick);
  }, [target]);
  return val;
}
