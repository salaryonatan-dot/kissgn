        if(!entry || entry.supplier_payments?.[sup.id] === undefined) {
          supplierMissingDays[sup.id] = (supplierMissingDays[sup.id]||0) + 1;
        }
      });
    }
  }
  const monthLabel = TODAY.toLocaleDateString("he-IL",{month:"long",year:"numeric"});

  // Supplier alerts
  const supplierAlerts = [];
  for(let d=1; d<=DAY_OF_MONTH; d++){
    const ds=`${YEAR}-${MONTH_STR}-${String(d).padStart(2,"0")}`;
    const entry=entries.find(e=>e.date===ds);
    const dow=getDateDOW(ds);
    if(dow===6) continue; // שבת -- לא עובדים
    suppliersOnDay(dow, suppliers).forEach(sup=>{
      const paid=Number(entry?.supplier_payments?.[sup.id]||0);
      if(!paid) supplierAlerts.push({date:ds,day:d,dow,supplier:sup});
    });
  }
  const todayExpected = suppliersOnDay(TODAY_DOW, suppliers);
  const todayMissing = todayExpected.filter(s=>!Number(todayEntry?.supplier_payments?.[s.id]||0));

  if(!loaded) return <div style={{minHeight:"100vh",background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:40}}>📊</div><div style={{fontSize:15,color:"#6B7280",fontWeight:600}}>מתחבר למערכת...</div></div>;

  // Login screen -- always shown first, even in new browser
  if(loaded && !loggedInUser) {
    return (
      <LoginScreen
        tenantId={currentBizId || businesses[0]?.id}
        onLogin={(user)=>{
          setLoggedInUser(user);
          if(user._tenantId) {
            window._currentTenantId = user._tenantId;
          }
          // Filter businesses to only those this user can access
          const isSuperOwner = user.role === "super_owner" || user.role === "owner";
          const allowed = isSuperOwner ? null : (user.allowedBizIds || []);
          // allowed===null means all; [] means none yet; [ids] means specific
          if(allowed !== null && allowed.length > 0) {
            // Will be applied after businesses are loaded -- store on user
            setLoggedInUser({...user, _allowedBizIds: allowed});
          }
          if(user._tenantId) {
            setCurrentBizId(user._tenantId);
            // Mobile: businesses not loaded before login -- reload now
            if(businesses.length === 0) {
              window.storage.get("app-businesses", true).then(rb => {
                if(rb) {
                  try {
                    const bizList = JSON.parse(rb.value);
                    setBusinesses(bizList);
                  } catch(_){}
                }
              }).catch(()=>{});
            }
          } else if(businesses.length === 1) {
            setCurrentBizId(businesses[0].id);
          }
          if(user.role==="staff") setScreen("shifts");
        }}
      />
    );
  }

  // First time setup -- only if truly no business (not just slow load on mobile)
  if(loaded && loggedInUser && businesses.length === 0 && !currentBizId) {
    return (
      <SetupWizard
        initial={businessConfig} initialSuppliers={[]} initialFixed={FIXED_EXPENSES_DEFAULT}
        onComplete={(cfg, sups, fixed, firstOwner) => { completeSetup(cfg, sups, fixed, firstOwner); }}
        onCancel={null} isFirstSetup={true}
      />
    );
  }

  // Business selector -- multiple businesses
  // Full-page selector only when no business selected yet
  if(loaded && loggedInUser && !currentBizId && businesses.length > 0) {
    return (
      <BusinessSelector
        businesses={allowedBusinesses}
        userName={loggedInUser.name}
        isSuperOwner={isSuperOwner}
        onSelect={(id) => {
          setSetupDone(true);
          setCurrentBizId(id);
          setShowBizSelect(false);
          const uid = window.storage.getUid?.();
          if(uid) window._rtdbSet(`user_active_biz/${uid}`, id).catch(()=>{});
        }}
        onDelete={async (id) => {
          const updated = businesses.filter(b => b.id !== id);
          setBusinesses(updated);
          try { await window.storage.set("app-businesses", JSON.stringify(updated), true); } catch(_){}
        }}
        onAdd={() => { setCurrentBizId(null); setShowSetup(true); setShowBizSelect(false); }}
      />
    );
  }

  // Setup for this business
  // When switching business — skip all guards and show dashboard with modal
  if(showBizSelect && currentBizId) { /* fall through to main return with modal */ }
  else if(loaded && loggedInUser && currentBizId && (!setupDone || showSetup) && !showBizSelect) return (
    <SetupWizard
      initial={businessConfig}
      initialSuppliers={suppliers}
      initialFixed={fixedList}
      onComplete={(cfg, sups, fixed, firstOwner) => { completeSetup(cfg, sups, fixed, firstOwner); }}
      onCancel={setupDone ? ()=>setShowSetup(false) : null}
      isFirstSetup={false}
    />
  );

  // Add new business (no currentBizId but user is logged in)
  // Add new business -- show setup whenever showSetup=true and logged in
  if(loaded && loggedInUser && showSetup && !showBizSelect) return (
    <SetupWizard
      initial={{businessName:"",rentPct:0,royaltyPct:0,hasRoyalty:false,targets:{salesGrowthPct:5,foodCostPct:33,laborCostPct:27}}}
      initialSuppliers={[]} initialFixed={FIXED_EXPENSES_DEFAULT}
      onComplete={(cfg, sups, fixed) => { completeSetup(cfg, sups, fixed, null); }}
      onCancel={() => { setShowSetup(false); setShowBizSelect(true); }}
      isFirstSetup={false}
    />
  );

  // אם אחמש מחובר ונמצא במסך שאין לו גישה -- הפנה למשמרות
  if(!showBizSelect && currentUser && screen !== "shifts" && !(currentUser.permissions||[]).includes(screen)) {
    // use effect-like redirect without hooks violation: just render shifts
    return (
      <div dir="rtl" style={S.root}>
        <div style={S.amb1}/><div style={S.amb2}/>
        <header style={S.header}>
          <div>
            <div style={S.badge}>עסק א׳ · פיילוט</div>
            <h1 style={S.title}>לוח בקרה יומי</h1>
          </div>
          <div style={{fontSize:12,color:"#6B7280",background:"#40404022",padding:"5px 12px",borderRadius:8,border:"1px solid #40404044"}}>
            ⚡ {currentUser.name}
          </div>
        </header>
        <nav style={S.nav}>
          <button style={{...S.navBtn,...S.navShift}} onClick={()=>setScreen("shifts")}>⚡ משמרות</button>
          {(currentUser.permissions||[]).map(s=>{
            const lbl={"dashboard":"📊 סקירה","forecast":"🔮 תחזית","foodcost":"🥗 פוד קוסט","history":"📋 היסטוריה","fixed":"🔒 קבועות"}[s];
            return lbl ? <button key={s} style={{...S.navBtn,...(screen===s?S.navActive:{})}} onClick={()=>setScreen(s)}>{lbl}</button> : null;
          })}
        </nav>
        <ShiftManagerEmbed currentUser={currentUser} setCurrentUser={setCurrentUser} onNavigate={s=>setScreen(s)} appUsers={appUsers} saveAppUsers={saveAppUsers} bizId={currentBizId||""}/>
      </div>
    );
  }

  return (
    <div dir="rtl" style={S.root}>
      <div style={S.amb1}/><div style={S.amb2}/>

      {/* Business Switch Modal */}
      {showBizSelect && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowBizSelect(false)}>
          <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:380,boxShadow:"0 8px 40px #0002",fontFamily:"'Heebo',sans-serif",direction:"rtl"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:36,marginBottom:6}}>🏢</div>
              <h2 style={{margin:0,fontSize:18,fontWeight:900,color:"#111827"}}>בחר מסעדה</h2>
            </div>
            {allowedBusinesses.map(biz => (
              <div key={biz.id} style={{marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={()=>{ setSetupDone(true); setCurrentBizId(biz.id); setShowBizSelect(false); const uid=window.storage.getUid?.(); if(uid) window._rtdbSet("user_active_biz/"+uid, biz.id).catch(()=>{}); }}
                    style={{flex:1,padding:"14px 18px",background:biz.id===currentBizId?"#EFF6FF":"#F8FAFC",border:biz.id===currentBizId?"1.5px solid #3B82F6":"1px solid #E5E7EB",borderRadius:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between",fontWeight:700,fontSize:15,color:"#111827"}}>
                    {biz.name}
                    {biz.id===currentBizId && <span style={{fontSize:12,color:"#3B82F6",fontWeight:600}}>● פעיל</span>}
                  </button>
                  {isSuperOwner && (
                    <button onClick={async()=>{ if(!window.confirm("למחוק את "+biz.name+"?")) return; const updated=businesses.filter(b=>b.id!==biz.id); setBusinesses(updated); try{await window.storage.set("app-businesses",JSON.stringify(updated),true);}catch(_){} if(biz.id===currentBizId) setShowBizSelect(false); }}
                      style={{padding:"10px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,color:"#EF4444",cursor:"pointer",fontSize:15,fontFamily:"inherit"}}>✕</button>
                  )}
                </div>
              </div>
            ))}
            <button onClick={()=>{ setShowBizSelect(false); setCurrentBizId(null); setShowSetup(true); }}
              style={{width:"100%",marginTop:8,padding:"12px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:12,color:"#2563EB",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
              + הוסף מסעדה חדשה
            </button>
          </div>
        </div>
      )}

      {/* Header */}
      <header style={S.header}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={S.badge}>📊 {businessConfig.businessName||"עסק א׳"}</div>
            {businesses.length > 1 && <button onClick={(e)=>{ e.stopPropagation(); setShowBizSelect(true); }} style={{fontSize:11,padding:"3px 10px",background:"#F1F5F9",border:"1px solid #D1D5DB",borderRadius:20,cursor:"pointer",fontFamily:"inherit",color:"#6B7280",fontWeight:600}}>החלף ⇄</button>}
            {isSuperOwner && <button onClick={()=>{ setShowSetup(true); setCurrentBizId(null); }} style={{fontSize:11,padding:"3px 10px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:20,cursor:"pointer",fontFamily:"inherit",color:"#2563EB",fontWeight:600}}>+ עסק חדש</button>}
          </div>
          <h1 style={S.title}>לוח בקרה יומי</h1>
          <p style={S.sub}>{monthLabel} · {DOW_NAMES[TODAY_DOW]} {DAY_OF_MONTH}/{DAYS_IN_MONTH}</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
          {!currentUser && (<>
            <button style={{...S.addBtn,background:"transparent",border:"1px solid #D1D5DB",color:"#6B7280",padding:"9px 14px",fontSize:18}} onClick={()=>setShowSetup(true)} title="הגדרות">⚙️</button>
            <button style={S.addBtn} onClick={()=>{setForm({...EMPTY_ENTRY,date:YESTERDAY_STR,security_event:false});setEditingId(null);setEntryStep('revenue');setScreen("entry");}}>
              <span style={{fontSize:18}}>+</span> הזנת יום
            </button>
          </>)}
          {currentUser && (
            <div style={{fontSize:13,color:"#6B7280",background:"#F1F5F9",padding:"8px 14px",borderRadius:12,border:"1px solid #E5E7EB",fontWeight:700}}>
              ⚡ {currentUser.name}
            </div>
          )}
          {loggedInUser && !currentUser && (
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:12,color:"#111827",fontWeight:700}}>{loggedInUser.name}</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{ROLES[loggedInUser.role]?.label||loggedInUser.role}</div>
              </div>
              <button style={{padding:"7px 12px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,color:"#EF4444",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}
                onClick={()=>{
                  setLoggedInUser(null);
                  try{localStorage.removeItem("marjin-session");}catch(_){}
                }}>יציאה</button>
            </div>
          )}
        </div>
      </header>

      {/* Nav -- שורה ראשונה: 4 טאבים ראשיים | שורה שניה: היסטוריה, קבועות, משימות */}
      {/* staff רואה רק משמרות */}
      {loggedInUser?.role==="staff" && screen!=="shifts" && (() => { setTimeout(()=>setScreen("shifts"),0); return null; })()}
      <nav style={{borderBottom:"1px solid #E5E7EB",position:"relative",zIndex:1}}>
        {/* שורה 1 */}
        <div style={{display:"flex",padding:"14px 20px 0",gap:2}}>
          <button style={{...S.navBtn,flex:1,textAlign:"center",...(screen==="shifts"?S.navShift:{})}} onClick={()=>setScreen("shifts")}>⚡ משמרות</button>
          {[["dashboard","📊 סקירה"],["forecast","🔮 תחזית"],["foodcost","🥗 פוד קוסט"]].map(([s,l])=>{
            if(loggedInUser?.role==="staff") return null;
            const allowed = !currentUser || (currentUser.permissions||[]).includes(s);
            if(!allowed) return null;
            return <button key={s} style={{...S.navBtn,flex:1,textAlign:"center",...(screen===s?S.navActive:{})}} onClick={()=>setScreen(s)}>{l}</button>;
          })}
        </div>
        {/* שורה 2 -- היסטוריה, קבועות, משימות */}
        {(!currentUser && loggedInUser?.role!=="staff") && (
          <div style={{display:"flex",padding:"0 20px",gap:2,borderTop:"1px solid #E5E7EB"}}>
            {[["history","📋 היסטוריה"],["fixed","🔒 קבועות"],["users","👥 משתמשים"]].map(([s,l])=>(
              <button key={s} style={{...S.navBtn,flex:1,textAlign:"center",fontSize:12,...(screen===s?S.navActive:{})}} onClick={()=>setScreen(s)}>{l}</button>
            ))}
            {(loggedInUser?.role==="super_owner"||loggedInUser?.role==="owner") && (
              <button style={{...S.navBtn,flex:1,textAlign:"center",fontSize:12,...(screen==="tasks"?S.navTasks:{})}} onClick={()=>setScreen("tasks")}>✅ משימות</button>
            )}

          </div>
        )}
      </nav>

      {/* ═══ DASHBOARD ═══ */}
      {screen==="dashboard" && (
        <div style={S.content}>
          <div style={{...S.banner,...(todayEntry?S.bannerOk:S.bannerWarn)}}>
            {todayEntry ? `✅ הוזן -- הכנסות ${fmt((Number(todayEntry.sales)||0)+(Number(todayEntry.deliveries)||0))}` : `⏰ טרם הוזנו נתוני היום (${DOW_NAMES[TODAY_DOW]})`}
          </div>
          {todayMissing.length>0 && (
            <div style={S.alertBox}>
              <div style={S.alertTitle}>⚠️ ספקים צפויים היום שלא הוזנו</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {todayMissing.map(s=><span key={s.id} style={S.atag}>{s.name}</span>)}
              </div>
            </div>
          )}

          {/* KPIs */}
          {(()=>{
            const tSales  = Math.round((lastYear[MONTH]?.sales||650000)*(1+(cfgTarget(businessConfig,"salesGrowthPct",TARGETS.salesGrowthPct)/100)));
            const tFood   = cfgTarget(businessConfig,"foodCostPct",TARGETS.foodCostPct);
            const tLabor  = cfgTarget(businessConfig,"laborCostPct",TARGETS.laborCostPct);
            const tFixed  = metrics.TOTAL_FIXED;
            // רווח נקי חזוי = הכנסות - פוד - לייבור - רשת - קבועות
            const fSalesFull = metrics.totalSales + (DAY_OF_MONTH>0 ? (metrics.totalSales/DAY_OF_MONTH)*(DAYS_IN_MONTH-DAY_OF_MONTH) : 0);
            const estProfit  = fSalesFull * (1 - tFood/100 - tLabor/100 - ((businessConfig.rentPct||0)+(businessConfig.hasRoyalty?businessConfig.royaltyPct||0:0))/100) - tFixed;
            const salesPct   = tSales>0 ? Math.round((metrics.totalSales/tSales)*100) : 0;
            const laborPct   = metrics.totalSales>0 ? (metrics.totalPayroll/metrics.totalSales)*100 : 0;
            return (<>
              {/* Target progress bar */}
              <div style={{...S.card,marginBottom:14,borderTop:"2px solid #22C55E"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#3D5068",textTransform:"uppercase",letterSpacing:1}}>🎯 יעד {MONTH_NAMES[MONTH]}</span>
                  <span style={{fontSize:16,color:salesPct>=100?"#22C55E":salesPct>=70?"#F59E0B":"#EF4444",fontWeight:900}}>{salesPct}%</span>
                </div>
                <div style={{height:10,background:"#F8FAFC",borderRadius:6,overflow:"hidden",marginBottom:8}}>
                  <div style={{height:"100%",width:`${Math.min(salesPct,100)}%`,
                    background:salesPct>=100?"linear-gradient(90deg,#22C55E,#22C55E)":salesPct>=70?"linear-gradient(90deg,#D97706,#F59E0B)":"linear-gradient(90deg,#EF4444,#EF4444)",
                    borderRadius:6,transition:"width 0.7s cubic-bezier(0.4,0,0.2,1)"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                  <span style={{color:"#6B7280",fontWeight:500}}>כיום: <b style={{color:"#111827",fontWeight:700}}>{fmt(metrics.totalSales)}</b></span>
                  <span style={{color:"#3D5068",fontWeight:500}}>יעד: <b style={{color:"#6B7280",fontWeight:700}}>{fmt(tSales)}</b></span>
                </div>
              </div>

              {/* KPI grid */}
              <div style={S.kpiGrid}>
                <KPI icon="💵" label="הכנסות מול יעד"
                  value={fmt(metrics.totalSales)}
                  color={salesPct>=100?"#22C55E":salesPct>=70?"#F59E0B":"#EF4444"}
                  sub={`יעד ${fmt(tSales)} · ${salesPct}%`}/>
                <KPI icon="📊" label="LC יתרת קופה"
                  value={fmt(metrics.lc)}
                  color={metrics.lc>=0?"#22C55E":"#EF4444"}/>
                <KPI icon="🥗" label="פוד קוסט"
                  value={fmtPct(metrics.foodCostPct)}
                  color={fcColor(metrics.foodCostPct,tFood)}
                  sub={`יעד ${tFood}%`}/>
                <KPI icon="👷" label="לייבור קוסט"
                  value={fmtPct(laborPct)}
                  color={fcColor(laborPct,tLabor)}
                  sub={`יעד ${tLabor}% · ${fmt(metrics.totalPayroll)}`}/>

                <KPI icon="🔮" label="תחזית סוף חודש"
                  value={fmt(metrics.forecast)}
                  color="#A3A3A3"
                  sub={`${DAYS_IN_MONTH-DAY_OF_MONTH} ימים נותרו`}/>
                <KPI icon="💰" label="רווח נקי חזוי"
                  value={fmt(Math.round(estProfit))}
                  color={estProfit>0?"#22C55E":"#EF4444"}
                  sub={`${fSalesFull>0?fmtPct((estProfit/fSalesFull)*100):"--"} מהמחזור`}/>
              </div>
            </>);
          })()}

          {/* ─── Pikud Ha-Oref Alert Banner ─── */}
          {orefAlert && (
            <div style={{background:"#DC2626",borderRadius:14,padding:"14px 16px",marginBottom:12,animation:"pulse 1s infinite",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:28,flexShrink:0}}>🚨</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:900,color:"#fff",fontSize:15,marginBottom:2}}>אזעקה פעילה -- פיקוד העורף</div>
                <div style={{fontSize:12,color:"#FCA5A5"}}>{orefAlert.cities.slice(0,5).join(" · ")}{orefAlert.cities.length>5?` +${orefAlert.cities.length-5} נוספות`:""}</div>
                <div style={{fontSize:11,color:"#FCA5A5",marginTop:2}}>{orefAlert.time}</div>
              </div>
            </div>
          )}

          {/* ─── Weather Card ─── */}
          {weather && (
            <div style={{background:weather.alert?"#FEF2F2":"#F0F9FF",border:`1px solid ${weather.alert?"#FECACA":"#BAE6FD"}`,borderRadius:14,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:28}}>{weather.icon}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:16,color:weather.isHeat?"#DC2626":weather.isRain?"#2563EB":"#111827"}}>{weather.temp}°C</span>
                  <span style={{fontSize:13,color:weather.alert?"#DC2626":"#374151",fontWeight:weather.alert?700:400}}>{weather.desc}</span>
                  {weather.rain>0&&<span style={{fontSize:12,color:"#2563EB"}}>🌧 {weather.rain}מ"מ</span>}
                  <span style={{fontSize:12,color:"#9CA3AF"}}>💨 {weather.wind} קמ"ש</span>
                </div>
                {weather.alert&&<div style={{fontSize:12,color:"#DC2626",fontWeight:700,marginTop:3}}>⚠️ {weather.isRain?"גשם -- צפי לירידה בפדיון":weather.isHeat?"חום קיצוני -- השפעה על תנועת לקוחות":"קור קיצוני"}</div>}
              </div>
              <div style={{fontSize:10,color:"#9CA3AF",flexShrink:0}}>Open-Meteo</div>
            </div>
          )}
          {weatherErr && <div style={{background:"#F8FAFC",border:"1px solid #E5E7EB",borderRadius:10,padding:"8px 14px",fontSize:12,color:"#9CA3AF",marginBottom:12}}>⚠️ לא ניתן לטעון מזג אוויר</div>}

          {chart.length>0 && <>
            <div style={S.card}>
              <h3 style={S.ct}>יתרה מצטברת</h3>

            })()}
            <label style={S.lbl}>הכנסה אחרת (₪)</label>
            <input style={S.inp} type="number" inputMode="numeric" placeholder="0" value={form.other_income} onChange={e=>setForm(f=>({...f,other_income:e.target.value}))}/>

            <div style={S.sec}>הוצאות כ״א</div>
            {(()=>{
              const globalEmps = (businessConfig.employees||[]).filter(e=>Number(e.monthlySalary)>0);
              const globalDaily = globalEmps.reduce((a,e)=>a+Math.round(Number(e.monthlySalary)/DAYS_IN_MONTH),0);
              return (<>
                {globalEmps.length>0 && (
                  <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                    <div style={{fontSize:11,color:"#16A34A",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>עובדים גלובלי -- אוטומטי</div>
                    {globalEmps.map(emp=>(
                      <div key={emp.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                        <span style={{color:"#374151"}}>{emp.name} <span style={{color:"#9CA3AF"}}>{emp.role}</span></span>
                        <span style={{fontWeight:700,color:"#15803D"}}>{Math.round(Number(emp.monthlySalary)/DAYS_IN_MONTH).toLocaleString()} ₪</span>
                      </div>
                    ))}
                    <div style={{borderTop:"1px solid #BBF7D0",marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:800,color:"#15803D"}}>
                      <span>סה״כ גלובלי</span><span>{globalDaily.toLocaleString()} ₪</span>
                    </div>
                  </div>
                )}
                <label style={S.lbl}>עלות שעתיים / נוכחות יומית (₪)</label>
                <input style={S.inp} type="number" inputMode="numeric" placeholder="0" value={form.payroll} onChange={e=>setForm(f=>({...f,payroll:e.target.value}))}/>
                {(globalDaily+(Number(form.payroll)||0))>0 && (
                  <div style={{background:"#F8FAFC",border:"1px solid #E5E7EB",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:800,marginBottom:8}}>
                    <span style={{color:"#374151"}}>סה״כ שכר היום</span>
                    <span style={{color:"#111827"}}>{(globalDaily+(Number(form.payroll)||0)).toLocaleString()} ₪</span>
                  </div>
                )}
              </>);
            })()}
            <label style={S.lbl}>הוצאה אחרת (₪)</label>
            <input style={S.inp} type="number" inputMode="numeric" placeholder="0" value={form.other_expense} onChange={e=>setForm(f=>({...f,other_expense:e.target.value}))}/>
            {/* Weather impact + security */}
            {(weather?.alert||form.weather_impact||form.security_event) && (
              <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:8}}>
                  🔴 גורמי השפעה חיצוניים
                  {orefAlert&&<span style={{marginRight:8,fontSize:11,background:"#DC2626",color:"#fff",borderRadius:6,padding:"1px 8px"}}>אזעקה פעילה עכשיו</span>}
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                  {[["גשם","🌧️"],["חום קיצוני","🌡️"],["אזעקות","🚨"],["מבצע צבאי","⚔️"],["פיגוע","⚠️"],["אחר","📌"]].map(([tag,ic])=>(
                    <button key={tag} onClick={()=>setForm(f=>({...f,weather_impact:f.weather_impact===tag?"":tag}))}
                      style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${form.weather_impact===tag?"#DC2626":"#FECACA"}`,background:form.weather_impact===tag?"#DC2626":"#FEF2F2",color:form.weather_impact===tag?"#fff":"#DC2626",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                      {ic} {tag}
                    </button>
                  ))}
                </div>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#374151",cursor:"pointer"}}>
                  <input type="checkbox" checked={!!form.security_event} onChange={e=>setForm(f=>({...f,security_event:e.target.checked}))} style={{width:16,height:16}}/>
                  <span>יום שכלל אירוע ביטחוני / מלחמה</span>
                </label>
              </div>
            )}
            {!(weather?.alert||form.weather_impact||form.security_event) && (
              <button onClick={()=>setForm(f=>({...f,weather_impact:"אחר"}))}
                style={{width:"100%",background:"none",border:"1px dashed #D1D5DB",borderRadius:10,color:"#9CA3AF",padding:"8px",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>
                + סמן השפעת מזג אוויר / ביטחון
              </button>
            )}
            <label style={S.lbl}>הערות</label>
            <textarea style={{...S.inp,minHeight:52,resize:"vertical"}} placeholder="חריגות, אירועים..." value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>

            {(()=>{
              const rawInc=(Number(form.sales)||0)+(Number(form.deliveries)||0)+(Number(form.other_income)||0);
              const netInc = form.includeVat ? Math.round(rawInc/VAT_RATE) : rawInc;
              if(!rawInc) return null;
              return (
                <div style={{...S.preview,background:"#F0FDF4",border:"1px solid #BBF7D0",marginBottom:4}}>
                  <div style={S.pr}><span style={{fontWeight:600}}>סה״כ הכנסות{form.includeVat?" (נטו)":""}</span><span style={{color:"#22C55E",fontWeight:800,fontSize:16}}>{fmt(netInc)}</span></div>
                </div>
              );
            })()}

            {saved && <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#16A34A",fontSize:15,marginBottom:8}}>✅ נשמר בהצלחה!</div>}
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <button style={{...S.saveBtn, opacity: saved ? 0.6 : 1}} onClick={()=>!saved && saveEntry()}>{saved ? "✅ נשמר..." : "💾 שמור"}</button>
              <button style={S.cancelBtn} onClick={()=>{setForm({...EMPTY_ENTRY});setEditingId(null);setEntryStep('idle');setScreen("dashboard");}}>ביטול</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══ HISTORY ═══ */}
      {screen==="history" && (
        <div style={S.content}>
          {entries.length>0 && (
            <div style={{textAlign:"center",marginBottom:10}}>
              <button onClick={()=>{if(window.confirm("למחוק את כל הרשומות? פעולה בלתי הפיכה")){const u=[];setEntries(u);persist(u,null);}}}
                style={{background:"none",border:"1px solid #FECACA",borderRadius:8,color:"#EF4444",padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                🗑 מחק את כל הרשומות
              </button>
            </div>
          )}
          {entries.length===0
            ? <div style={S.empty}><div style={{fontSize:44,marginBottom:10}}>📋</div><p style={{color:"#9CA3AF"}}>אין רשומות עדיין</p><button style={S.saveBtn} onClick={()=>{setForm({...EMPTY_ENTRY,date:YESTERDAY_STR,security_event:false});setEditingId(null);setEntryStep('revenue');setScreen("entry");}}>הזן יום ראשון</button></div>
            : [...entries].reverse().map((e,ri)=>{
                const i=entries.length-1-ri;
                const inc=(Number(e.sales)||0)+(Number(e.deliveries)||0)+(Number(e.other_income)||0);
                const supp=e.supplier_payments?Object.values(e.supplier_payments).reduce((a,b)=>a+(Number(b)||0),0):0;
                const hourlyPay=e.hourly_payroll?Object.values(e.hourly_payroll).reduce((a,b)=>a+(Number(b)||0),0):0;
                const exp=supp+(Number(e.payroll)||0)+hourlyPay+(Number(e.other_expense)||0);
                return (
                  <div key={i} style={S.histRow}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#6B7280",marginBottom:5}}>{e.date} · {DOW_NAMES[getDateDOW(e.date)]}
                          {e.weather_impact&&<span style={{marginRight:6,fontSize:11,background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:6,padding:"1px 6px",color:"#DC2626",fontWeight:600}}>🔴 {e.weather_impact}</span>}
                          {e.security_event&&<span style={{marginRight:6,fontSize:11,background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:6,padding:"1px 6px",color:"#7C3AED",fontWeight:600}}>⚔️ ביטחון</span>}
                        </div>
                      <div style={{display:"flex",gap:14,fontSize:13,flexWrap:"wrap"}}>
                        <span style={{color:"#22C55E"}}>⬆ {fmt(inc)}</span>
                        <span style={{color:"#EF4444"}}>⬇ {fmt(exp)}</span>
                        <span style={{color:inc-exp>=0?"#22C55E":"#EF4444",fontWeight:700}}>{fmt(inc-exp)}</span>
                      </div>
                      {supp>0&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>🏭 ספקים: {fmt(supp)}</div>}
                      {e.notes&&<p style={{margin:"4px 0 0",color:"#9CA3AF",fontSize:12,fontStyle:"italic"}}>{e.notes}</p>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      <button style={S.iconBtn} onClick={()=>{setForm({...e});setEditingId(i);setEntryStep('revenue');setScreen("entry");}}>✏️</button>
                      <button style={S.iconBtn} onClick={()=>deleteEntry(i)}>🗑</button>
                    </div>
                  </div>
                );
              })
          }
        </div>
      )}

      {/* ═══ FORECAST ═══ */}
      {screen==="forecast" && (
        <div style={S.content}>
          <ForecastScreen entries={entries} businessConfig={businessConfig} metrics={metrics} lastYear={lastYear} saveLastYear={saveLastYear} currentMonth={MONTH} />
        </div>
      )}

      {/* ═══ SHIFTS ═══ */}
      {screen==="shifts" && (
        <ShiftManagerEmbed
          currentUser={currentUser}
          setCurrentUser={setCurrentUser}
          onNavigate={s=>setScreen(s)}
          appUsers={appUsers}
          saveAppUsers={saveAppUsers}
          bizId={currentBizId||""}
        />
      )}

      {/* ═══ TASKS (בעלים בלבד) ═══ */}
      {screen==="tasks" && !currentUser && (
        <div style={S.content}>
          <MasterTasksScreen
            tasks={masterTasks}
            saveTasks={saveMasterTasks}
          />
        </div>
      )}

      {/* ═══ USERS ═══ */}
      {screen==="users" && !currentUser && (
        <div style={S.content}>
          <div style={S.card}>
            <h2 style={{...S.ct,fontSize:15,color:"#111827",marginBottom:16}}>👥 ניהול משתמשים</h2>
            <UserManagement users={appUsers} saveUsers={saveAppUsers} tenantId={window._currentTenantId} businesses={businesses}/>
          </div>
        </div>
      )}

      {/* ═══ FIXED ═══ */}
      {screen==="fixed" && (
        <div style={S.content}>
          <div style={S.card}>
            <h2 style={{...S.ct,fontSize:15,color:"#111827",marginBottom:8}}>הוצאות קבועות חודשיות</h2>
            <p style={{color:"#9CA3AF",fontSize:13,margin:"0 0 14px"}}>שכ״ד מחושב אוטומטית לפי {businessConfig.rentType==="fixed" ? `${(businessConfig.rentFixed||0).toLocaleString()} ₪ קבוע` : `${businessConfig.rentPct||0}% ממחזור`}.</p>
            {fixedList.map((f,i)=>(
              <div key={f.id} style={{marginBottom:8,padding:"10px 12px",background:"#F8FAFC",borderRadius:10,border:"1px solid #0A0A0A"}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  {f.rentPct&&<span style={{fontSize:10,color:"#22C55E",background:"#16653444",padding:"1px 7px",borderRadius:8,flexShrink:0}}>🔗 {businessConfig.rentType==="fixed"?`${(businessConfig.rentFixed||0).toLocaleString()}₪`:`${businessConfig.rentPct||0}%`}</span>}
                  {f.royaltyPct&&businessConfig.hasRoyalty&&<span style={{fontSize:10,color:"#6B7280",background:"#40404044",padding:"1px 7px",borderRadius:8,flexShrink:0}}>🔗 {businessConfig.royaltyPct||0}%</span>}
                  <input style={{...S.inp,marginBottom:0,flex:1,padding:"6px 10px",fontSize:13}} value={f.name}
                    onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,name:e.target.value}:x);setFixedList(u);persist(entries,u);}}/>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {f.rentPct
                    ? <div style={{...S.inp,padding:"6px 10px",flex:1,marginBottom:0,color:"#22C55E",fontSize:13}}>≈ {businessConfig.rentType==="fixed"?fmt(businessConfig.rentFixed||0):fmt(Math.round(metrics.totalSales*(businessConfig.rentPct||0)/100))}</div>
                    : f.royaltyPct
                    ? <div style={{...S.inp,padding:"6px 10px",flex:1,marginBottom:0,color:"#6B7280",fontSize:13}}>≈ {fmt(Math.round(metrics.totalSales*(businessConfig.royaltyPct||0)/100))}</div>
                    : <input style={{...S.inp,padding:"6px 10px",flex:1,marginBottom:0}} type="number" placeholder="₪" value={f.amount||""}
                        onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,amount:Number(e.target.value)}:x);setFixedList(u);persist(entries,u);}}/>
                  }
                  <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                    <span style={{color:"#9CA3AF",fontSize:12}}>יום</span>
                    <input style={{...S.inp,padding:"6px 8px",width:50,marginBottom:0,textAlign:"center"}} type="number" min={1} max={31} value={f.dueDay}
                      onChange={e=>{const u=fixedList.map((x,j)=>j===i?{...x,dueDay:Number(e.target.value)}:x);setFixedList(u);persist(entries,u);}}/>
                  </div>
                </div>
              </div>
            ))}
            <button style={{...S.saveBtn,marginTop:6}} onClick={()=>{const u=[...fixedList,{id:Date.now(),name:"הוצאה חדשה",amount:0,dueDay:1,rentPct:false}];setFixedList(u);persist(entries,u);}}>+ הוסף</button>
            <div style={{borderTop:"1px solid #0A0A0A",marginTop:14,paddingTop:12,display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#6B7280"}}>סה״כ חודשי (משוער)</span>
              <span style={{color:"#111827",fontWeight:700,fontSize:18}}>{fmt(metrics.TOTAL_FIXED)}</span>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}


// ─── Employees Screen ─────────────────────────────────────────────────────────
function EmployeesScreen({ businessConfig, saveBusinessConfig }) {
  const employees = businessConfig.employees || [];
  const ROLES_EMP = ["מנהל משמרת","טבח","עוזר טבח","מלצר","ברמן","קופאי","כלים","ניקיון","אחר"];
  const EMP_TYPES = [{v:"global",l:"🔒 גלובלי (חודשי קבוע)"},{v:"hourly",l:"⏱ שעתי (הזנה יומית)"}];
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({name:"",role:"מלצר",type:"global",monthlySalary:"",hourlyRate:"",hoursPerMonth:""});

  const totalMonthly = employees.reduce((a,e)=>{
    if(e.monthlySalary) return a + (Number(e.monthlySalary)||0);
    if(e.hourlyRate && e.hoursPerMonth) return a + Math.round((Number(e.hourlyRate)||0)*(Number(e.hoursPerMonth)||0));
    return a;
  },0);

  const saveEmp = () => {
    if(!form.name.trim()) return;
    let updated;
    if(editId !== null) {
      updated = employees.map(e=>e.id===editId?{...e,...form}:e);
    } else {
      updated = [...employees, {...form, id:Date.now()}];
    }
    saveBusinessConfig({...businessConfig, employees:updated});
    setAdding(false); setEditId(null); setForm({name:"",role:"מלצר",type:"global",monthlySalary:"",hourlyRate:"",hoursPerMonth:""});
  };

  const removeEmp = id => saveBusinessConfig({...businessConfig, employees:employees.filter(e=>e.id!==id)});

  const startEdit = emp => {
    setForm({name:emp.name,role:emp.role,type:emp.type||"global",monthlySalary:emp.monthlySalary||"",hourlyRate:emp.hourlyRate||"",hoursPerMonth:emp.hoursPerMonth||""});
    setEditId(emp.id); setAdding(true);
  };

  const fmtEmpSalary = emp => {
    if(emp.type==="hourly") return "⏱ הזנה יומית";
    if(emp.monthlySalary) return `${Number(emp.monthlySalary).toLocaleString()} ₪/חודש`;
    return "--";
  };

  const inp = {width:"100%",border:"1px solid #D1D5DB",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#111827",background:"#FFFFFF",marginBottom:10,boxSizing:"border-box"};
  const sel = {...inp};

  return (
    <div style={{maxWidth:500,margin:"0 auto"}}>
      <div style={{background:"#FFFFFF",borderRadius:16,border:"1px solid #E5E7EB",padding:"18px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:"#111827"}}>👤 עובדים</h2>
            <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{employees.length} עובדים · סה״כ: {totalMonthly.toLocaleString()} ₪/חודש</div>
          </div>
          <button onClick={()=>{setAdding(true);setEditId(null);setForm({name:"",role:"מלצר",type:"global",monthlySalary:"",hourlyRate:"",hoursPerMonth:""}); }}
            style={{background:"#2563EB",border:"none",borderRadius:10,color:"#fff",padding:"8px 16px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>+ הוסף</button>
        </div>

        {employees.length===0 && !adding && (
          <div style={{textAlign:"center",padding:"24px 0",color:"#9CA3AF",fontSize:14}}>אין עובדים מוגדרים עדיין</div>
        )}

        {employees.map(emp=>(
          <div key={emp.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"#F8FAFC",borderRadius:12,marginBottom:8,border:"1px solid #E5E7EB"}}>
            <div>
              <div style={{fontWeight:700,color:"#111827",fontSize:14}}>{emp.name}</div>
              <div style={{fontSize:12,color:"#6B7280",marginTop:2}}>{emp.role} · {fmtEmpSalary(emp)}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>startEdit(emp)} style={{background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12,color:"#374151"}}>✏️</button>
              <button onClick={()=>removeEmp(emp.id)} style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:12,color:"#EF4444"}}>✕</button>
            </div>
          </div>
        ))}

        {adding && (
          <div style={{background:"#EFF6FF",borderRadius:14,padding:"16px",border:"1px solid #BFDBFE",marginTop:8}}>
            <div style={{fontWeight:700,color:"#1D4ED8",fontSize:14,marginBottom:12}}>{editId!==null?"עריכת עובד":"עובד חדש"}</div>
            <input style={inp} placeholder="שם עובד" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>
            <select style={sel} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              {ROLES_EMP.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {EMP_TYPES.map(t=>(
                <button key={t.v} onClick={()=>setForm(f=>({...f,type:t.v}))}
                  style={{flex:1,padding:"9px 8px",borderRadius:10,border:`2px solid ${form.type===t.v?"#2563EB":"#E5E7EB"}`,background:form.type===t.v?"#EFF6FF":"#FFFFFF",color:form.type===t.v?"#1D4ED8":"#6B7280",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                  {t.l}
                </button>
              ))}
            </div>
            {form.type==="global" && (
              <>
                <div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>משכורת חודשית ברוטו (₪)</div>
                <input style={{...inp}} type="number" inputMode="numeric" placeholder="0"
                  value={form.monthlySalary} onChange={e=>setForm(f=>({...f,monthlySalary:e.target.value}))}/>
                {form.monthlySalary && (
                  <div style={{background:"#DBEAFE",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#1D4ED8",fontWeight:600,marginBottom:10}}>
                    עלות יומית: ≈ {Math.round(Number(form.monthlySalary)/DAYS_IN_MONTH).toLocaleString()} ₪/יום (÷{DAYS_IN_MONTH})
                  </div>
                )}
              </>
            )}
            {form.type==="hourly" && (
              <div style={{background:"#F0FDF4",borderRadius:10,padding:"10px 12px",fontSize:13,color:"#16A34A",marginBottom:10}}>
                עלות יומית תוזן ידנית בכל יום בטופס ההזנה
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEmp} style={{flex:1,background:"#2563EB",border:"none",borderRadius:10,color:"#fff",padding:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>שמור</button>
              <button onClick={()=>{setAdding(false);setEditId(null);}} style={{flex:1,background:"#F1F5F9",border:"1px solid #E5E7EB",borderRadius:10,color:"#6B7280",padding:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>ביטול</button>
            </div>
          </div>
        )}

        {totalMonthly > 0 && (
          <div style={{borderTop:"1px solid #E5E7EB",marginTop:14,paddingTop:12,display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"#6B7280",fontWeight:600}}>סה״כ עלות שכר חודשית</span>
            <span style={{color:"#111827",fontWeight:800,fontSize:16}}>{totalMonthly.toLocaleString()} ₪</span>
          </div>
        )}
      </div>

// ─── Master Tasks Screen (בעלים ישיר) ────────────────────────────────────────
function MasterTasksScreen({ tasks, saveTasks }) {
  const [adding, setAdding]   = useState(false);
  const [editing, setEditing] = useState(null); // task id being edited
  const [form, setForm]       = useState({ title:"", category:"פתיחה", shift:"כל המשמרות", note:"" });
  const [filterShift, setFilterShift] = useState("הכל");
  const [filterCat,   setFilterCat]   = useState("הכל");

  const openAdd = () => { setForm({ title:"", category:"פתיחה", shift:"כל המשמרות", note:"", proof:"check" }); setEditing(null); setAdding(true); };
  const openEdit = (t) => { setForm({ title:t.title, category:t.category, shift:t.shift, weekday:t.weekday||"ראשון", note:t.note||"", proof:t.proof||"check" }); setEditing(t.id); setAdding(true); };
  const cancel = () => { setAdding(false); setEditing(null); };

  const save = () => {
    if (!form.title.trim()) return;
    if (editing !== null) {
      saveTasks(tasks.map(t => t.id===editing ? {...t,...form} : t));
    } else {
      saveTasks([...tasks, {...form, id:Date.now()}]);
    }
    setAdding(false); setEditing(null);
  };

  const remove = (id) => saveTasks(tasks.filter(t => t.id !== id));

  const moveUp   = (i, arr) => { if(i===0) return arr; const a=[...arr]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a; };
  const moveDown = (i, arr) => { if(i===arr.length-1) return arr; const a=[...arr]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a; };

  const filtered = tasks.filter(t =>
    (filterShift==="הכל" || t.shift===filterShift) &&
    (filterCat==="הכל"   || t.category===filterCat)
  );

  const CAT_COLOR = {"פתיחה":"#22C55E","שוטף":"#F59E0B","סגירה":"#EF4444"};
  const CAT_BG    = {"פתיחה":"#16653433","שוטף":"#78350F33","סגירה":"#7F1D1D33"};

  return (
    <div>
      {/* Summary bar */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1}}>
          <h2 style={{margin:0,fontSize:17,fontWeight:800,color:"#111827"}}>✅ ניהול משימות</h2>
          <p style={{margin:"2px 0 0",fontSize:12,color:"#9CA3AF"}}>
            {tasks.length} משימות · בוקר: {tasks.filter(t=>t.shift==="בוקר"||t.shift==="כל המשמרות").length} · ערב: {tasks.filter(t=>t.shift==="ערב"||t.shift==="כל המשמרות").length}
          </p>
        </div>
        <button style={{...S.addBtn, fontSize:13, padding:"8px 14px"}} onClick={openAdd}>+ הוסף משימה</button>
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {["הכל","כל המשמרות","בוקר","ערב","שבועי"].map(s=>(
          <button key={s} style={{...S.subBtn,...(filterShift===s?S.subBtnActive:{})}} onClick={()=>setFilterShift(s)}>{s}</button>
        ))}
        <div style={{width:1,background:"#2A2A2A",margin:"0 2px"}}/>
        {["הכל","פתיחה","שוטף","סגירה"].map(c=>(
          <button key={c} style={{...S.subBtn,...(filterCat===c?{...S.subBtnActive,color:c==="הכל"?"#F5F5F5":CAT_COLOR[c]}:{})}} onClick={()=>setFilterCat(c)}>{c}</button>
        ))}
      </div>

      {/* Add / Edit form */}
      {adding && (
        <div style={{...S.card, border:"1px solid #15803D44", marginBottom:14}}>
          <h3 style={{margin:"0 0 12px", fontSize:14, fontWeight:700, color:"#111827"}}>
            {editing ? "✏️ עריכת משימה" : "➕ משימה חדשה"}
          </h3>
          <label style={S.lbl}>שם המשימה</label>
          <input style={S.inp} autoFocus placeholder="למשל: ניקוי מכונת קפה" value={form.title}
            onChange={e=>setForm(f=>({...f,title:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&save()}/>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <label style={S.lbl}>קטגוריה</label>
              <select style={{...S.inp,marginBottom:0}} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {["פתיחה","שוטף","סגירה"].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <label style={S.lbl}>משמרת</label>
              <select style={{...S.inp,marginBottom:0}} value={form.shift} onChange={e=>setForm(f=>({...f,shift:e.target.value}))}>
                {["כל המשמרות","בוקר","ערב","שבועי"].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <label style={S.lbl}>הערה / הוראות</label>
          <input style={S.inp} placeholder="פרטים נוספים לאחמש..." value={form.note}
            onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>

          <label style={{...S.lbl, marginBottom:6}}>אישור ביצוע</label>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[
              {val:"check", icon:"✅", label:"סימון בלבד"},
              {val:"photo", icon:"📸", label:"חובה לצלם"},
            ].map(opt=>(
              <button key={opt.val} onClick={()=>setForm(f=>({...f,proof:opt.val}))}
                style={{flex:1,padding:"10px 8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",
                  background:form.proof===opt.val?"#15803D":"#0A0A0A",
                  border:form.proof===opt.val?"2px solid #22C55E":"2px solid #D1D5DB",
                  color:form.proof===opt.val?"#fff":"#525252",fontWeight:700,fontSize:13,transition:"all 0.15s"}}>
                <div style={{fontSize:20,marginBottom:3}}>{opt.icon}</div>
                {opt.label}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button style={S.saveBtn} onClick={save}>{editing?"עדכן":"הוסף"}</button>
            <button style={S.cancelBtn} onClick={cancel}>ביטול</button>
          </div>
        </div>
      )}

      {/* Tasks list grouped by category */}
      {filtered.length === 0 && !adding && (
        <div style={S.empty}>
          <div style={{fontSize:40,marginBottom:10}}>✅</div>
          <p style={{color:"#9CA3AF"}}>אין משימות -- לחץ + הוסף משימה</p>
        </div>
      )}

      {["פתיחה","שוטף","סגירה"].map(cat => {
        const catTasks = filtered.filter(t => t.category===cat);
        if (!catTasks.length) return null;
        return (
          <div key={cat} style={{marginBottom:16}}>
            {/* Category header */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:700,padding:"3px 12px",borderRadius:20,color:CAT_COLOR[cat],background:CAT_BG[cat]}}>
                {cat}
              </span>
              <span style={{fontSize:11,color:"#9CA3AF"}}>{catTasks.length} משימות</span>
            </div>
            {/* Task rows */}
            {catTasks.map((t, ci) => {
              const globalIdx = tasks.indexOf(t);
              return (
                <div key={t.id} style={{
                  display:"flex", alignItems:"flex-start", gap:10,
                  padding:"11px 13px", marginBottom:7,
                  background:"#FFFFFF", border:"1px solid #0A0A0A", borderRadius:11,
                  borderRight:`3px solid ${CAT_COLOR[cat]}44`
                }}>
                  {/* Drag order */}
                  <div style={{display:"flex",flexDirection:"column",gap:2,paddingTop:2}}>
                    <button style={{...S.iconBtn,padding:"2px 6px",fontSize:10,color:"#9CA3AF"}}
                      onClick={()=>saveTasks(moveUp(globalIdx,tasks))}>▲</button>
                    <button style={{...S.iconBtn,padding:"2px 6px",fontSize:10,color:"#9CA3AF"}}
                      onClick={()=>saveTasks(moveDown(globalIdx,tasks))}>▼</button>
                  </div>
                  {/* Content */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,color:"#111827",fontWeight:600,marginBottom:3}}>{t.title}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#9CA3AF",background:"#F8FAFC",padding:"1px 7px",borderRadius:8}}>{SHIFT_LABEL(t)}</span>
                      {t.proof==="photo" && <span style={{fontSize:11,color:"#6B7280",background:"#1C1C1C44",padding:"1px 7px",borderRadius:8}}>📸 חובה לצלם</span>}
                      {t.note && <span style={{fontSize:11,color:"#9CA3AF",fontStyle:"italic"}}>{t.note}</span>}
                    </div>
                  </div>
                  {/* Actions */}
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    <button style={{...S.iconBtn,fontSize:12}} onClick={()=>openEdit(t)}>✏️</button>
                    <button style={{...S.iconBtn,fontSize:12}} onClick={()=>remove(t.id)}>🗑</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Shift preview */}
      {tasks.length > 0 && (
        <div style={{...S.card, marginTop:8, borderTop:"1px solid #D1D5DB"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>
            👁 כך יראה האחמש
          </div>
          <div style={{display:"flex",gap:8}}>
            {["בוקר","ערב"].map(shift=>(
              <div key={shift} style={{flex:1,background:"#F8FAFC",borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#6B7280",marginBottom:8}}>{shift}</div>
                {tasks.filter(t=>t.shift===shift||t.shift==="כל המשמרות").length === 0
                  ? <div style={{fontSize:11,color:"#1C1C1C"}}>אין משימות</div>
                  : tasks.filter(t=>t.shift===shift||t.shift==="כל המשמרות").map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                      <div style={{width:14,height:14,borderRadius:4,border:`2px solid ${CAT_COLOR[t.category]}55`,flexShrink:0}}/>
                      <span style={{fontSize:12,color:"#6B7280"}}>{t.title}</span>
                    </div>
                  ))
                }
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Shift Manager (Inline Tab) ───────────────────────────────────────────────
const SM_SHIFTS    = ["בוקר","ערב"];
const SM_CATS      = ["פתיחה","שוטף","סגירה"];
const SM_CAT_COLOR = {"פתיחה":"#22C55E","שוטף":"#6B7280","סגירה":"#EF4444"};
const SM_CAT_BG    = {"פתיחה":"#22C55E12","שוטף":"#F5F5F508","סגירה":"#EF444412"};

// PERMISSIONS -- מה כל תפקיד יכול לגשת
// בעתיד: להוסיף { id, name, permissions:["dashboard","forecast",...] } לכל מנהל
// כרגע: מנהלים רואים רק ⚡ משמרות. בעלים רואה הכל.

function ShiftManagerEmbed({ currentUser, setCurrentUser, onNavigate, appUsers=[], saveAppUsers, bizId="" }) {
  const [subScreen,  setSubScreen]  = useState("home");
  const [tasks,      setTasks]      = useState([]);
  const [logs,       setLogs]       = useState([]);
  const [activeLog,  setActiveLog]  = useState(null);
  const [ownerPin,   setOwnerPin]   = useState("0000");
  const [ownerTab,   setOwnerTab]   = useState("tasks");
  const [ownerPinIn, setOwnerPinIn] = useState("");
  const [ownerErr,   setOwnerErr]   = useState(false);
  const [incText,    setIncText]    = useState("");
  const [smLoaded,   setSmLoaded]   = useState(false);

  const appUsersRef = appUsers;
  const saveAppUsersRef = saveAppUsers || (()=>{});

  useEffect(()=>{
    const initSM = async () => {
      try {
        const sg2 = async k => { try{return await window.storage.get(k);}catch(_){return null;} };
        const r1=await sg2(`biz:${bizId}:tasks`);      if(r1) setTasks(JSON.parse(r1.value));
        const r2=await sg2(`biz:${bizId}:logs`);       if(r2) setLogs(JSON.parse(r2.value));
        const r4=await sg2(`biz:${bizId}:pin`);        if(r4) setOwnerPin(r4.value);
        const r5=await sg2(`biz:${bizId}:active-log`); if(r5) setActiveLog(JSON.parse(r5.value));
      } catch(_){}
      setSmLoaded(true);
    };
    if(window._firebaseReady) { initSM(); }
    else { window.addEventListener("firebase-ready", initSM, {once:true}); }
  },[]);

  const saveTasks  = async t => { setTasks(t);    try{await window.storage.set(`biz:${bizId}:tasks`,JSON.stringify(t), true);}catch(_){} };
  const saveLogs   = async l => { setLogs(l);     try{await window.storage.set(`biz:${bizId}:logs`,JSON.stringify(l), true);}catch(_){} };
  const saveActive = async l => { setActiveLog(l);try{await window.storage.set(`biz:${bizId}:active-log`,JSON.stringify(l), true);}catch(_){} };

  const openShift = async (shiftType) => {
    const log = { id:Date.now(), date:TODAY_STR, shiftType, managerName:"", completedTasks:[], incidents:[], proofs:{},
      openedAt:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}), closedAt:null };
    await saveActive(log);
    setSubScreen("shift");
  };

  const closeShift = async () => {
    if(!activeLog) return;
    const closed = {...activeLog, closedAt:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    await saveLogs([closed,...logs]);
    await saveActive(null);
    setSubScreen("home");
    // Send WhatsApp notification to owner
    if(bizId && typeof sendWhatsAppNotification === "function") {
      const allTasks = masterTasks || [];
      const myTasks  = allTasks.filter(t => !activeLog.shiftType || t.shifts?.includes(activeLog.shiftType));
      const done     = myTasks.filter(t => closed.completedTasks?.includes(t.id)).length;
      const DOW      = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
      const dow      = DOW[new Date().getDay()];
      const msg = [
        closed.completedTasks?.length === myTasks.length ? "✅" : "🟡",
        ` *סיום משמרת*`,
        `📅 ${closed.date || TODAY_STR} | יום ${dow}`,
        `🕐 ${closed.shiftType || "משמרת"}  |  סגירה: ${closed.closedAt}`,
        `👤 ${closed.managerName || "מנהל"}`,
        `📝 משימות: ${done}/${myTasks.length} (${myTasks.length>0?Math.round(done/myTasks.length*100):100}%)`,
        closed.incidents?.length > 0 ? `📋 אירועים: ${closed.incidents.join(", ")}` : "",
        "---",
        `_Marjin_`
      ].filter(Boolean).join("\n");
      sendWhatsAppNotification(bizId, msg, getWhatsAppTarget(businessConfig));
    }
  };

  const tryOwnerLogin = () => {
    if(ownerPinIn===ownerPin){ setOwnerErr(false); setOwnerPinIn(""); setSubScreen("owner"); }
    else { setOwnerErr(true); setOwnerPinIn(""); }
  };

  const toggleTask = async (task) => {
    if(!activeLog) return;
    if(task.proof==="photo" && !activeLog.completedTasks.includes(task.id)) return;
    const proofs = {...(activeLog.proofs||{})};
    const done = activeLog.completedTasks.includes(task.id)
      ? (delete proofs[task.id], activeLog.completedTasks.filter(x=>x!==task.id))
      : [...activeLog.completedTasks, task.id];
    await saveActive({...activeLog, completedTasks:done, proofs});
  };

  const completeWithPhoto = async (taskId, base64) => {
    if(!activeLog) return;
    const done = activeLog.completedTasks.includes(taskId) ? activeLog.completedTasks : [...activeLog.completedTasks, taskId];
    const proofs = {...(activeLog.proofs||{}), [taskId]: base64};
    await saveActive({...activeLog, completedTasks:done, proofs});
  };

  const addInc = async () => {
    if(!incText.trim()||!activeLog) return;
    const inc = {text:incText.trim(), time:new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})};
    await saveActive({...activeLog, incidents:[...(activeLog.incidents||[]),inc]});
    setIncText("");
  };

  const shiftTasks = (log) => tasks.filter(t => t.shift==="כל המשמרות" || t.shift===(log?.shiftType||""));

  const SS = {
    wrap:{padding:"18px 20px 100px"},
    bigBtn:{width:"100%",padding:"20px",background:"#2563EB",border:"none",borderRadius:16,color:"#0A0A0A",fontWeight:800,fontSize:18,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12,letterSpacing:0.2},
    ghostBtn:{width:"100%",padding:"15px",background:"transparent",border:"1px solid #D1D5DB",borderRadius:16,color:"#6B7280",cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:600,marginBottom:10},
    center:{maxWidth:380,margin:"0 auto"},
    lbl:{fontSize:14,color:"#6B7280",marginBottom:6,display:"block",fontWeight:500},
    inp:{width:"100%",background:"#F8FAFC",border:"1px solid #D1D5DB",borderRadius:12,padding:"13px 14px",color:"#111827",fontSize:16,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:10},
    pinInp:{width:"100%",background:"#FFFFFF",border:"2px solid #D1D5DB",borderRadius:14,padding:"16px",color:"#111827",fontSize:28,fontFamily:"inherit",outline:"none",textAlign:"center",letterSpacing:14,boxSizing:"border-box",marginBottom:10},
    card:{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:16,padding:"16px",marginBottom:12},
    taskRow:{display:"flex",alignItems:"flex-start",gap:13,padding:"14px",background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:14,marginBottom:8},
    taskDone:{background:"#F0FDF4",borderColor:"#BBF7D0"},
    cb:{width:26,height:26,borderRadius:8,border:"2px solid #D1D5DB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,fontSize:14},
    cbDone:{background:"#22C55E",border:"2px solid #22C55E",color:"#0A0A0A"},

    oNavBtn:{padding:"9px 13px",background:"transparent",border:"none",color:"#9CA3AF",cursor:"pointer",fontSize:13,fontWeight:600,borderRadius:"10px 10px 0 0",fontFamily:"inherit",borderBottom:"2px solid transparent",whiteSpace:"nowrap"},
    oNavA:{color:"#111827",background:"#FFFFFF",borderBottom:"2px solid #F59E0B"},
    iconBtn2:{background:"#F8FAFC",border:"1px solid #D1D5DB",borderRadius:10,padding:"8px 11px",cursor:"pointer",fontSize:14},
    logoutBtn:{padding:"9px 16px",background:"#F8FAFC",border:"1px solid #D1D5DB",borderRadius:10,color:"#6B7280",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600},
  };

  if(!smLoaded) return <div style={{...SS.wrap,textAlign:"center",color:"#9CA3AF",paddingTop:40}}>טוען...</div>;

  // ── HOME -- עובר ישירות לצ'קליסט ──
  if(subScreen==="home") {
    if(!activeLog) { openShift("יום"); return null; }
    setTimeout(()=>setSubScreen("shift"),0);
    return null;
  }

  // ── OWNER LOGIN ──
  if(subScreen==="ownerLogin") return (
    <div style={SS.wrap}>
      <div style={SS.center}>
        <button style={{...SS.logoutBtn,marginBottom:20}} onClick={()=>setSubScreen("home")}>← חזרה</button>
        <h3 style={{margin:"0 0 20px",color:"#111827",fontWeight:800,fontSize:18}}>כניסת בעלים</h3>
        <label style={SS.lbl}>קוד גישה</label>
        <input style={SS.pinInp} type="password" inputMode="numeric" maxLength={6} placeholder="••••••"
          value={ownerPinIn} onChange={e=>setOwnerPinIn(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&tryOwnerLogin()}/>
        {ownerErr && <p style={{color:"#EF4444",fontSize:13,margin:"0 0 10px",textAlign:"center"}}>קוד שגוי</p>}
        <button style={SS.saveBtn2} onClick={tryOwnerLogin}>כניסה</button>
        <p style={{color:"#2A2A2A",fontSize:11,textAlign:"center",marginTop:10}}>ברירת מחדל: 0000</p>
      </div>
    </div>
  );

  // ── ACTIVE SHIFT ──
  if(subScreen==="shift") {
    const log = activeLog;
    if(!log) { setSubScreen("home"); return null; }
    const myTasks = shiftTasks(log);
    const done    = myTasks.filter(t=>log.completedTasks.includes(t.id)).length;

    return (
      <div style={SS.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

            <div style={{fontSize:13,color:"#22C55E",fontWeight:700,marginBottom:2}}>{log.shiftType} · נפתחה {log.openedAt}</div>

        </div>
        {SM_CATS.map(cat=>{
          const ct = myTasks.filter(t=>t.category===cat);

          return (
            <div key={cat} style={{marginBottom:18}}>

                  <div key={task.id} style={{...SS.taskRow,...(isDone?SS.taskDone:{}),flexDirection:"column",cursor:"default"}}>

                      <div style={{...SS.cb,...(isDone?SS.cbDone:{})}}

        })}
        {myTasks.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"#9CA3AF",fontSize:14}}>אין משימות מוגדרות עדיין</div>}
        <div style={SS.card}>
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>📋 אירועים</div>
          {(log.incidents||[]).map((inc,i)=>(
            <div key={i} style={{padding:"8px 10px",background:"#F8FAFC",borderRadius:10,marginBottom:6}}>
              <div style={{fontSize:13,color:"#374151"}}>{inc.text}</div>

            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input style={{...SS.inp,flex:1,marginBottom:0}} placeholder="תאר אירוע..." value={incText} onChange={e=>setIncText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addInc()}/>
            <button style={{...SS.iconBtn2,padding:"10px 14px"}} onClick={addInc}>הוסף</button>
          </div>
        </div>
        {pct===100
          ? <button style={SS.saveBtn2} onClick={closeShift}>✅ סגור משמרת</button>
          : <button style={{...SS.saveBtn2,background:"#F1F5F9",color:"#6B7280"}} onClick={closeShift}>סגור משמרת ({myTasks.length-done} פתוחות)</button>
        }
      </div>
    );
  }
  // ── OWNER PANEL ──
  if(subScreen==="owner") return (
    <div style={SS.wrap}>
      <nav style={{display:"flex",gap:2,borderBottom:"1px solid #E5E7EB",marginBottom:12}}>
        {[["tasks","✅ משימות"],["logs","📋 יומן"],["users","👥 משתמשים"]].map(([t,l])=>(
          <button key={t} style={{...SS.oNavBtn,...(ownerTab===t?SS.oNavA:{})}} onClick={()=>setOwnerTab(t)}>{l}</button>
        ))}
        <div style={{flex:1}}/>
        <button style={{...SS.logoutBtn,margin:"2px 0"}} onClick={()=>setSubScreen("home")}>← יציאה</button>
      </nav>

      {ownerTab==="tasks"    && <SMTasksPanel tasks={tasks} saveTasks={saveTasks} SS={SS}/>}
      {ownerTab==="users"    && <div style={{padding:"0 4px"}}><UserManagement users={appUsersRef} saveUsers={saveAppUsersRef} tenantId={window._currentTenantId} businesses={businesses}/></div>}
      {ownerTab==="logs" && (
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>יומן משמרות</div>
          {logs.length===0 && <p style={{color:"#9CA3AF",textAlign:"center",paddingTop:24}}>אין משמרות עדיין</p>}
          {logs.map((log,i)=>{
            const lt=tasks.filter(t=>t.shift==="כל המשמרות"||t.shift===log.shiftType);
            const dp=lt.length>0?Math.round(((log.completedTasks?.length||0)/lt.length)*100):0;
            return (
              <div key={i} style={SS.card}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div><div style={{fontWeight:700,color:"#111827"}}>{log.managerName}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{log.date} · {log.shiftType}</div></div>
                  <div style={{textAlign:"left"}}><div style={{fontWeight:800,color:dp===100?"#22C55E":"#F59E0B",fontSize:18}}>{dp}%</div><div style={{fontSize:10,color:"#9CA3AF"}}>{log.completedTasks?.length||0}/{lt.length}</div></div>
                </div>
                <div style={{fontSize:11,color:"#9CA3AF"}}>{log.openedAt} {log.closedAt?`-- ${log.closedAt}`:"(פתוח)"}</div>
                {log.incidents?.length>0&&<div style={{marginTop:8,padding:"7px 10px",background:"#F8FAFC",borderRadius:8}}>
                  {log.incidents.map((inc,j)=><div key={j} style={{fontSize:11,color:"#374151"}}>{inc.time} -- {inc.text}</div>)}
                </div>}
                {/* Photo proofs */}
                {log.proofs && Object.keys(log.proofs).length>0 && (
                  <div style={{marginTop:8}}>
                    <div style={{fontSize:10,color:"#9CA3AF",marginBottom:5}}>📸 תמונות הוכחה ({Object.keys(log.proofs).length})</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {Object.entries(log.proofs).map(([tid, src])=>{
                        const t = tasks.find(x=>String(x.id)===String(tid));
                        return (
                          <div key={tid} style={{position:"relative"}}>
                            <img src={src} alt={t?.title||""}
                              style={{width:70,height:70,objectFit:"cover",borderRadius:8,border:"1px solid #15803D44",cursor:"pointer"}}
                              onClick={()=>window.open(src,"_blank")}/>
                            <div style={{fontSize:9,color:"#9CA3AF",textAlign:"center",marginTop:2,maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t?.title||tid}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  return null;
}

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

            <div style={{flex:1}}><label style={SS.lbl}>משמרת</label><select style={{...SS.inp,marginBottom:0}} value={form.shift} onChange={e=>setForm(f=>({...f,shift:e.target.value}))}>{["כל המשמרות","בוקר","ערב"].map(s=><option key={s}>{s}</option>)}</select></div>

                  <div style={{fontSize:13,color:"#111827"}}>{t.title}</div>
